version: 2
updates:
  - directory: /
    labels:
      - no-changelog
    package-ecosystem: gomod
    schedule:
      interval: weekly
  - directory: /
    # Generated by gh aw compile; do not bump.
    exclude-paths:
      - ".github/workflows/*.lock.yml"
    # Managed by gh aw compile.
    # Version-locked to the gh-aw compiler; do not bump.
    ignore:
      - dependency-name: "github/gh-aw-actions/**"
    labels:
      - no-changelog
    package-ecosystem: github-actions
    schedule:
      interval: weekly
