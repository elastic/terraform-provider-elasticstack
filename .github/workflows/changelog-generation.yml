# This file is generated by `scripts/compile-workflow-sources/main.go` from `.github/workflows-src/changelog-generation/workflow.yml.tmpl`. Do not edit directly.
name: Changelog Generation
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: "Changelog mode"
        type: choice
        options:
          - unreleased
          - release
        default: unreleased
        required: false
      target_version:
        description: "Release version as semver X.Y.Z (no leading v); required when mode is release"
        type: string
        required: false
      target_branch:
        description: "Optional branch override for push (default generated-changelog or prep-release-<version>)"
        type: string
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    env:
      MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode || 'unreleased' }}
      TARGET_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_version || '' }}
      TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_branch || '' }}
    steps:
      - name: Validate release inputs
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'release'
        env:
          TARGET_VERSION: ${{ github.event.inputs.target_version }}
        run: |
          if [ -z "$TARGET_VERSION" ]; then
            echo "::error::Release mode requires target_version (semver X.Y.Z without leading v). target_branch is an optional override for the checkout branch and does not replace target_version."
            exit 1
          fi
          if ! printf '%s' "$TARGET_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::target_version must be semver X.Y.Z without a leading v (got: '$TARGET_VERSION')."
            exit 1
          fi

      - name: Resolve checkout ref
        id: resolve_checkout_ref
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ "${INPUT_MODE}" = "release" ]; then
            if [ -n "${INPUT_TARGET_BRANCH}" ]; then
              echo "checkout_ref=${INPUT_TARGET_BRANCH}" >> "${GITHUB_OUTPUT}"
            else
              echo "checkout_ref=prep-release-${INPUT_TARGET_VERSION}" >> "${GITHUB_OUTPUT}"
            fi
          else
            echo "checkout_ref=${DEFAULT_BRANCH}" >> "${GITHUB_OUTPUT}"
          fi
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_TARGET_BRANCH: ${{ github.event.inputs.target_branch }}
          INPUT_TARGET_VERSION: ${{ github.event.inputs.target_version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.resolve_checkout_ref.outputs.checkout_ref }}
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run changelog engine
        id: changelog_engine
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          CHANGELOG_PATH: CHANGELOG.md
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            /**
             * Expanded into GitHub Actions inline scripts. Do not require() repository lib paths from here.
             * Node tests load changelog-engine.js instead.
             */
            const RELEASE_BRANCH_PATTERN = /^prep-release-(.+)$/;
            const SEMVER_TAG_PATTERN = /^v\d+\.\d+\.\d+$/;
            
            function resolveReleaseMode({ eventName, headBranch = '' }) {
              let mode = 'unreleased';
              let targetVersion = '';
              let targetBranch = 'generated-changelog';
            
              if (eventName === 'pull_request' || eventName === 'pull_request_target') {
                const match = headBranch.match(RELEASE_BRANCH_PATTERN);
                if (match) {
                  mode = 'release';
                  targetVersion = match[1];
                  targetBranch = headBranch;
                }
              }
            
              return { mode, targetVersion, targetBranch };
            }
            
            function parseSemverTags(tagsRaw = '') {
              return tagsRaw
                .split('\n')
                .map((tag) => tag.trim())
                .filter((tag) => SEMVER_TAG_PATTERN.test(tag));
            }
            
            function selectPreviousTag({ tags = [], mode = 'unreleased', targetVersion = '' }) {
              const excludedTag = mode === 'release' && targetVersion ? `v${targetVersion}` : '';
              const candidates = excludedTag ? tags.filter((tag) => tag !== excludedTag) : tags;
            
              return {
                previousTag: candidates[0] ?? '',
                excludedTag,
                excludedCurrentTag: Boolean(excludedTag) && candidates.length < tags.length,
              };
            }
            
            function buildCompareRange(previousTag) {
              return previousTag ? `${previousTag}..HEAD` : 'HEAD';
            }
            
            function buildReleaseContext({ eventName, headBranch = '', tags = [] }) {
              const modeResult = resolveReleaseMode({ eventName, headBranch });
              const previousTagResult = selectPreviousTag({
                tags,
                mode: modeResult.mode,
                targetVersion: modeResult.targetVersion,
              });
            
              return {
                ...modeResult,
                ...previousTagResult,
                compareRange: buildCompareRange(previousTagResult.previousTag),
              };
            }
            
            if (typeof module !== 'undefined') {
              module.exports = {
                RELEASE_BRANCH_PATTERN,
                SEMVER_TAG_PATTERN,
                buildCompareRange,
                buildReleaseContext,
                parseSemverTags,
                resolveReleaseMode,
                selectPreviousTag,
              };
            }
            
            /**
             * Rewrite a single section in CHANGELOG.md without affecting other sections.
             * Extracted from the changelog-generation inline render step for reuse and tests.
             */
            
            /**
             * @param {string[]} lines
             * @param {number} startIndex
             * @returns {number}
             */
            function findSectionEnd(lines, startIndex) {
              for (let i = startIndex + 1; i < lines.length; i++) {
                if (/^## /.test(lines[i])) {
                  return i;
                }
              }
              return lines.length;
            }
            
            /**
             * @param {string} content - Current CHANGELOG.md content.
             * @param {string} newSectionContent - Full replacement (header + body).
             * @param {'unreleased'|'release'} mode
             * @param {string} targetVersion - Version without leading v (release mode only).
             * @returns {string}
             */
            function rewriteChangelogSection(content, newSectionContent, mode, targetVersion) {
              const lines = content.split('\n');
            
              let targetStart = -1;
            
              if (mode === 'unreleased') {
                targetStart = lines.findIndex((line) => /^## \[Unreleased\]/.test(line));
              } else {
                targetStart = lines.findIndex((line) => line.startsWith(`## [${targetVersion}]`));
              }
            
              if (targetStart === -1) {
                if (mode === 'release') {
                  const unreleasedStart = lines.findIndex((line) => /^## \[Unreleased\]/.test(line));
                  if (unreleasedStart !== -1) {
                    const insertAfter = findSectionEnd(lines, unreleasedStart);
                    const before = lines.slice(0, insertAfter);
                    const after = lines.slice(insertAfter);
                    return [...before, '', newSectionContent, ...after].join('\n');
                  }
                  return newSectionContent + '\n\n' + content;
                }
                return newSectionContent + '\n\n' + content;
              }
            
              const sectionEnd = findSectionEnd(lines, targetStart);
            
              const before = lines.slice(0, targetStart);
              const after = lines.slice(sectionEnd);
            
              while (before.length > 0 && before[before.length - 1] === '') {
                before.pop();
              }
            
              const parts = [...before];
              if (parts.length > 0) parts.push('');
              parts.push(newSectionContent);
            
              let afterStart = 0;
              while (afterStart < after.length && after[afterStart] === '') {
                afterStart++;
              }
            
              if (afterStart < after.length) {
                parts.push('');
                parts.push(...after.slice(afterStart));
              }
            
              return parts.join('\n');
            }
            
            if (typeof module !== 'undefined') {
              module.exports = {
                findSectionEnd,
                rewriteChangelogSection,
              };
            }
            
            /**
             * Deterministic changelog renderer.
             *
             * Converts an array of merged PR metadata records (each with a parsed
             * `## Changelog` section) into a rendered changelog section body.
             *
             * Rendering rules:
             * - PRs with the `no-changelog` label are silently excluded.
             * - PRs with `Customer impact: none` produce no change bullet (but may
             *   still contribute breaking-change blocks).
             * - PRs that have neither the `no-changelog` label nor a parseable
             *   `## Changelog` section cause a hard assembly failure.
             * - Breaking-change blocks from included PRs are collected and placed
             *   under a `### Breaking changes` subsection.
             * - Regular change bullets are placed under `### Changes`.
             * - Normalization is minimal: standard `- ` bullet prefix, citation
             *   shape `([#NNN](url))`, and consistent whitespace. Author-provided
             *   summary text is preserved verbatim.
             */
            
            /**
             * Helpers to parse and validate the PR-body `## Changelog` contract.
             *
             * Contract:
             *   ## Changelog
             *   Customer impact: <none|fix|enhancement|breaking>
             *   Summary: <text>          (required when Customer impact is not "none")
             *
             *   ### Breaking changes
             *   <free-form markdown>     (optional subsection)
             */
            
            const VALID_CUSTOMER_IMPACTS = new Set(['none', 'fix', 'enhancement', 'breaking']);
            
            /**
             * Extract the raw text of the `## Changelog` section from a PR body.
             * Returns the content between `## Changelog` and the next `##`-level heading
             * (or the end of the string).
             *
             * @param {string} body
             * @returns {string|null}
             */
            function extractChangelogSection(body) {
              if (!body) return null;
            
              const lines = body.split('\n');
              let inChangelog = false;
              /** @type {null | '`' | '~'} */
              let fenceType = null;
              const content = [];
            
              for (const line of lines) {
                if (/^##\s+Changelog/.test(line)) {
                  inChangelog = true;
                  continue;
                }
                if (inChangelog) {
                  if (fenceType === null && /^```/.test(line)) {
                    fenceType = '`';
                  } else if (fenceType === null && /^~~~/.test(line)) {
                    fenceType = '~';
                  } else if (fenceType === '`' && /^```/.test(line)) {
                    fenceType = null;
                  } else if (fenceType === '~' && /^~~~/.test(line)) {
                    fenceType = null;
                  }
                  if (fenceType === null && /^##\s/.test(line)) {
                    break;
                  }
                  content.push(line);
                }
              }
            
              if (!inChangelog) return null;
            
              return content.join('\n');
            }
            
            /**
             * Extract the raw markdown content of the `### Breaking changes` subsection
             * from a PR body string. Returns everything from the heading line (exclusive)
             * up to the next `##` or `###` heading, or the end of the string.
             *
             * @param {string} body
             * @returns {string|null} Trimmed markdown content, or null if not present or empty.
             */
            function extractBreakingChanges(changelogSection) {
              if (!changelogSection) return null;
            
              const lines = changelogSection.split('\n');
              let inBreaking = false;
              /** @type {null | '`' | '~'} */
              let fenceType = null;
              const content = [];
            
              for (const line of lines) {
                if (/^###\s+Breaking changes/.test(line)) {
                  inBreaking = true;
                  continue;
                }
                if (inBreaking) {
                  if (fenceType === null && /^```/.test(line)) {
                    fenceType = '`';
                  } else if (fenceType === null && /^~~~/.test(line)) {
                    fenceType = '~';
                  } else if (fenceType === '`' && /^```/.test(line)) {
                    fenceType = null;
                  } else if (fenceType === '~' && /^~~~/.test(line)) {
                    fenceType = null;
                  }
                  if (fenceType === null && /^#{2,3}\s/.test(line)) {
                    break;
                  }
                  content.push(line);
                }
              }
            
              if (!inBreaking) return null;
            
              const trimmed = content.join('\n').trimEnd();
              return trimmed.length > 0 ? trimmed : null;
            }
            
            /**
             * Parse the `## Changelog` section from a PR body string.
             *
             * @param {string} body - Full PR body text.
             * @returns {{ customerImpact: string|null, summary: string|null, breakingChanges: string|null }|null}
             *   Returns null when no `## Changelog` section is found.
             */
            function parseChangelogSection(body) {
              const section = extractChangelogSection(body);
              if (section === null) return null;
            
              // Parse `Customer impact: <value>`
              const customerImpactMatch = section.match(/^Customer impact:\s*(.+)$/m);
              const customerImpact = customerImpactMatch ? customerImpactMatch[1].trim() : null;
            
              // Parse `Summary: <text>`
              const summaryMatch = section.match(/^Summary:\s*(.+)$/m);
              const summary = summaryMatch ? summaryMatch[1].trim() : null;
            
              // Extract breaking changes from the changelog section only
              const breakingChanges = extractBreakingChanges(section);
            
              return {
                customerImpact,
                summary: summary || null,
                breakingChanges,
              };
            }
            
            /**
             * Validate a parsed changelog section.
             *
             * @param {{ customerImpact: string|null, summary: string|null, breakingChanges: string|null }|null} parsed
             * @returns {{ valid: boolean, errors: string[] }}
             */
            function validateChangelogSection(parsed) {
              const errors = [];
            
              if (parsed === null) {
                errors.push('No ## Changelog section found in PR body');
                return { valid: false, errors };
              }
            
              const { customerImpact, summary } = parsed;
            
              // Validate Customer impact
              if (!customerImpact) {
                errors.push('Missing required field: Customer impact');
              } else if (!VALID_CUSTOMER_IMPACTS.has(customerImpact)) {
                errors.push(
                  `Invalid Customer impact value: "${customerImpact}". Must be one of: ${[...VALID_CUSTOMER_IMPACTS].join(', ')}`
                );
              }
            
              // Summary is required unless Customer impact is "none"
              if (customerImpact && customerImpact !== 'none' && VALID_CUSTOMER_IMPACTS.has(customerImpact)) {
                if (!summary) {
                  errors.push('Missing required field: Summary (required when Customer impact is not "none")');
                }
              }
            
              return {
                valid: errors.length === 0,
                errors,
              };
            }
            
            /**
             * Internal variant that also detects whether a `### Breaking changes` heading
             * was present but had no content.
             *
             * @param {string} body
             * @returns {{ customerImpact: string|null, summary: string|null, breakingChanges: string|null, breakingChangesHeadingPresent: boolean }|null}
             */
            function parseChangelogSectionFull(body) {
              const section = extractChangelogSection(body);
              if (section === null) return null;
            
              const customerImpactMatch = section.match(/^Customer impact:\s*(.+)$/m);
              const customerImpact = customerImpactMatch ? customerImpactMatch[1].trim() : null;
            
              const summaryMatch = section.match(/^Summary:\s*(.+)$/m);
              const summary = summaryMatch ? summaryMatch[1].trim() : null;
            
              // Detect whether the heading exists within the changelog section (not the full body)
              const lines = section.split('\n');
              const breakingChangesHeadingPresent = lines.some((line) => /^###\s+Breaking changes/.test(line));
              const breakingChanges = extractBreakingChanges(section);
            
              return {
                customerImpact,
                summary: summary || null,
                breakingChanges,
                breakingChangesHeadingPresent,
              };
            }
            
            /**
             * Validate a full parsed changelog section (including empty breaking-changes detection).
             *
             * @param {ReturnType<typeof parseChangelogSectionFull>|null} parsed
             * @returns {{ valid: boolean, errors: string[] }}
             */
            function validateChangelogSectionFull(parsed) {
              const base = validateChangelogSection(parsed);
              if (!parsed) return base;
            
              const errors = [...base.errors];
            
              if (parsed.breakingChangesHeadingPresent && parsed.breakingChanges === null) {
                errors.push('### Breaking changes section is present but contains no content');
              }
            
              if (parsed.customerImpact === 'breaking' && !parsed.breakingChangesHeadingPresent) {
                errors.push('Customer impact: breaking requires a ### Breaking changes subsection');
              }
            
              return { valid: errors.length === 0, errors };
            }
            
            if (typeof module !== 'undefined') {
              module.exports = {
                VALID_CUSTOMER_IMPACTS,
                extractBreakingChanges,
                extractChangelogSection,
                parseChangelogSection,
                parseChangelogSectionFull,
                validateChangelogSection,
                validateChangelogSectionFull,
              };
            }
            
            /* global parseChangelogSectionFull, validateChangelogSectionFull */
            
            const NO_CHANGELOG_LABEL = 'no-changelog';
            
            /**
             * Result from assembling PR changelog data.
             *
             * @typedef {Object} RenderResult
             * @property {boolean} success
             * @property {string|null} sectionBody - Rendered markdown body (without section header line), or null on failure.
             * @property {AssemblyError[]} errors - Assembly errors (non-empty only when success is false).
             * @property {IncludedPR[]} included - PRs that contributed at least one bullet or breaking-change block.
             * @property {ExcludedPR[]} excluded - PRs that were explicitly excluded (no-changelog or Customer impact: none).
             */
            
            /**
             * @typedef {Object} AssemblyError
             * @property {number} prNumber
             * @property {string} prUrl
             * @property {string} reason
             */
            
            /**
             * @typedef {Object} IncludedPR
             * @property {number} prNumber
             * @property {string} prUrl
             * @property {string} summary
             * @property {string|null} breakingChanges
             */
            
            /**
             * @typedef {Object} ExcludedPR
             * @property {number} prNumber
             * @property {string} prUrl
             * @property {string} reason
             * @property {string|null} [breakingChanges] - Present when a `Customer impact: none` PR also had a ### Breaking changes block.
             */
            
            /**
             * Normalize a bullet line: ensure it starts with `- ` (strip leading `-`, `*`, `+` and spaces).
             *
             * @param {string} line
             * @returns {string}
             */
            function normalizeBulletPrefix(line) {
              return '- ' + line.replace(/^[-*+]\s*/, '').replace(/^\s+/, '');
            }
            
            /**
             * Build a citation string for a PR.
             *
             * @param {number} prNumber
             * @param {string} prUrl
             * @returns {string} e.g. `([#123](https://github.com/.../pull/123))`
             */
            function buildCitation(prNumber, prUrl) {
              return `([#${prNumber}](${prUrl}))`;
            }
            
            /**
             * Build a normalized change bullet from a PR summary and citation.
             *
             * @param {string} summary - Author-provided summary text (preserved verbatim).
             * @param {number} prNumber
             * @param {string} prUrl
             * @returns {string}
             */
            function buildChangeBullet(summary, prNumber, prUrl) {
              // Normalize the bullet prefix on the summary line, then append the citation.
              const normalizedSummary = normalizeBulletPrefix(summary.trim());
              const citation = buildCitation(prNumber, prUrl);
              return `${normalizedSummary} ${citation}`;
            }
            
            /**
             * Render a changelog section body from an array of merged PR records.
             *
             * Each PR record must have:
             *   - `number` {number}
             *   - `url` {string}
             *   - `labels` {string[]}
             *   - `body` {string|null}
             *
             * @param {Array<{number: number, url: string, labels: string[], body: string|null}>} mergedPRs
             * @returns {RenderResult}
             */
            function renderChangelogSection(mergedPRs) {
              const errors = [];
              const included = [];
              const excluded = [];
            
              const changeBullets = [];
              const breakingChangeBlocks = [];
            
              for (const pr of mergedPRs) {
                const { number: prNumber, url: prUrl, labels, body } = pr;
                const labelNames = Array.isArray(labels) ? labels : [];
            
                // Exclude PRs with the no-changelog label
                if (labelNames.includes(NO_CHANGELOG_LABEL)) {
                  excluded.push({ prNumber, prUrl, reason: 'no-changelog label' });
                  continue;
                }
            
                // Parse and validate the changelog section from the PR body
                const parsed = parseChangelogSectionFull(body || '');
            
                if (parsed === null) {
                  // No parseable ## Changelog section and no no-changelog label — hard fail
                  errors.push({
                    prNumber,
                    prUrl,
                    reason:
                      `PR #${prNumber} (${prUrl}) has no parseable ## Changelog section and is not labeled 'no-changelog'. ` +
                      'Add a ## Changelog section to the PR body or apply the no-changelog label.',
                  });
                  continue;
                }
            
                // Validate structural correctness (invalid customerImpact, empty breaking-changes heading, etc.)
                const { valid, errors: validationErrors } = validateChangelogSectionFull(parsed);
                if (!valid) {
                  if (parsed.customerImpact === null) {
                    errors.push({
                      prNumber,
                      prUrl,
                      reason: `PR #${prNumber}: ## Changelog section is missing the required Customer impact field`,
                    });
                  } else {
                    errors.push({
                      prNumber,
                      prUrl,
                      reason: `PR #${prNumber}: ## Changelog section failed validation: ${validationErrors.join('; ')}`,
                    });
                  }
                  continue;
                }
            
                const { customerImpact, summary, breakingChanges } = parsed;
            
                // Collect breaking-change block regardless of customerImpact
                if (breakingChanges) {
                  breakingChangeBlocks.push({ prNumber, prUrl, breakingChanges });
                }
            
                // customerImpact === null case is already caught by validateChangelogSectionFull above
                if (customerImpact.trim().toLowerCase() === 'none') {
                  const excludedEntry = { prNumber, prUrl, reason: 'Customer impact: none' };
                  if (breakingChanges !== null) {
                    excludedEntry.breakingChanges = breakingChanges;
                  }
                  excluded.push(excludedEntry);
                  continue;
                }
            
                if (!summary) {
                  // Missing summary for a non-none impact — treat as assembly error
                  errors.push({
                    prNumber,
                    prUrl,
                    reason:
                      `PR #${prNumber} (${prUrl}) has Customer impact: ${customerImpact} but is missing the required Summary field.`,
                  });
                  continue;
                }
            
                const bullet = buildChangeBullet(summary, prNumber, prUrl);
                changeBullets.push(bullet);
                included.push({ prNumber, prUrl, summary, breakingChanges: breakingChanges || null });
              }
            
              if (errors.length > 0) {
                return { success: false, sectionBody: null, errors, included, excluded };
              }
            
              // Render the section body
              const sectionParts = [];
            
              if (breakingChangeBlocks.length > 0) {
                sectionParts.push('### Breaking changes');
                sectionParts.push('');
                for (const { breakingChanges } of breakingChangeBlocks) {
                  // Preserve the author-provided breaking-change prose verbatim, trimming
                  // only trailing whitespace from the block as a whole.
                  sectionParts.push(breakingChanges.trimEnd());
                  sectionParts.push('');
                }
              }
            
              if (changeBullets.length > 0) {
                sectionParts.push('### Changes');
                sectionParts.push('');
                for (const bullet of changeBullets) {
                  sectionParts.push(bullet);
                }
                sectionParts.push('');
              }
            
              // Trim trailing blank lines
              while (sectionParts.length > 0 && sectionParts[sectionParts.length - 1] === '') {
                sectionParts.pop();
              }
            
              const sectionBody = sectionParts.length > 0 ? sectionParts.join('\n') : '';
            
              return { success: true, sectionBody, errors: [], included, excluded };
            }
            
            if (typeof module !== 'undefined') {
              module.exports = {
                NO_CHANGELOG_LABEL,
                buildChangeBullet,
                buildCitation,
                normalizeBulletPrefix,
                renderChangelogSection,
              };
            }
            
            /**
             * Dependency-injected changelog engine. Used from changelog-engine.js (Node)
             * and from changelog-engine-workflow.js (inlined into GitHub Actions scripts).
             */
            
            /** Semver X.Y.Z without leading `v` */
            const TARGET_VERSION_PATTERN = /^\d+\.\d+\.\d+$/;
            
            const TAG_LIST_CMD =
              'git tag --list "v[0-9]*.[0-9]*.[0-9]*" --sort=-version:refname';
            
            /**
             * @param {{
             *   parseSemverTags: Function,
             *   selectPreviousTag: Function,
             *   buildCompareRange: Function,
             *   rewriteChangelogSection: Function,
             *   renderChangelogSection: Function,
             *   execSyncDefault?: Function,
             * }} deps
             */
            function createChangelogEngine(deps) {
              const {
                parseSemverTags,
                selectPreviousTag,
                buildCompareRange,
                rewriteChangelogSection,
                renderChangelogSection,
                execSyncDefault,
              } = deps;
            
              const fallbackExec =
                execSyncDefault ?? require('child_process').execSync;
            
              function validateModeAndTargetVersion(mode, targetVersion, core) {
                if (mode !== 'unreleased' && mode !== 'release') {
                  const msg = `Invalid changelog mode: "${mode}". Must be 'unreleased' or 'release'.`;
                  if (core && typeof core.setFailed === 'function') core.setFailed(msg);
                  throw new Error(msg);
                }
                if (mode === 'release') {
                  if (!targetVersion || !TARGET_VERSION_PATTERN.test(targetVersion)) {
                    const msg =
                      'Release mode requires targetVersion: a non-empty semver string X.Y.Z without a leading "v".';
                    if (core && typeof core.setFailed === 'function') core.setFailed(msg);
                    throw new Error(msg);
                  }
                }
              }
            
              function formatAssemblyFailureMessage(errors) {
                const errorMessages = errors.map((e) => `  - ${e.reason}`).join('\n');
                return (
                  `Changelog assembly failed. The following pull requests are missing a required ## Changelog section or Summary field:\n${errorMessages}\n\n` +
                  'Each merged PR must either:\n' +
                  "  1. Have a '## Changelog' section with 'Customer impact' and (when not 'none') a 'Summary' field, OR\n" +
                  "  2. Be labeled 'no-changelog'"
                );
              }
            
              function parseCommitShas(raw = '') {
                return raw
                  .split('\n')
                  .map((sha) => sha.trim())
                  .filter(Boolean);
              }
            
              function getLabelNames(pr) {
                return (pr.labels ?? []).map((label) => label.name);
              }
            
              function resolveChangelogCompareContext({ mode, targetVersion, exec, core }) {
                validateModeAndTargetVersion(mode, targetVersion, core);
            
                let tags = [];
                try {
                  const tagsRaw = exec(TAG_LIST_CMD, {
                    encoding: 'utf8',
                    stdio: ['pipe', 'pipe', 'pipe'],
                  }).trim();
                  tags = parseSemverTags(tagsRaw);
                } catch (err) {
                  if (core && typeof core.warning === 'function') {
                    core.warning(`Failed to list git tags: ${err.message}`);
                  }
                }
            
                const {
                  previousTag,
                  excludedTag,
                  excludedCurrentTag,
                } = selectPreviousTag({ tags, mode, targetVersion });
                const compareRange = buildCompareRange(previousTag);
                const targetBranch =
                  mode === 'unreleased' ? 'generated-changelog' : `prep-release-${targetVersion}`;
            
                return {
                  previousTag,
                  compareRange,
                  targetBranch,
                  excludedTag,
                  excludedCurrentTag,
                  tags,
                };
              }
            
              async function gatherMergedPRRecordsForRange({
                github,
                owner,
                repo,
                compareRange,
                exec,
                core,
              }) {
                const range = compareRange || 'HEAD';
                let commitSHAs = [];
                try {
                  const raw = exec(`git log --format=%H ${range}`, {
                    encoding: 'utf8',
                    stdio: ['pipe', 'pipe', 'pipe'],
                  }).trim();
                  commitSHAs = parseCommitShas(raw);
                  if (core && typeof core.info === 'function') {
                    core.info(`Found ${commitSHAs.length} commit(s) in range ${range}`);
                  }
                } catch (err) {
                  if (core && typeof core.warning === 'function') {
                    core.warning(`Failed to list commits in range: ${err.message}`);
                  }
                }
            
                const mergedPullRequestsByNumber = new Map();
            
                for (const sha of commitSHAs) {
                  try {
                    const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                      owner,
                      repo,
                      commit_sha: sha,
                    });
                    for (const pr of prs) {
                      if (pr.state === 'closed' && pr.merged_at && !mergedPullRequestsByNumber.has(pr.number)) {
                        mergedPullRequestsByNumber.set(pr.number, pr);
                      }
                    }
                  } catch (err) {
                    if (core && typeof core.warning === 'function') {
                      core.warning(`Failed to list PRs for commit ${sha}: ${err.message}`);
                    }
                  }
                }
            
                const mergedPullRequests = Array.from(mergedPullRequestsByNumber.values());
                if (core && typeof core.info === 'function') {
                  core.info(`Found ${mergedPullRequests.length} unique merged PR(s) in compare range`);
                }
            
                return mergedPullRequests.map((pr) => ({
                  number: pr.number,
                  title: pr.title,
                  url: pr.html_url,
                  merge_commit_sha: pr.merge_commit_sha,
                  author: pr.user?.login ?? 'unknown',
                  labels: getLabelNames(pr),
                  body: pr.body || '',
                }));
              }
            
              function runChangelogRenderAndWrite({ core, prRecords, mode, targetVersion, changelogPath, fs }) {
                validateModeAndTargetVersion(mode, targetVersion, core);
            
                const result = renderChangelogSection(prRecords);
            
                if (!result.success) {
                  const msg = formatAssemblyFailureMessage(result.errors);
                  if (core && typeof core.setFailed === 'function') core.setFailed(msg);
                  const err = new Error(msg);
                  err.assemblyErrors = result.errors;
                  throw err;
                }
            
                let currentChangelog = '';
                try {
                  currentChangelog = fs.readFileSync(changelogPath, 'utf8');
                } catch (err) {
                  if (core && typeof core.warning === 'function') {
                    core.warning(`Could not read ${changelogPath}: ${err.message}. Will create a new file.`);
                  }
                }
            
                const today = new Date().toISOString().split('T')[0];
                let sectionHeader;
                if (mode === 'release' && targetVersion) {
                  sectionHeader = `## [${targetVersion}] - ${today}`;
                } else {
                  sectionHeader = '## [Unreleased]';
                }
            
                const sectionBody = result.sectionBody;
                const newSectionContent = sectionBody
                  ? `${sectionHeader}\n\n${sectionBody}`
                  : `${sectionHeader}`;
            
                const updatedChangelog = rewriteChangelogSection(
                  currentChangelog,
                  newSectionContent,
                  mode,
                  targetVersion
                );
            
                try {
                  fs.writeFileSync(changelogPath, updatedChangelog, 'utf8');
                  if (core && typeof core.info === 'function') {
                    core.info(`CHANGELOG.md updated with section: ${sectionHeader}`);
                  }
                } catch (err) {
                  const msg = `Failed to write ${changelogPath}: ${err.message}`;
                  if (core && typeof core.setFailed === 'function') core.setFailed(msg);
                  throw new Error(msg);
                }
            
                const hasPRs = prRecords.length > 0;
                // hasUserFacingChanges reflects whether the rendered section body has any
                // content the changelog should publish. This is broader than `included`
                // (PRs that contributed change bullets) because PRs marked
                // `Customer impact: none` can still contribute a `### Breaking changes`
                // block, which is user-facing and must be committed/pushed.
                const hasUserFacingChanges =
                  typeof sectionBody === 'string' && sectionBody.trim().length > 0;
            
                return {
                  sectionHeader,
                  hasPRs,
                  hasUserFacingChanges,
                  included: result.included,
                  excluded: result.excluded,
                  errors: [],
                };
              }
            
              async function runChangelogEngine({
                github,
                core,
                mode,
                targetVersion = '',
                owner,
                repo,
                changelogPath = 'CHANGELOG.md',
                exec = fallbackExec,
                fs = require('fs'),
              }) {
                validateModeAndTargetVersion(mode, targetVersion, core);
            
                const {
                  previousTag,
                  compareRange,
                  targetBranch,
                  excludedTag,
                  excludedCurrentTag,
                  tags,
                } = resolveChangelogCompareContext({ mode, targetVersion, exec, core });
            
                if (mode === 'release' && core && typeof core.info === 'function') {
                  core.info(`Release mode: version=${targetVersion}`);
                }
                if (excludedCurrentTag && core && typeof core.info === 'function') {
                  core.info(`Excluded current release tag ${excludedTag} from previous tag candidates`);
                }
                if (previousTag && core && typeof core.info === 'function') {
                  core.info(`Resolved previous tag: ${previousTag}`);
                } else if (tags.length === 0 && core && typeof core.warning === 'function') {
                  core.warning('No semver release tags found; compare range will cover full history');
                }
            
                const prRecords = await gatherMergedPRRecordsForRange({
                  github,
                  owner,
                  repo,
                  compareRange,
                  exec,
                  core,
                });
            
                const renderOutcome = runChangelogRenderAndWrite({
                  core,
                  prRecords,
                  mode,
                  targetVersion,
                  changelogPath,
                  fs,
                });
            
                return {
                  mode,
                  targetVersion: mode === 'release' ? targetVersion : '',
                  previousTag,
                  compareRange,
                  targetBranch,
                  sectionHeader: renderOutcome.sectionHeader,
                  hasPRs: renderOutcome.hasPRs,
                  hasUserFacingChanges: renderOutcome.hasUserFacingChanges,
                  included: renderOutcome.included,
                  excluded: renderOutcome.excluded,
                  errors: [],
                };
              }
            
              return {
                TARGET_VERSION_PATTERN,
                validateModeAndTargetVersion,
                resolveChangelogCompareContext,
                gatherMergedPRRecordsForRange,
                formatAssemblyFailureMessage,
                runChangelogRenderAndWrite,
                runChangelogEngine,
              };
            }
            
            if (typeof module !== 'undefined') {
              module.exports = {
                TARGET_VERSION_PATTERN,
                createChangelogEngine,
              };
            }
            
            // `execSync` MUST be declared in the including entry script (e.g. run-changelog-engine.inline.js)
            // before this file is expanded, so we do not re-declare it here (duplicate const breaks the bundle).
            
            const _changelogEngine = createChangelogEngine({
              parseSemverTags,
              selectPreviousTag,
              buildCompareRange,
              rewriteChangelogSection,
              renderChangelogSection,
              execSyncDefault: execSync,
            });
            
            // `TARGET_VERSION_PATTERN` is intentionally NOT destructured here: it is already declared as a
            // `const` by the included `changelog-engine-factory.js`, and a second `const` in the same scope
            // would be a SyntaxError when this bundle is inlined into the workflow YAML.
            const {
              validateModeAndTargetVersion,
              resolveChangelogCompareContext,
              gatherMergedPRRecordsForRange,
              formatAssemblyFailureMessage,
              runChangelogRenderAndWrite,
              runChangelogEngine,
            } = _changelogEngine;
            
            // Mode is workflow-driven via MODE env only; the inlined bundle still carries resolveReleaseMode (event-based) from changelog-release-context.js for tests/lib reuse—unused on this path until that module is split.
            
            const { owner, repo } = context.repo;
            
            const mode = (process.env.MODE || 'unreleased').trim();
            const targetVersion = (process.env.TARGET_VERSION || '').trim();
            const targetBranchOverride = (process.env.TARGET_BRANCH || '').trim();
            
            const ctx = resolveChangelogCompareContext({
              mode,
              targetVersion,
              exec: execSync,
              core,
            });
            
            const effectiveTargetBranch = targetBranchOverride || ctx.targetBranch;
            
            if (mode === 'release') {
              core.info(`Release mode: version=${targetVersion}, push branch=${effectiveTargetBranch}`);
            }
            if (ctx.excludedCurrentTag) {
              core.info(
                `Excluded current release tag ${ctx.excludedTag} from previous tag candidates`
              );
            }
            if (ctx.previousTag) {
              core.info(`Resolved previous tag: ${ctx.previousTag}`);
            } else if (ctx.tags.length === 0) {
              core.warning('No semver release tags found; compare range will cover full history');
            }
            
            const prRecords = await gatherMergedPRRecordsForRange({
              github,
              owner,
              repo,
              compareRange: ctx.compareRange,
              exec: execSync,
              core,
            });
            
            const hasPRs = prRecords.length > 0;
            let sectionHeader = '';
            let hasUserFacingChanges = false;
            
            const shouldRenderChangelog = mode === 'release' || hasPRs;
            
            if (shouldRenderChangelog) {
              const changelogPath = process.env.CHANGELOG_PATH || 'CHANGELOG.md';
              const out = runChangelogRenderAndWrite({
                core,
                prRecords,
                mode,
                targetVersion,
                changelogPath,
                fs,
              });
              sectionHeader = out.sectionHeader;
              hasUserFacingChanges = out.hasUserFacingChanges;
              core.info(`Included ${out.included.length} PR(s) with change bullets or breaking changes`);
              core.info(`Excluded ${out.excluded.length} PR(s) (no-changelog or Customer impact: none)`);
              for (const ex of out.excluded) {
                core.info(`  Excluded PR #${ex.prNumber}: ${ex.reason}`);
              }
              core.info(`Changelog section rendered: ${out.sectionHeader}`);
            } else {
              core.info('No merged PRs in compare range; skipping changelog file update');
              sectionHeader = '## [Unreleased]';
            }
            
            core.setOutput('mode', mode);
            core.setOutput('target_version', mode === 'release' ? targetVersion : '');
            core.setOutput('previous_tag', ctx.previousTag);
            core.setOutput('compare_range', ctx.compareRange);
            core.setOutput('target_branch', effectiveTargetBranch);
            core.setOutput('has_prs', hasPRs ? 'true' : 'false');
            core.setOutput(
              'has_user_facing_changes',
              hasUserFacingChanges ? 'true' : 'false'
            );
            core.setOutput('section_header', sectionHeader);
            
            core.info(`Mode: ${mode}`);
            core.info(`Compare range: ${ctx.compareRange}`);
            core.info(`Target branch: ${effectiveTargetBranch}`);
            
      - name: Commit changelog (release mode)
        id: commit_release
        if: steps.changelog_engine.outputs.mode == 'release'
        env:
          TARGET_VERSION: ${{ steps.changelog_engine.outputs.target_version }}
          TARGET_BRANCH: ${{ steps.changelog_engine.outputs.target_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "pushed=false" >> $GITHUB_OUTPUT
            echo "ran=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "chore(changelog): update changelog for v${TARGET_VERSION}"
          git push origin HEAD:${TARGET_BRANCH}
          echo "pushed=true" >> $GITHUB_OUTPUT
          echo "ran=true" >> $GITHUB_OUTPUT

      - name: Refresh release PR metadata (release mode)
        if: >-
          steps.changelog_engine.outputs.mode == 'release' &&
          steps.commit_release.outputs.ran == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          COMPARE_RANGE: ${{ steps.changelog_engine.outputs.compare_range }}
          TARGET_VERSION: ${{ steps.changelog_engine.outputs.target_version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            /**
             * PR management helpers for the changelog-generation workflow.
             *
             * Extracted from inline `actions/github-script` blocks so the logic can be
             * unit-tested independently of the GitHub Actions runner.
             *
             * Two functions handle the two distinct modes:
             *   - manageUnreleasedPR  — singleton `generated-changelog` → `main` PR
             *   - refreshReleasePR    — update the prep-release-* PR body with metadata
             */
            
            /**
             * Build the PR body for the generated-changelog PR (unreleased mode).
             *
             * @param {{ compareRange: string }} opts
             * @returns {string}
             */
            function buildUnreleasedPRBody({ compareRange }) {
              const today = new Date().toISOString().split('T')[0];
              return [
                `**Generated:** ${today}`,
                `**Compare range:** \`${compareRange}\``,
                '',
                '> This PR is auto-generated by the changelog-generation workflow.',
                '> Re-runs will force-push this branch and overwrite any manual edits.',
                '> Do not make manual edits to the `generated-changelog` branch.',
              ].join('\n');
            }
            
            /**
             * Build the PR body for the release prep PR (release mode).
             *
             * @param {{ targetVersion: string, compareRange: string }} opts
             * @returns {string}
             */
            function buildReleasePRBody({ targetVersion, compareRange }) {
              const today = new Date().toISOString().split('T')[0];
              return [
                `**Generated:** ${today}`,
                `**Version:** \`${targetVersion}\``,
                `**Compare range:** \`${compareRange}\``,
                '',
                '> This PR body was last refreshed by the changelog-generation workflow.',
              ].join('\n');
            }
            
            /**
             * Manage the singleton `generated-changelog` PR (unreleased mode).
             *
             * Looks up any existing open PR from `generated-changelog` → `main`.
             * If found, updates its body and returns action='updated'.
             * If not found, creates a new PR and returns action='created'.
             *
             * @param {{ github: object, owner: string, repo: string, compareRange: string }} opts
             * @returns {Promise<{ prAction: string, prNumber: number, prUrl: string }>}
             */
            async function manageUnreleasedPR({ github, owner, repo, compareRange }) {
              const prBody = buildUnreleasedPRBody({ compareRange });
            
              const { data: existingPRs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                head: `${owner}:generated-changelog`,
                base: 'main',
              });
            
              if (existingPRs.length > 0) {
                const existingPR = existingPRs[0];
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: existingPR.number,
                  body: prBody,
                });
                return {
                  prAction: 'updated',
                  prNumber: existingPR.number,
                  prUrl: existingPR.html_url,
                };
              }
            
              const { data: newPR } = await github.rest.pulls.create({
                owner,
                repo,
                title: 'chore: update CHANGELOG.md [Unreleased] section',
                body: prBody,
                head: 'generated-changelog',
                base: 'main',
              });
              return {
                prAction: 'created',
                prNumber: newPR.number,
                prUrl: newPR.html_url,
              };
            }
            
            /**
             * Find the open release prep PR for a version (`prep-release-<semver>` → `main`).
             *
             * @param {{ github: object, owner: string, repo: string, targetVersion: string }} opts
             * @returns {Promise<number|null>}
             */
            async function findOpenReleasePrepPRNumber({ github, owner, repo, targetVersion }) {
              if (!targetVersion) {
                return null;
              }
              const head = `prep-release-${targetVersion}`;
              const { data: prs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                head: `${owner}:${head}`,
                base: 'main',
              });
              return prs.length > 0 ? prs[0].number : null;
            }
            
            /**
             * Refresh the release prep PR body with generated metadata.
             *
             * When `prNumber` is absent (e.g. workflow_dispatch), looks up an open PR with
             * head `prep-release-<targetVersion>` and base `main`.
             *
             * @param {{ github: object, core: object, owner: string, repo: string, prNumber: number|null|undefined, compareRange: string, targetVersion: string }} opts
             * @returns {Promise<void>}
             */
            async function refreshReleasePR({ github, core, owner, repo, prNumber, compareRange, targetVersion }) {
              let num = prNumber ?? null;
              if (!num) {
                num = await findOpenReleasePrepPRNumber({ github, owner, repo, targetVersion });
              }
              if (!num) {
                core.warning(
                  'Could not resolve a release prep PR to refresh (no PR number and no open PR for ' +
                    `prep-release-${targetVersion || '<version>'} → main); skipping PR body update`
                );
                return;
              }
            
              const prBody = buildReleasePRBody({ targetVersion, compareRange });
            
              core.info(`Refreshing release PR #${num} metadata`);
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: num,
                body: prBody,
              });
              core.info(`Release PR #${num} metadata refreshed`);
            }
            
            if (typeof module !== 'undefined') {
              module.exports = {
                buildUnreleasedPRBody,
                buildReleasePRBody,
                manageUnreleasedPR,
                findOpenReleasePrepPRNumber,
                refreshReleasePR,
              };
            }
            
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request?.number ?? null;
            const compareRange = process.env.COMPARE_RANGE;
            const targetVersion = process.env.TARGET_VERSION;
            
            await refreshReleasePR({ github, core, owner, repo, prNumber, compareRange, targetVersion });
            
      - name: Push to generated-changelog branch (unreleased mode)
        id: push_unreleased
        if: >-
          steps.changelog_engine.outputs.mode == 'unreleased' &&
          steps.changelog_engine.outputs.has_prs == 'true' &&
          steps.changelog_engine.outputs.has_user_facing_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "pushed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "chore(changelog): update unreleased changelog section"
          git push origin HEAD:generated-changelog --force
          echo "pushed=true" >> $GITHUB_OUTPUT

