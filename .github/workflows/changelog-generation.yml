# This file is generated by `scripts/compile-workflow-sources/main.go` from `.github/workflows-src/changelog-generation/workflow.yml.tmpl`. Do not edit directly.
name: Changelog Generation
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Changelog generation mode'
        required: true
        default: 'unreleased'
        type: choice
        options:
          - unreleased
          - release
      target_version:
        description: 'Target version for release mode (for example 0.14.5)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'release' && format('prep-release-{0}', inputs.target_version) || '' }}

      - name: Validate workflow inputs
        if: github.event_name == 'workflow_dispatch'
        env:
          MODE: ${{ inputs.mode }}
          TARGET_VERSION: ${{ inputs.target_version || '' }}
        run: |
          if [ "$MODE" = "release" ] && [ -z "$TARGET_VERSION" ]; then
            echo "target_version is required when mode=release" >&2
            exit 1
          fi

      - name: Run shared changelog engine
        id: changelog_engine
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          CHANGELOG_MODE: ${{ github.event_name == 'schedule' && 'unreleased' || inputs.mode }}
          TARGET_VERSION: ${{ inputs.target_version || '' }}
          CHANGELOG_PATH: CHANGELOG.md
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const RELEASE_BRANCH_PATTERN = /^prep-release-(.+)$/;
            const SEMVER_TAG_PATTERN = /^v\d+\.\d+\.\d+$/;
            
            function resolveReleaseMode({ eventName, headBranch = '' }) {
              let mode = 'unreleased';
              let targetVersion = '';
              let targetBranch = 'generated-changelog';
            
              if (eventName === 'pull_request' || eventName === 'pull_request_target') {
                const match = headBranch.match(RELEASE_BRANCH_PATTERN);
                if (match) {
                  mode = 'release';
                  targetVersion = match[1];
                  targetBranch = headBranch;
                }
              }
            
              return { mode, targetVersion, targetBranch };
            }
            
            function parseSemverTags(tagsRaw = '') {
              return tagsRaw
                .split('\n')
                .map((tag) => tag.trim())
                .filter((tag) => SEMVER_TAG_PATTERN.test(tag));
            }
            
            function selectPreviousTag({ tags = [], mode = 'unreleased', targetVersion = '' }) {
              const excludedTag = mode === 'release' && targetVersion ? `v${targetVersion}` : '';
              const candidates = excludedTag ? tags.filter((tag) => tag !== excludedTag) : tags;
            
              return {
                previousTag: candidates[0] ?? '',
                excludedTag,
                excludedCurrentTag: Boolean(excludedTag) && candidates.length < tags.length,
              };
            }
            
            function buildCompareRange(previousTag) {
              return previousTag ? `${previousTag}..HEAD` : 'HEAD';
            }
            
            function buildReleaseContext({ eventName, headBranch = '', tags = [] }) {
              const modeResult = resolveReleaseMode({ eventName, headBranch });
              const previousTagResult = selectPreviousTag({
                tags,
                mode: modeResult.mode,
                targetVersion: modeResult.targetVersion,
              });
            
              return {
                ...modeResult,
                ...previousTagResult,
                compareRange: buildCompareRange(previousTagResult.previousTag),
              };
            }
            
            if (typeof module !== 'undefined') {
              module.exports = {
                RELEASE_BRANCH_PATTERN,
                SEMVER_TAG_PATTERN,
                buildCompareRange,
                buildReleaseContext,
                parseSemverTags,
                resolveReleaseMode,
                selectPreviousTag,
              };
            }
            
            const USER_FACING_LABELS = new Set([
              'enhancement',
              'bug',
              'feature',
              'breaking-change',
              'deprecation',
              'new-resource',
              'new-data-source',
            ]);
            
            const INTERNAL_LABELS = new Set([
              'dependencies',
              'chore',
              'internal',
              'documentation',
              'ci',
              'test',
              'openspec',
            ]);
            
            const PROVIDER_PATH_PREFIXES = ['internal/', 'pkg/', 'libs/', 'provider/', 'go.mod', 'go.sum'];
            
            function getLabelNames(pr) {
              return (pr.labels ?? []).map((label) => label.name);
            }
            
            function classifyPullRequestForChangelog(pr, files = []) {
              const labels = getLabelNames(pr);
              const hasUserFacingLabel = labels.some((label) => USER_FACING_LABELS.has(label));
              const hasInternalLabel = labels.some((label) => INTERNAL_LABELS.has(label));
              const isAutomated =
                pr.user?.login === 'dependabot[bot]' ||
                pr.user?.login === 'dependabot' ||
                pr.user?.login === 'github-actions[bot]';
            
              const touchesProviderCode = files.some((file) =>
                PROVIDER_PATH_PREFIXES.some((prefix) => file.filename.startsWith(prefix))
              );
              const openspecOnly = files.length > 0 && files.every((file) => file.filename.startsWith('openspec/'));
            
              let classification;
              let inclusionRationale;
              let exclusionRationale;
            
              if (isAutomated) {
                classification = 'internal';
                exclusionRationale = `Automated PR by ${pr.user?.login}`;
              } else if (openspecOnly) {
                classification = 'internal';
                exclusionRationale = 'Touches only openspec/ files — no provider code changes';
              } else if (hasUserFacingLabel) {
                classification = 'user-facing';
                inclusionRationale = `Has user-facing label(s): ${labels
                  .filter((label) => USER_FACING_LABELS.has(label))
                  .join(', ')}`;
              } else if (hasInternalLabel && !touchesProviderCode) {
                classification = 'internal';
                exclusionRationale = `Has internal label(s): ${labels
                  .filter((label) => INTERNAL_LABELS.has(label))
                  .join(', ')} and does not touch provider code`;
              } else if (touchesProviderCode) {
                classification = 'user-facing';
                inclusionRationale = 'Touches provider implementation paths — presumed user-facing';
              } else {
                classification = 'uncertain';
                inclusionRationale = 'Classification uncertain — agent to decide';
              }
            
              return {
                classification,
                inclusionRationale: inclusionRationale ?? null,
                exclusionRationale: exclusionRationale ?? null,
              };
            }
            
            function parseCommitShas(raw = '') {
              return raw
                .split('\n')
                .map((sha) => sha.trim())
                .filter(Boolean);
            }
            
            function selectMergedPullRequests(prs = []) {
              const seen = new Set();
              const merged = [];
            
              for (const pr of prs) {
                if (pr.state === 'closed' && pr.merged_at && !seen.has(pr.number)) {
                  seen.add(pr.number);
                  merged.push(pr);
                }
              }
            
              return merged;
            }
            
            function buildPullRequestEvidence(pr, files = []) {
              const { classification, inclusionRationale, exclusionRationale } =
                classifyPullRequestForChangelog(pr, files);
            
              return {
                number: pr.number,
                title: pr.title,
                url: pr.html_url,
                merge_commit_sha: pr.merge_commit_sha,
                author: pr.user?.login ?? 'unknown',
                labels: getLabelNames(pr),
                touched_files: files.map((file) => file.filename),
                classification,
                inclusion_rationale: inclusionRationale,
                exclusion_rationale: exclusionRationale,
              };
            }
            
            function buildTargetSection({ mode = 'unreleased', targetVersion = '', date = new Date().toISOString() }) {
              if (mode === 'release' && targetVersion) {
                return `## [${targetVersion}] - ${String(date).split('T')[0]}`;
              }
            
              return '## [Unreleased]';
            }
            
            function countByClassification(evidence = []) {
              return {
                user_facing_count: evidence.filter((item) => item.classification === 'user-facing').length,
                internal_count: evidence.filter((item) => item.classification === 'internal').length,
                uncertain_count: evidence.filter((item) => item.classification === 'uncertain').length,
              };
            }
            
            function buildEvidenceManifest({
              mode = 'unreleased',
              targetVersion = '',
              previousTag = '',
              compareRange = 'HEAD',
              evidence = [],
              generatedAt = new Date().toISOString(),
            }) {
              const counts = countByClassification(evidence);
            
              return {
                generated_at: generatedAt,
                mode,
                target_section: buildTargetSection({ mode, targetVersion, date: generatedAt }),
                target_section_mode: mode,
                target_version: targetVersion,
                previous_tag: previousTag,
                compare_range: compareRange,
                pr_count: evidence.length,
                ...counts,
                pull_requests: evidence,
              };
            }
            
            if (typeof module !== 'undefined') {
              module.exports = {
                INTERNAL_LABELS,
                PROVIDER_PATH_PREFIXES,
                USER_FACING_LABELS,
                buildEvidenceManifest,
                buildPullRequestEvidence,
                buildTargetSection,
                classifyPullRequestForChangelog,
                countByClassification,
                parseCommitShas,
                selectMergedPullRequests,
              };
            }
            
            /**
             * Helpers to parse and validate the PR-body `## Changelog` contract.
             *
             * Contract:
             *   ## Changelog
             *   Customer impact: <none|fix|enhancement|breaking>
             *   Summary: <text>          (required when Customer impact is not "none")
             *
             *   ### Breaking changes
             *   <free-form markdown>     (optional subsection)
             */
            
            const VALID_CUSTOMER_IMPACTS = new Set(['none', 'fix', 'enhancement', 'breaking']);
            
            /**
             * Extract the raw text of the `## Changelog` section from a PR body.
             * Returns the content between `## Changelog` and the next `##`-level heading
             * (or the end of the string).
             *
             * @param {string} body
             * @returns {string|null}
             */
            function extractChangelogSection(body) {
              if (!body) return null;
            
              const lines = body.split('\n');
              let inChangelog = false;
              /** @type {null | '`' | '~'} */
              let fenceType = null;
              const content = [];
            
              for (const line of lines) {
                if (/^##\s+Changelog/.test(line)) {
                  inChangelog = true;
                  continue;
                }
                if (inChangelog) {
                  if (fenceType === null && /^```/.test(line)) {
                    fenceType = '`';
                  } else if (fenceType === null && /^~~~/.test(line)) {
                    fenceType = '~';
                  } else if (fenceType === '`' && /^```/.test(line)) {
                    fenceType = null;
                  } else if (fenceType === '~' && /^~~~/.test(line)) {
                    fenceType = null;
                  }
                  if (fenceType === null && /^##\s/.test(line)) {
                    break;
                  }
                  content.push(line);
                }
              }
            
              if (!inChangelog) return null;
            
              return content.join('\n');
            }
            
            /**
             * Extract the raw markdown content of the `### Breaking changes` subsection
             * from a PR body string. Returns everything from the heading line (exclusive)
             * up to the next `##` or `###` heading, or the end of the string.
             *
             * @param {string} body
             * @returns {string|null} Trimmed markdown content, or null if not present or empty.
             */
            function extractBreakingChanges(changelogSection) {
              if (!changelogSection) return null;
            
              const lines = changelogSection.split('\n');
              let inBreaking = false;
              /** @type {null | '`' | '~'} */
              let fenceType = null;
              const content = [];
            
              for (const line of lines) {
                if (/^###\s+Breaking changes/.test(line)) {
                  inBreaking = true;
                  continue;
                }
                if (inBreaking) {
                  if (fenceType === null && /^```/.test(line)) {
                    fenceType = '`';
                  } else if (fenceType === null && /^~~~/.test(line)) {
                    fenceType = '~';
                  } else if (fenceType === '`' && /^```/.test(line)) {
                    fenceType = null;
                  } else if (fenceType === '~' && /^~~~/.test(line)) {
                    fenceType = null;
                  }
                  if (fenceType === null && /^#{2,3}\s/.test(line)) {
                    break;
                  }
                  content.push(line);
                }
              }
            
              if (!inBreaking) return null;
            
              const trimmed = content.join('\n').trimEnd();
              return trimmed.length > 0 ? trimmed : null;
            }
            
            /**
             * Parse the `## Changelog` section from a PR body string.
             *
             * @param {string} body - Full PR body text.
             * @returns {{ customerImpact: string|null, summary: string|null, breakingChanges: string|null }|null}
             *   Returns null when no `## Changelog` section is found.
             */
            function parseChangelogSection(body) {
              const section = extractChangelogSection(body);
              if (section === null) return null;
            
              // Parse `Customer impact: <value>`
              const customerImpactMatch = section.match(/^Customer impact:\s*(.+)$/m);
              const customerImpact = customerImpactMatch ? customerImpactMatch[1].trim() : null;
            
              // Parse `Summary: <text>`
              const summaryMatch = section.match(/^Summary:\s*(.+)$/m);
              const summary = summaryMatch ? summaryMatch[1].trim() : null;
            
              // Extract breaking changes from the changelog section only
              const breakingChanges = extractBreakingChanges(section);
            
              return {
                customerImpact,
                summary: summary || null,
                breakingChanges,
              };
            }
            
            /**
             * Validate a parsed changelog section.
             *
             * @param {{ customerImpact: string|null, summary: string|null, breakingChanges: string|null }|null} parsed
             * @returns {{ valid: boolean, errors: string[] }}
             */
            function validateChangelogSection(parsed) {
              const errors = [];
            
              if (parsed === null) {
                errors.push('No ## Changelog section found in PR body');
                return { valid: false, errors };
              }
            
              const { customerImpact, summary } = parsed;
            
              // Validate Customer impact
              if (!customerImpact) {
                errors.push('Missing required field: Customer impact');
              } else if (!VALID_CUSTOMER_IMPACTS.has(customerImpact)) {
                errors.push(
                  `Invalid Customer impact value: "${customerImpact}". Must be one of: ${[...VALID_CUSTOMER_IMPACTS].join(', ')}`
                );
              }
            
              // Summary is required unless Customer impact is "none"
              if (customerImpact && customerImpact !== 'none' && VALID_CUSTOMER_IMPACTS.has(customerImpact)) {
                if (!summary) {
                  errors.push('Missing required field: Summary (required when Customer impact is not "none")');
                }
              }
            
              return {
                valid: errors.length === 0,
                errors,
              };
            }
            
            /**
             * Internal variant that also detects whether a `### Breaking changes` heading
             * was present but had no content.
             *
             * @param {string} body
             * @returns {{ customerImpact: string|null, summary: string|null, breakingChanges: string|null, breakingChangesHeadingPresent: boolean }|null}
             */
            function parseChangelogSectionFull(body) {
              const section = extractChangelogSection(body);
              if (section === null) return null;
            
              const customerImpactMatch = section.match(/^Customer impact:\s*(.+)$/m);
              const customerImpact = customerImpactMatch ? customerImpactMatch[1].trim() : null;
            
              const summaryMatch = section.match(/^Summary:\s*(.+)$/m);
              const summary = summaryMatch ? summaryMatch[1].trim() : null;
            
              // Detect whether the heading exists within the changelog section (not the full body)
              const lines = section.split('\n');
              const breakingChangesHeadingPresent = lines.some((line) => /^###\s+Breaking changes/.test(line));
              const breakingChanges = extractBreakingChanges(section);
            
              return {
                customerImpact,
                summary: summary || null,
                breakingChanges,
                breakingChangesHeadingPresent,
              };
            }
            
            /**
             * Validate a full parsed changelog section (including empty breaking-changes detection).
             *
             * @param {ReturnType<typeof parseChangelogSectionFull>|null} parsed
             * @returns {{ valid: boolean, errors: string[] }}
             */
            function validateChangelogSectionFull(parsed) {
              const base = validateChangelogSection(parsed);
              if (!parsed) return base;
            
              const errors = [...base.errors];
            
              if (parsed.breakingChangesHeadingPresent && parsed.breakingChanges === null) {
                errors.push('### Breaking changes section is present but contains no content');
              }
            
              if (parsed.customerImpact === 'breaking' && !parsed.breakingChangesHeadingPresent) {
                errors.push('Customer impact: breaking requires a ### Breaking changes subsection');
              }
            
              return { valid: errors.length === 0, errors };
            }
            
            if (typeof module !== 'undefined') {
              module.exports = {
                VALID_CUSTOMER_IMPACTS,
                extractBreakingChanges,
                extractChangelogSection,
                parseChangelogSection,
                parseChangelogSectionFull,
                validateChangelogSection,
                validateChangelogSectionFull,
              };
            }
            
            /**
             * Deterministic changelog renderer.
             *
             * Converts an array of merged PR metadata records (each with a parsed
             * `## Changelog` section) into a rendered changelog section body.
             *
             * Rendering rules:
             * - PRs with the `no-changelog` label are silently excluded.
             * - PRs with `Customer impact: none` produce no change bullet (but may
             *   still contribute breaking-change blocks).
             * - PRs that have neither the `no-changelog` label nor a parseable
             *   `## Changelog` section cause a hard assembly failure.
             * - Breaking-change blocks from included PRs are collected and placed
             *   under a `### Breaking changes` subsection.
             * - Regular change bullets are placed under `### Changes`.
             * - Normalization is minimal: standard `- ` bullet prefix, citation
             *   shape `([#NNN](url))`, and consistent whitespace. Author-provided
             *   summary text is preserved verbatim.
             */
            
            let parseChangelogSectionFullRef = typeof parseChangelogSectionFull === 'function' ? parseChangelogSectionFull : null;
            let validateChangelogSectionFullRef = typeof validateChangelogSectionFull === 'function' ? validateChangelogSectionFull : null;
            
            if (!parseChangelogSectionFullRef || !validateChangelogSectionFullRef) {
              ({
                parseChangelogSectionFull: parseChangelogSectionFullRef,
                validateChangelogSectionFull: validateChangelogSectionFullRef,
              } = require('./pr-changelog-parser.js'));
            }
            
            const NO_CHANGELOG_LABEL = 'no-changelog';
            
            /**
             * Result from assembling PR changelog data.
             *
             * @typedef {Object} RenderResult
             * @property {boolean} success
             * @property {string|null} sectionBody - Rendered markdown body (without section header line), or null on failure.
             * @property {AssemblyError[]} errors - Assembly errors (non-empty only when success is false).
             * @property {IncludedPR[]} included - PRs that contributed at least one bullet or breaking-change block.
             * @property {ExcludedPR[]} excluded - PRs that were explicitly excluded (no-changelog or Customer impact: none).
             */
            
            /**
             * @typedef {Object} AssemblyError
             * @property {number} prNumber
             * @property {string} prUrl
             * @property {string} reason
             */
            
            /**
             * @typedef {Object} IncludedPR
             * @property {number} prNumber
             * @property {string} prUrl
             * @property {string} summary
             * @property {string|null} breakingChanges
             */
            
            /**
             * @typedef {Object} ExcludedPR
             * @property {number} prNumber
             * @property {string} prUrl
             * @property {string} reason
             * @property {string|null} [breakingChanges] - Present when a `Customer impact: none` PR also had a ### Breaking changes block.
             */
            
            /**
             * Normalize a bullet line: ensure it starts with `- ` (strip leading `-`, `*`, `+` and spaces).
             *
             * @param {string} line
             * @returns {string}
             */
            function normalizeBulletPrefix(line) {
              return '- ' + line.replace(/^[-*+]\s*/, '').replace(/^\s+/, '');
            }
            
            /**
             * Build a citation string for a PR.
             *
             * @param {number} prNumber
             * @param {string} prUrl
             * @returns {string} e.g. `([#123](https://github.com/.../pull/123))`
             */
            function buildCitation(prNumber, prUrl) {
              return `([#${prNumber}](${prUrl}))`;
            }
            
            /**
             * Build a normalized change bullet from a PR summary and citation.
             *
             * @param {string} summary - Author-provided summary text (preserved verbatim).
             * @param {number} prNumber
             * @param {string} prUrl
             * @returns {string}
             */
            function buildChangeBullet(summary, prNumber, prUrl) {
              // Normalize the bullet prefix on the summary line, then append the citation.
              const normalizedSummary = normalizeBulletPrefix(summary.trim());
              const citation = buildCitation(prNumber, prUrl);
              return `${normalizedSummary} ${citation}`;
            }
            
            /**
             * Render a changelog section body from an array of merged PR records.
             *
             * Each PR record must have:
             *   - `number` {number}
             *   - `url` {string}
             *   - `labels` {string[]}
             *   - `body` {string|null}
             *
             * @param {Array<{number: number, url: string, labels: string[], body: string|null}>} mergedPRs
             * @returns {RenderResult}
             */
            function renderChangelogSection(mergedPRs) {
              const errors = [];
              const included = [];
              const excluded = [];
            
              const changeBullets = [];
              const breakingChangeBlocks = [];
            
              for (const pr of mergedPRs) {
                const { number: prNumber, url: prUrl, labels, body } = pr;
                const labelNames = Array.isArray(labels) ? labels : [];
            
                // Exclude PRs with the no-changelog label
                if (labelNames.includes(NO_CHANGELOG_LABEL)) {
                  excluded.push({ prNumber, prUrl, reason: 'no-changelog label' });
                  continue;
                }
            
                // Parse and validate the changelog section from the PR body
                const parsed = parseChangelogSectionFullRef(body || '');
            
                if (parsed === null) {
                  // No parseable ## Changelog section and no no-changelog label — hard fail
                  errors.push({
                    prNumber,
                    prUrl,
                    reason:
                      `PR #${prNumber} (${prUrl}) has no parseable ## Changelog section and is not labeled 'no-changelog'. ` +
                      'Add a ## Changelog section to the PR body or apply the no-changelog label.',
                  });
                  continue;
                }
            
                // Validate structural correctness (invalid customerImpact, empty breaking-changes heading, etc.)
                const { valid, errors: validationErrors } = validateChangelogSectionFullRef(parsed);
                if (!valid) {
                  if (parsed.customerImpact === null) {
                    errors.push({
                      prNumber,
                      prUrl,
                      reason: `PR #${prNumber}: ## Changelog section is missing the required Customer impact field`,
                    });
                  } else {
                    errors.push({
                      prNumber,
                      prUrl,
                      reason: `PR #${prNumber}: ## Changelog section failed validation: ${validationErrors.join('; ')}`,
                    });
                  }
                  continue;
                }
            
                const { customerImpact, summary, breakingChanges } = parsed;
            
                // Collect breaking-change block regardless of customerImpact
                if (breakingChanges) {
                  breakingChangeBlocks.push({ prNumber, prUrl, breakingChanges });
                }
            
                // customerImpact === null case is already caught by validateChangelogSectionFull above
                if (customerImpact.trim().toLowerCase() === 'none') {
                  const excludedEntry = { prNumber, prUrl, reason: 'Customer impact: none' };
                  if (breakingChanges !== null) {
                    excludedEntry.breakingChanges = breakingChanges;
                  }
                  excluded.push(excludedEntry);
                  continue;
                }
            
                if (!summary) {
                  // Missing summary for a non-none impact — treat as assembly error
                  errors.push({
                    prNumber,
                    prUrl,
                    reason:
                      `PR #${prNumber} (${prUrl}) has Customer impact: ${customerImpact} but is missing the required Summary field.`,
                  });
                  continue;
                }
            
                const bullet = buildChangeBullet(summary, prNumber, prUrl);
                changeBullets.push(bullet);
                included.push({ prNumber, prUrl, summary, breakingChanges: breakingChanges || null });
              }
            
              if (errors.length > 0) {
                return { success: false, sectionBody: null, errors, included, excluded };
              }
            
              // Render the section body
              const sectionParts = [];
            
              if (breakingChangeBlocks.length > 0) {
                sectionParts.push('### Breaking changes');
                sectionParts.push('');
                for (const { breakingChanges } of breakingChangeBlocks) {
                  // Preserve the author-provided breaking-change prose verbatim, trimming
                  // only trailing whitespace from the block as a whole.
                  sectionParts.push(breakingChanges.trimEnd());
                  sectionParts.push('');
                }
              }
            
              if (changeBullets.length > 0) {
                sectionParts.push('### Changes');
                sectionParts.push('');
                for (const bullet of changeBullets) {
                  sectionParts.push(bullet);
                }
                sectionParts.push('');
              }
            
              // Trim trailing blank lines
              while (sectionParts.length > 0 && sectionParts[sectionParts.length - 1] === '') {
                sectionParts.pop();
              }
            
              const sectionBody = sectionParts.length > 0 ? sectionParts.join('\n') : '';
            
              return { success: true, sectionBody, errors: [], included, excluded };
            }
            
            if (typeof module !== 'undefined') {
              module.exports = {
                NO_CHANGELOG_LABEL,
                buildChangeBullet,
                buildCitation,
                normalizeBulletPrefix,
                renderChangelogSection,
              };
            }
            
            const fs = require('fs');
            const { execSync } = require('child_process');
            
            let parseSemverTagsRef = typeof parseSemverTags === 'function' ? parseSemverTags : null;
            let buildReleaseContextRef = typeof buildReleaseContext === 'function' ? buildReleaseContext : null;
            let parseCommitShasRef = typeof parseCommitShas === 'function' ? parseCommitShas : null;
            let buildEvidenceManifestRef = typeof buildEvidenceManifest === 'function' ? buildEvidenceManifest : null;
            let renderChangelogSectionRef = typeof renderChangelogSection === 'function' ? renderChangelogSection : null;
            
            if (!parseSemverTagsRef || !buildReleaseContextRef) {
              ({
                parseSemverTags: parseSemverTagsRef,
                buildReleaseContext: buildReleaseContextRef,
              } = require('./changelog-release-context.js'));
            }
            
            if (!parseCommitShasRef || !buildEvidenceManifestRef) {
              ({
                parseCommitShas: parseCommitShasRef,
                buildEvidenceManifest: buildEvidenceManifestRef,
              } = require('./changelog-pr-evidence.js'));
            }
            
            if (!renderChangelogSectionRef) {
              ({ renderChangelogSection: renderChangelogSectionRef } = require('./changelog-renderer.js'));
            }
            
            function listSemverTags({ exec = execSync } = {}) {
              const tagsRaw = exec('git tag --list "v[0-9]*.[0-9]*.[0-9]*" --sort=-version:refname', {
                encoding: 'utf8',
                stdio: ['pipe', 'pipe', 'pipe'],
              }).trim();
            
              return parseSemverTagsRef(tagsRaw);
            }
            
            function resolveEngineContext({
              mode,
              targetVersion = '',
              targetBranch,
              tags,
            }) {
              if (!mode) {
                throw new Error('mode is required');
              }
            
              if (mode !== 'release' && mode !== 'unreleased') {
                throw new Error(`unsupported changelog mode: ${mode}`);
              }
            
              if (mode === 'release' && !targetVersion) {
                throw new Error('release mode requires targetVersion');
              }
            
              const previousTagResult = buildReleaseContextRef({
                eventName: mode === 'release' ? 'pull_request' : 'workflow_dispatch',
                headBranch: mode === 'release' ? `prep-release-${targetVersion}` : '',
                tags,
              });
            
              return {
                mode,
                targetVersion,
                targetBranch: targetBranch ?? (mode === 'release' ? `prep-release-${targetVersion}` : 'generated-changelog'),
                previousTag: previousTagResult.previousTag,
                excludedTag: previousTagResult.excludedTag,
                excludedCurrentTag: previousTagResult.excludedCurrentTag,
                compareRange: previousTagResult.compareRange,
              };
            }
            
            function listCommitShasInRange(compareRange, { exec = execSync } = {}) {
              const range = compareRange || 'HEAD';
              const raw = exec(`git log --format=%H ${range}`, {
                encoding: 'utf8',
                stdio: ['pipe', 'pipe', 'pipe'],
              }).trim();
            
              return parseCommitShasRef(raw);
            }
            
            function getLabelNames(pr) {
              return (pr.labels ?? []).map((label) => (typeof label === 'string' ? label : label.name));
            }
            
            async function resolveMergedPullRequests({ github, owner, repo, commitShas }) {
              const mergedPullRequestsByNumber = new Map();
            
              for (const sha of commitShas) {
                const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner,
                  repo,
                  commit_sha: sha,
                });
            
                for (const pr of prs) {
                  if (pr.state === 'closed' && pr.merged_at && !mergedPullRequestsByNumber.has(pr.number)) {
                    mergedPullRequestsByNumber.set(pr.number, pr);
                  }
                }
              }
            
              return Array.from(mergedPullRequestsByNumber.values());
            }
            
            function buildRendererPullRequestRecord(pr) {
              return {
                number: pr.number,
                title: pr.title,
                url: pr.html_url,
                merge_commit_sha: pr.merge_commit_sha,
                author: pr.user?.login ?? 'unknown',
                labels: getLabelNames(pr),
                body: pr.body || '',
              };
            }
            
            function buildSectionContent({ mode, targetVersion, generatedAt, sectionBody }) {
              const sectionHeader = mode === 'release' && targetVersion
                ? `## [${targetVersion}] - ${String(generatedAt).split('T')[0]}`
                : '## [Unreleased]';
            
              return {
                sectionHeader,
                newSectionContent: sectionBody ? `${sectionHeader}\n\n${sectionBody}` : `${sectionHeader}`,
              };
            }
            
            function findSectionEnd(lines, startIndex) {
              for (let i = startIndex + 1; i < lines.length; i++) {
                if (/^## /.test(lines[i])) {
                  return i;
                }
              }
            
              return lines.length;
            }
            
            function rewriteChangelogSection(content, newSectionContent, mode, targetVersion) {
              const lines = content.split('\n');
              let targetStart = -1;
            
              if (mode === 'unreleased') {
                targetStart = lines.findIndex((line) => /^## \[Unreleased\]/.test(line));
              } else {
                targetStart = lines.findIndex((line) => line.startsWith(`## [${targetVersion}]`));
              }
            
              if (targetStart === -1) {
                if (mode === 'release') {
                  const unreleasedStart = lines.findIndex((line) => /^## \[Unreleased\]/.test(line));
                  if (unreleasedStart !== -1) {
                    const insertAfter = findSectionEnd(lines, unreleasedStart);
                    const before = lines.slice(0, insertAfter);
                    const after = lines.slice(insertAfter);
                    return [...before, '', newSectionContent, ...after].join('\n');
                  }
            
                  return newSectionContent + '\n\n' + content;
                }
            
                return newSectionContent + '\n\n' + content;
              }
            
              const sectionEnd = findSectionEnd(lines, targetStart);
              const before = lines.slice(0, targetStart);
              const after = lines.slice(sectionEnd);
            
              while (before.length > 0 && before[before.length - 1] === '') {
                before.pop();
              }
            
              const parts = [...before];
              if (parts.length > 0) parts.push('');
              parts.push(newSectionContent);
            
              let afterStart = 0;
              while (afterStart < after.length && after[afterStart] === '') {
                afterStart++;
              }
            
              if (afterStart < after.length) {
                parts.push('');
                parts.push(...after.slice(afterStart));
              }
            
              return parts.join('\n');
            }
            
            async function runChangelogEngine({
              github,
              owner,
              repo,
              mode,
              targetVersion = '',
              targetBranch,
              changelogPath = 'CHANGELOG.md',
              generatedAt = new Date().toISOString(),
              fsImpl = fs,
              exec = execSync,
              tags,
            }) {
              if (!github) {
                throw new Error('github client is required');
              }
              if (!owner || !repo) {
                throw new Error('owner and repo are required');
              }
              if (!mode) {
                throw new Error('mode is required');
              }
              if (mode !== 'release' && mode !== 'unreleased') {
                throw new Error(`unsupported changelog mode: ${mode}`);
              }
              if (mode === 'release' && !targetVersion) {
                throw new Error('release mode requires targetVersion');
              }
            
              const resolvedTags = tags ?? listSemverTags({ exec });
              const releaseContext = resolveEngineContext({
                mode,
                targetVersion,
                targetBranch,
                tags: resolvedTags,
              });
            
              const commitShas = listCommitShasInRange(releaseContext.compareRange, { exec });
              const mergedPullRequests = await resolveMergedPullRequests({
                github,
                owner,
                repo,
                commitShas,
              });
              const prRecords = mergedPullRequests.map(buildRendererPullRequestRecord);
            
              const manifest = buildEvidenceManifestRef({
                mode: releaseContext.mode,
                targetVersion: releaseContext.targetVersion,
                previousTag: releaseContext.previousTag,
                compareRange: releaseContext.compareRange,
                evidence: prRecords,
                generatedAt,
              });
            
              const renderResult = renderChangelogSectionRef(prRecords);
              if (!renderResult.success) {
                const error = new Error('Changelog assembly failed');
                error.renderErrors = renderResult.errors;
                throw error;
              }
            
              let currentChangelog = '';
              try {
                currentChangelog = fsImpl.readFileSync(changelogPath, 'utf8');
              } catch (err) {
                if (err.code !== 'ENOENT') {
                  throw err;
                }
              }
            
              const { sectionHeader, newSectionContent } = buildSectionContent({
                mode: releaseContext.mode,
                targetVersion: releaseContext.targetVersion,
                generatedAt,
                sectionBody: renderResult.sectionBody,
              });
            
              const updatedChangelog = rewriteChangelogSection(
                currentChangelog,
                newSectionContent,
                releaseContext.mode,
                releaseContext.targetVersion
              );
              fsImpl.writeFileSync(changelogPath, updatedChangelog, 'utf8');
            
              return {
                mode: releaseContext.mode,
                targetVersion: releaseContext.targetVersion,
                targetBranch: releaseContext.targetBranch,
                previousTag: releaseContext.previousTag,
                compareRange: releaseContext.compareRange,
                excludedTag: releaseContext.excludedTag,
                excludedCurrentTag: releaseContext.excludedCurrentTag,
                changelogPath,
                sectionHeader,
                hasUserFacingChanges: renderResult.included.length > 0,
                manifest,
                pullRequests: prRecords,
                includedPullRequests: renderResult.included,
                excludedPullRequests: renderResult.excluded,
              };
            }
            
            module.exports = {
              buildRendererPullRequestRecord,
              buildSectionContent,
              findSectionEnd,
              getLabelNames,
              listCommitShasInRange,
              listSemverTags,
              resolveEngineContext,
              resolveMergedPullRequests,
              rewriteChangelogSection,
              runChangelogEngine,
            };
            
            const mode = process.env.CHANGELOG_MODE || 'unreleased';
            const targetVersion = process.env.TARGET_VERSION || '';
            
            const { owner, repo } = context.repo;
            
            const result = await runChangelogEngine({
              github,
              owner,
              repo,
              mode,
              targetVersion,
              changelogPath: process.env.CHANGELOG_PATH || 'CHANGELOG.md',
            });
            
            core.setOutput('mode', result.mode);
            core.setOutput('target_version', result.targetVersion);
            core.setOutput('target_branch', result.targetBranch);
            core.setOutput('previous_tag', result.previousTag);
            core.setOutput('compare_range', result.compareRange);
            core.setOutput('section_header', result.sectionHeader);
            core.setOutput('has_user_facing_changes', String(result.hasUserFacingChanges));
            core.setOutput('has_pull_requests', String(result.pullRequests.length > 0));
            
      - name: Commit changelog (release mode)
        id: commit_release
        if: steps.changelog_engine.outputs.mode == 'release'
        env:
          TARGET_VERSION: ${{ steps.changelog_engine.outputs.target_version }}
          TARGET_BRANCH: ${{ steps.changelog_engine.outputs.target_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- CHANGELOG.md; then
            echo "No release changelog changes to commit"
            echo "pushed=false" >> $GITHUB_OUTPUT
            echo "ran=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          git add CHANGELOG.md
          git commit -m "chore(changelog): update changelog for v${TARGET_VERSION}"
          git push origin HEAD:${TARGET_BRANCH}
          echo "pushed=true" >> $GITHUB_OUTPUT
          echo "ran=true" >> $GITHUB_OUTPUT

      - name: Refresh release PR metadata (release mode)
        if: >-
          steps.changelog_engine.outputs.mode == 'release' &&
          steps.commit_release.outputs.pushed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          COMPARE_RANGE: ${{ steps.changelog_engine.outputs.compare_range }}
          TARGET_VERSION: ${{ steps.changelog_engine.outputs.target_version }}
          TARGET_BRANCH: ${{ steps.changelog_engine.outputs.target_branch }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            /**
             * PR management helpers for the changelog-generation workflow.
             *
             * Extracted from inline `actions/github-script` blocks so the logic can be
             * unit-tested independently of the GitHub Actions runner.
             *
             * Two functions handle the two distinct modes:
             *   - manageUnreleasedPR  — singleton `generated-changelog` → `main` PR
             *   - refreshReleasePR    — update the prep-release-* PR body with metadata
             */
            
            /**
             * Build the PR body for the generated-changelog PR (unreleased mode).
             *
             * @param {{ compareRange: string }} opts
             * @returns {string}
             */
            function buildUnreleasedPRBody({ compareRange }) {
              const today = new Date().toISOString().split('T')[0];
              return [
                `**Generated:** ${today}`,
                `**Compare range:** \`${compareRange}\``,
                '',
                '> This PR is auto-generated by the changelog-generation workflow.',
                '> Re-runs will force-push this branch and overwrite any manual edits.',
                '> Do not make manual edits to the `generated-changelog` branch.',
              ].join('\n');
            }
            
            /**
             * Build the PR body for the release prep PR (release mode).
             *
             * @param {{ targetVersion: string, compareRange: string }} opts
             * @returns {string}
             */
            function buildReleasePRBody({ targetVersion, compareRange }) {
              const today = new Date().toISOString().split('T')[0];
              return [
                `**Generated:** ${today}`,
                `**Version:** \`${targetVersion}\``,
                `**Compare range:** \`${compareRange}\``,
                '',
                '> This PR body was last refreshed by the changelog-generation workflow.',
              ].join('\n');
            }
            
            /**
             * Manage the singleton `generated-changelog` PR (unreleased mode).
             *
             * Looks up any existing open PR from `generated-changelog` → `main`.
             * If found, updates its body and returns action='updated'.
             * If not found, creates a new PR and returns action='created'.
             *
             * @param {{ github: object, owner: string, repo: string, compareRange: string }} opts
             * @returns {Promise<{ prAction: string, prNumber: number, prUrl: string }>}
             */
            async function manageUnreleasedPR({ github, owner, repo, compareRange }) {
              const prBody = buildUnreleasedPRBody({ compareRange });
            
              const { data: existingPRs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                head: `${owner}:generated-changelog`,
                base: 'main',
              });
            
              if (existingPRs.length > 0) {
                const existingPR = existingPRs[0];
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: existingPR.number,
                  body: prBody,
                });
                return {
                  prAction: 'updated',
                  prNumber: existingPR.number,
                  prUrl: existingPR.html_url,
                };
              }
            
              const { data: newPR } = await github.rest.pulls.create({
                owner,
                repo,
                title: 'chore: update CHANGELOG.md [Unreleased] section',
                body: prBody,
                head: 'generated-changelog',
                base: 'main',
              });
              return {
                prAction: 'created',
                prNumber: newPR.number,
                prUrl: newPR.html_url,
              };
            }
            
            /**
             * Refresh the release prep PR body with generated metadata.
             *
             * If prNumber is null/undefined, emits a warning and returns without failing.
             *
             * @param {{ github: object, core: object, owner: string, repo: string, prNumber: number|null, compareRange: string, targetVersion: string }} opts
             * @returns {Promise<void>}
             */
            async function refreshReleasePR({ github, core, owner, repo, prNumber, compareRange, targetVersion }) {
              if (!prNumber) {
                core.warning('No pull_request.number in event metadata; skipping PR metadata refresh');
                return;
              }
            
              const prBody = buildReleasePRBody({ targetVersion, compareRange });
            
              core.info(`Refreshing release PR #${prNumber} metadata`);
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: prNumber,
                body: prBody,
              });
              core.info(`Release PR #${prNumber} metadata refreshed`);
            }
            
            if (typeof module !== 'undefined') {
              module.exports = {
                buildUnreleasedPRBody,
                buildReleasePRBody,
                manageUnreleasedPR,
                refreshReleasePR,
              };
            }
            
            const { owner, repo } = context.repo;
            let prNumber = context.payload.pull_request?.number ?? null;
            const compareRange = process.env.COMPARE_RANGE;
            const targetVersion = process.env.TARGET_VERSION;
            const targetBranch = process.env.TARGET_BRANCH;
            
            if (!prNumber && targetBranch) {
              const { data: prs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                head: `${owner}:${targetBranch}`,
                base: 'main',
              });
              prNumber = prs[0]?.number ?? null;
            
              if (prNumber) {
                core.info(`Resolved release PR #${prNumber} from branch ${targetBranch}`);
              } else {
                core.info(`No open release PR found for branch ${targetBranch}; skipping PR metadata refresh`);
              }
            }
            
            await refreshReleasePR({ github, core, owner, repo, prNumber, compareRange, targetVersion });
            
      - name: Push to generated-changelog branch (unreleased mode)
        id: push_unreleased
        if: steps.changelog_engine.outputs.mode == 'unreleased'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- CHANGELOG.md; then
            echo "No unreleased changelog changes to commit"
            echo "pushed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git add CHANGELOG.md
          git commit -m "chore(changelog): update unreleased changelog section"
          git push origin HEAD:generated-changelog --force
          echo "pushed=true" >> $GITHUB_OUTPUT

      - name: Look up existing generated-changelog PR (unreleased mode)
        id: lookup_pr
        if: >-
          steps.push_unreleased.outputs.pushed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          COMPARE_RANGE: ${{ steps.changelog_engine.outputs.compare_range }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            /**
             * PR management helpers for the changelog-generation workflow.
             *
             * Extracted from inline `actions/github-script` blocks so the logic can be
             * unit-tested independently of the GitHub Actions runner.
             *
             * Two functions handle the two distinct modes:
             *   - manageUnreleasedPR  — singleton `generated-changelog` → `main` PR
             *   - refreshReleasePR    — update the prep-release-* PR body with metadata
             */
            
            /**
             * Build the PR body for the generated-changelog PR (unreleased mode).
             *
             * @param {{ compareRange: string }} opts
             * @returns {string}
             */
            function buildUnreleasedPRBody({ compareRange }) {
              const today = new Date().toISOString().split('T')[0];
              return [
                `**Generated:** ${today}`,
                `**Compare range:** \`${compareRange}\``,
                '',
                '> This PR is auto-generated by the changelog-generation workflow.',
                '> Re-runs will force-push this branch and overwrite any manual edits.',
                '> Do not make manual edits to the `generated-changelog` branch.',
              ].join('\n');
            }
            
            /**
             * Build the PR body for the release prep PR (release mode).
             *
             * @param {{ targetVersion: string, compareRange: string }} opts
             * @returns {string}
             */
            function buildReleasePRBody({ targetVersion, compareRange }) {
              const today = new Date().toISOString().split('T')[0];
              return [
                `**Generated:** ${today}`,
                `**Version:** \`${targetVersion}\``,
                `**Compare range:** \`${compareRange}\``,
                '',
                '> This PR body was last refreshed by the changelog-generation workflow.',
              ].join('\n');
            }
            
            /**
             * Manage the singleton `generated-changelog` PR (unreleased mode).
             *
             * Looks up any existing open PR from `generated-changelog` → `main`.
             * If found, updates its body and returns action='updated'.
             * If not found, creates a new PR and returns action='created'.
             *
             * @param {{ github: object, owner: string, repo: string, compareRange: string }} opts
             * @returns {Promise<{ prAction: string, prNumber: number, prUrl: string }>}
             */
            async function manageUnreleasedPR({ github, owner, repo, compareRange }) {
              const prBody = buildUnreleasedPRBody({ compareRange });
            
              const { data: existingPRs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                head: `${owner}:generated-changelog`,
                base: 'main',
              });
            
              if (existingPRs.length > 0) {
                const existingPR = existingPRs[0];
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: existingPR.number,
                  body: prBody,
                });
                return {
                  prAction: 'updated',
                  prNumber: existingPR.number,
                  prUrl: existingPR.html_url,
                };
              }
            
              const { data: newPR } = await github.rest.pulls.create({
                owner,
                repo,
                title: 'chore: update CHANGELOG.md [Unreleased] section',
                body: prBody,
                head: 'generated-changelog',
                base: 'main',
              });
              return {
                prAction: 'created',
                prNumber: newPR.number,
                prUrl: newPR.html_url,
              };
            }
            
            /**
             * Refresh the release prep PR body with generated metadata.
             *
             * If prNumber is null/undefined, emits a warning and returns without failing.
             *
             * @param {{ github: object, core: object, owner: string, repo: string, prNumber: number|null, compareRange: string, targetVersion: string }} opts
             * @returns {Promise<void>}
             */
            async function refreshReleasePR({ github, core, owner, repo, prNumber, compareRange, targetVersion }) {
              if (!prNumber) {
                core.warning('No pull_request.number in event metadata; skipping PR metadata refresh');
                return;
              }
            
              const prBody = buildReleasePRBody({ targetVersion, compareRange });
            
              core.info(`Refreshing release PR #${prNumber} metadata`);
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: prNumber,
                body: prBody,
              });
              core.info(`Release PR #${prNumber} metadata refreshed`);
            }
            
            if (typeof module !== 'undefined') {
              module.exports = {
                buildUnreleasedPRBody,
                buildReleasePRBody,
                manageUnreleasedPR,
                refreshReleasePR,
              };
            }
            
            const { owner, repo } = context.repo;
            const compareRange = process.env.COMPARE_RANGE;
            
            const result = await manageUnreleasedPR({ github, owner, repo, compareRange });
            core.setOutput('pr_action', result.prAction);
            core.setOutput('pr_number', String(result.prNumber));
            core.setOutput('pr_url', result.prUrl);
            
      - name: Report result (unreleased mode)
        if: >-
          steps.changelog_engine.outputs.mode == 'unreleased' &&
          steps.lookup_pr.outcome == 'success'
        run: |
          echo "PR action: ${{ steps.lookup_pr.outputs.pr_action }}"
          echo "PR URL: ${{ steps.lookup_pr.outputs.pr_url }}"
