# This file is generated by `scripts/compile-workflow-sources/main.go` from `.github/workflows-src/changelog-generation/workflow.yml.tmpl`. Do not edit directly.
name: Changelog Generation
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: Changelog generation mode
        required: true
        default: unreleased
        type: choice
        options:
          - unreleased
          - release
      target_version:
        description: Release target version (required when mode=release)
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: >-
            ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'release' &&
                format('refs/heads/prep-release-{0}', github.event.inputs.target_version) || '' }}

      - name: Resolve release context
        id: resolve_release_context
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mode: ${{ github.event.inputs.mode || 'unreleased' }}
          target_version: ${{ github.event.inputs.target_version || '' }}
          script: |
            const { execSync } = require('child_process');
            const RELEASE_BRANCH_PATTERN = /^prep-release-(.+)$/;
            const SEMVER_TAG_PATTERN = /^v\d+\.\d+\.\d+$/;
            
            function resolveReleaseMode({ eventName, dispatchMode = '', targetVersion = '' }) {
              if (eventName === 'workflow_dispatch' && dispatchMode === 'release') {
                const normalizedVersion = targetVersion.trim();
                return {
                  mode: 'release',
                  targetVersion: normalizedVersion,
                  targetBranch: normalizedVersion ? `prep-release-${normalizedVersion}` : '',
                };
              }
            
              return {
                mode: 'unreleased',
                targetVersion: '',
                targetBranch: 'generated-changelog',
              };
            }
            
            function parseSemverTags(tagsRaw = '') {
              return tagsRaw
                .split('\n')
                .map((tag) => tag.trim())
                .filter((tag) => SEMVER_TAG_PATTERN.test(tag));
            }
            
            function selectPreviousTag({ tags = [], mode = 'unreleased', targetVersion = '' }) {
              const excludedTag = mode === 'release' && targetVersion ? `v${targetVersion}` : '';
              const candidates = excludedTag ? tags.filter((tag) => tag !== excludedTag) : tags;
            
              return {
                previousTag: candidates[0] ?? '',
                excludedTag,
                excludedCurrentTag: Boolean(excludedTag) && candidates.length < tags.length,
              };
            }
            
            function buildCompareRange(previousTag) {
              return previousTag ? `${previousTag}..HEAD` : 'HEAD';
            }
            
            function buildReleaseContext({
              eventName,
              dispatchMode = '',
              targetVersion = '',
              tags = [],
            }) {
              const modeResult = resolveReleaseMode({ eventName, dispatchMode, targetVersion });
              const previousTagResult = selectPreviousTag({
                tags,
                mode: modeResult.mode,
                targetVersion: modeResult.targetVersion,
              });
            
              return {
                ...modeResult,
                ...previousTagResult,
                compareRange: buildCompareRange(previousTagResult.previousTag),
              };
            }
            
            if (typeof module !== 'undefined') {
              module.exports = {
                RELEASE_BRANCH_PATTERN,
                SEMVER_TAG_PATTERN,
                buildCompareRange,
                buildReleaseContext,
                parseSemverTags,
                resolveReleaseMode,
                selectPreviousTag,
              };
            }
            
            // Determine mode from event or explicit workflow_dispatch inputs
            const eventName = context.eventName;
            const headBranch =
              context.payload.pull_request?.head?.ref ??
              context.payload.ref?.replace('refs/heads/', '') ??
              process.env.GITHUB_HEAD_REF ??
              process.env.GITHUB_REF_NAME ??
              '';
            const dispatchMode = core.getInput('mode') || 'unreleased';
            const targetVersionInput = core.getInput('target_version') || '';
            
            if (eventName === 'workflow_dispatch' && dispatchMode === 'release' && !targetVersionInput.trim()) {
              core.setFailed('workflow_dispatch release mode requires a target_version input');
              process.exit(1);
            }
            
            let tags = [];
            try {
              // List all tags matching vX.Y.Z semver pattern, sort by version, pick the latest
              const tagsRaw = execSync(
                'git tag --list "v[0-9]*.[0-9]*.[0-9]*" --sort=-version:refname',
                { encoding: 'utf8', stdio: ['pipe', 'pipe', 'pipe'] }
              ).trim();
            
              tags = parseSemverTags(tagsRaw);
            } catch (err) {
              core.warning(`Failed to list git tags: ${err.message}`);
            }
            
            const releaseContext = buildReleaseContext({
              eventName,
              headBranch,
              dispatchMode,
              targetVersion: targetVersionInput,
              tags,
            });
            
            if (releaseContext.mode === 'release') {
              core.info(`Release mode: branch=${headBranch}, version=${releaseContext.targetVersion}`);
            }
            if (releaseContext.excludedCurrentTag) {
              core.info(
                `Excluded current release tag ${releaseContext.excludedTag} from previous tag candidates`
              );
            }
            if (releaseContext.previousTag) {
              core.info(`Resolved previous tag: ${releaseContext.previousTag}`);
            } else if (tags.length === 0) {
              core.warning('No semver release tags found; compare range will cover full history');
            }
            
            core.setOutput('mode', releaseContext.mode);
            core.setOutput('target_version', releaseContext.targetVersion);
            core.setOutput('previous_tag', releaseContext.previousTag);
            core.setOutput('compare_range', releaseContext.compareRange);
            core.setOutput('target_branch', releaseContext.targetBranch);
            
            core.info(`Mode: ${releaseContext.mode}`);
            core.info(`Compare range: ${releaseContext.compareRange}`);
            core.info(`Target branch: ${releaseContext.targetBranch}`);
            
      - name: Run shared changelog engine
        id: changelog_engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          args=(
            run ./scripts/changelog-engine/cmd/changelog-engine
            -mode "${{ steps.resolve_release_context.outputs.mode }}"
            -changelog CHANGELOG.md
          )

          if [[ -n "${{ steps.resolve_release_context.outputs.target_version }}" ]]; then
            args+=(-target-version "${{ steps.resolve_release_context.outputs.target_version }}")
          fi

          go "${args[@]}"

      - name: Commit changelog (release mode)
        id: commit_release
        if: >-
          steps.resolve_release_context.outputs.mode == 'release' &&
          steps.changelog_engine.outputs.has_user_facing_changes == 'true'
        env:
          TARGET_VERSION: ${{ steps.resolve_release_context.outputs.target_version }}
          TARGET_BRANCH: ${{ steps.resolve_release_context.outputs.target_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "pushed=false" >> $GITHUB_OUTPUT
            echo "ran=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "chore(changelog): update changelog for v${TARGET_VERSION}"
          git push origin HEAD:${TARGET_BRANCH}
          echo "pushed=true" >> $GITHUB_OUTPUT
          echo "ran=true" >> $GITHUB_OUTPUT

      - name: Refresh release PR metadata (release mode)
        if: >-
          steps.resolve_release_context.outputs.mode == 'release' &&
          steps.commit_release.outputs.ran == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          COMPARE_RANGE: ${{ steps.changelog_engine.outputs.compare_range }}
          TARGET_VERSION: ${{ steps.changelog_engine.outputs.target_version }}
          TARGET_BRANCH: ${{ steps.changelog_engine.outputs.target_branch }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            /**
             * PR management helpers for the changelog-generation workflow.
             *
             * Extracted from inline `actions/github-script` blocks so the logic can be
             * unit-tested independently of the GitHub Actions runner.
             *
             * Two functions handle the two distinct modes:
             *   - manageUnreleasedPR  — singleton `generated-changelog` → `main` PR
             *   - refreshReleasePR    — update the prep-release-* PR body with metadata
             */
            
            /**
             * Build the PR body for the generated-changelog PR (unreleased mode).
             *
             * @param {{ compareRange: string }} opts
             * @returns {string}
             */
            function buildUnreleasedPRBody({ compareRange }) {
              const today = new Date().toISOString().split('T')[0];
              return [
                `**Generated:** ${today}`,
                `**Compare range:** \`${compareRange}\``,
                '',
                '> This PR is auto-generated by the changelog-generation workflow.',
                '> Re-runs will force-push this branch and overwrite any manual edits.',
                '> Do not make manual edits to the `generated-changelog` branch.',
              ].join('\n');
            }
            
            /**
             * Build the PR body for the release prep PR (release mode).
             *
             * @param {{ targetVersion: string, compareRange: string }} opts
             * @returns {string}
             */
            function buildReleasePRBody({ targetVersion, compareRange }) {
              const today = new Date().toISOString().split('T')[0];
              return [
                `**Generated:** ${today}`,
                `**Version:** \`${targetVersion}\``,
                `**Compare range:** \`${compareRange}\``,
                '',
                '> This PR body was last refreshed by the changelog-generation workflow.',
              ].join('\n');
            }
            
            /**
             * Manage the singleton `generated-changelog` PR (unreleased mode).
             *
             * Looks up any existing open PR from `generated-changelog` → `main`.
             * If found, updates its body and returns action='updated'.
             * If not found, creates a new PR and returns action='created'.
             *
             * @param {{ github: object, owner: string, repo: string, compareRange: string }} opts
             * @returns {Promise<{ prAction: string, prNumber: number, prUrl: string }>}
             */
            async function manageUnreleasedPR({ github, owner, repo, compareRange }) {
              const prBody = buildUnreleasedPRBody({ compareRange });
            
              const { data: existingPRs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                head: `${owner}:generated-changelog`,
                base: 'main',
              });
            
              if (existingPRs.length > 0) {
                const existingPR = existingPRs[0];
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: existingPR.number,
                  body: prBody,
                });
                return {
                  prAction: 'updated',
                  prNumber: existingPR.number,
                  prUrl: existingPR.html_url,
                };
              }
            
              const { data: newPR } = await github.rest.pulls.create({
                owner,
                repo,
                title: 'chore: update CHANGELOG.md [Unreleased] section',
                body: prBody,
                head: 'generated-changelog',
                base: 'main',
              });
              return {
                prAction: 'created',
                prNumber: newPR.number,
                prUrl: newPR.html_url,
              };
            }
            
            /**
             * Refresh the release prep PR body with generated metadata.
             *
             * Finds the release PR by its `prep-release-*` head branch and updates its body.
             * If no open release PR exists, emits a warning and returns without failing.
             *
             * @param {{ github: object, core: object, owner: string, repo: string, targetBranch: string, compareRange: string, targetVersion: string }} opts
             * @returns {Promise<void>}
             */
            async function refreshReleasePR({ github, core, owner, repo, targetBranch, compareRange, targetVersion }) {
              if (!targetBranch) {
                core.warning('No target release branch provided; skipping PR metadata refresh');
                return;
              }
            
              const { data: releasePRs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                head: `${owner}:${targetBranch}`,
                base: 'main',
              });
            
              if (releasePRs.length === 0) {
                core.warning(`No open release PR found for branch ${targetBranch}; skipping PR metadata refresh`);
                return;
              }
            
              const prNumber = releasePRs[0].number;
              const prBody = buildReleasePRBody({ targetVersion, compareRange });
            
              core.info(`Refreshing release PR #${prNumber} metadata`);
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: prNumber,
                body: prBody,
              });
              core.info(`Release PR #${prNumber} metadata refreshed`);
            }
            
            if (typeof module !== 'undefined') {
              module.exports = {
                buildUnreleasedPRBody,
                buildReleasePRBody,
                manageUnreleasedPR,
                refreshReleasePR,
              };
            }
            
            const { owner, repo } = context.repo;
            const compareRange = process.env.COMPARE_RANGE;
            const targetVersion = process.env.TARGET_VERSION;
            const targetBranch = process.env.TARGET_BRANCH;
            
            await refreshReleasePR({ github, core, owner, repo, targetBranch, compareRange, targetVersion });
            
      - name: Push to generated-changelog branch (unreleased mode)
        id: push_unreleased
        if: >-
          steps.resolve_release_context.outputs.mode == 'unreleased' &&
          steps.changelog_engine.outputs.has_user_facing_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "pushed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "chore(changelog): update unreleased changelog section"
          git push origin HEAD:generated-changelog --force
          echo "pushed=true" >> $GITHUB_OUTPUT

      - name: Look up existing generated-changelog PR (unreleased mode)
        id: lookup_pr
        if: >-
          steps.push_unreleased.outputs.pushed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          COMPARE_RANGE: ${{ steps.resolve_release_context.outputs.compare_range }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            /**
             * PR management helpers for the changelog-generation workflow.
             *
             * Extracted from inline `actions/github-script` blocks so the logic can be
             * unit-tested independently of the GitHub Actions runner.
             *
             * Two functions handle the two distinct modes:
             *   - manageUnreleasedPR  — singleton `generated-changelog` → `main` PR
             *   - refreshReleasePR    — update the prep-release-* PR body with metadata
             */
            
            /**
             * Build the PR body for the generated-changelog PR (unreleased mode).
             *
             * @param {{ compareRange: string }} opts
             * @returns {string}
             */
            function buildUnreleasedPRBody({ compareRange }) {
              const today = new Date().toISOString().split('T')[0];
              return [
                `**Generated:** ${today}`,
                `**Compare range:** \`${compareRange}\``,
                '',
                '> This PR is auto-generated by the changelog-generation workflow.',
                '> Re-runs will force-push this branch and overwrite any manual edits.',
                '> Do not make manual edits to the `generated-changelog` branch.',
              ].join('\n');
            }
            
            /**
             * Build the PR body for the release prep PR (release mode).
             *
             * @param {{ targetVersion: string, compareRange: string }} opts
             * @returns {string}
             */
            function buildReleasePRBody({ targetVersion, compareRange }) {
              const today = new Date().toISOString().split('T')[0];
              return [
                `**Generated:** ${today}`,
                `**Version:** \`${targetVersion}\``,
                `**Compare range:** \`${compareRange}\``,
                '',
                '> This PR body was last refreshed by the changelog-generation workflow.',
              ].join('\n');
            }
            
            /**
             * Manage the singleton `generated-changelog` PR (unreleased mode).
             *
             * Looks up any existing open PR from `generated-changelog` → `main`.
             * If found, updates its body and returns action='updated'.
             * If not found, creates a new PR and returns action='created'.
             *
             * @param {{ github: object, owner: string, repo: string, compareRange: string }} opts
             * @returns {Promise<{ prAction: string, prNumber: number, prUrl: string }>}
             */
            async function manageUnreleasedPR({ github, owner, repo, compareRange }) {
              const prBody = buildUnreleasedPRBody({ compareRange });
            
              const { data: existingPRs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                head: `${owner}:generated-changelog`,
                base: 'main',
              });
            
              if (existingPRs.length > 0) {
                const existingPR = existingPRs[0];
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: existingPR.number,
                  body: prBody,
                });
                return {
                  prAction: 'updated',
                  prNumber: existingPR.number,
                  prUrl: existingPR.html_url,
                };
              }
            
              const { data: newPR } = await github.rest.pulls.create({
                owner,
                repo,
                title: 'chore: update CHANGELOG.md [Unreleased] section',
                body: prBody,
                head: 'generated-changelog',
                base: 'main',
              });
              return {
                prAction: 'created',
                prNumber: newPR.number,
                prUrl: newPR.html_url,
              };
            }
            
            /**
             * Refresh the release prep PR body with generated metadata.
             *
             * Finds the release PR by its `prep-release-*` head branch and updates its body.
             * If no open release PR exists, emits a warning and returns without failing.
             *
             * @param {{ github: object, core: object, owner: string, repo: string, targetBranch: string, compareRange: string, targetVersion: string }} opts
             * @returns {Promise<void>}
             */
            async function refreshReleasePR({ github, core, owner, repo, targetBranch, compareRange, targetVersion }) {
              if (!targetBranch) {
                core.warning('No target release branch provided; skipping PR metadata refresh');
                return;
              }
            
              const { data: releasePRs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                head: `${owner}:${targetBranch}`,
                base: 'main',
              });
            
              if (releasePRs.length === 0) {
                core.warning(`No open release PR found for branch ${targetBranch}; skipping PR metadata refresh`);
                return;
              }
            
              const prNumber = releasePRs[0].number;
              const prBody = buildReleasePRBody({ targetVersion, compareRange });
            
              core.info(`Refreshing release PR #${prNumber} metadata`);
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: prNumber,
                body: prBody,
              });
              core.info(`Release PR #${prNumber} metadata refreshed`);
            }
            
            if (typeof module !== 'undefined') {
              module.exports = {
                buildUnreleasedPRBody,
                buildReleasePRBody,
                manageUnreleasedPR,
                refreshReleasePR,
              };
            }
            
            const { owner, repo } = context.repo;
            const compareRange = process.env.COMPARE_RANGE;
            
            const result = await manageUnreleasedPR({ github, owner, repo, compareRange });
            core.setOutput('pr_action', result.prAction);
            core.setOutput('pr_number', String(result.prNumber));
            core.setOutput('pr_url', result.prUrl);
            
      - name: Report result (unreleased mode)
        if: >-
          steps.resolve_release_context.outputs.mode == 'unreleased' &&
          steps.lookup_pr.outcome == 'success'
        run: |
          echo "PR action: ${{ steps.lookup_pr.outputs.pr_action }}"
          echo "PR URL: ${{ steps.lookup_pr.outputs.pr_url }}"
