# This file is generated by `scripts/compile-workflow-sources/main.go` from `.github/workflows-src/changelog-generation/workflow.yml.tmpl`. Do not edit directly.
name: Changelog Generation
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Changelog generation mode'
        required: true
        default: 'unreleased'
        type: choice
        options:
          - unreleased
          - release
      target_version:
        description: 'Target version for release mode (for example 0.14.5)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'release' && format('prep-release-{0}', inputs.target_version) || '' }}

      - name: Validate workflow inputs
        if: github.event_name == 'workflow_dispatch'
        env:
          MODE: ${{ inputs.mode }}
          TARGET_VERSION: ${{ inputs.target_version || '' }}
        run: |
          if [ "$MODE" = "release" ] && [ -z "$TARGET_VERSION" ]; then
            echo "target_version is required when mode=release" >&2
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run shared changelog engine
        id: changelog_engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CHANGELOG_MODE: ${{ github.event_name == 'schedule' && 'unreleased' || inputs.mode }}
          TARGET_VERSION: ${{ inputs.target_version || '' }}
          CHANGELOG_PATH: CHANGELOG.md
        run: go run ./scripts/changelog-generation/...

      - name: Commit changelog (release mode)
        id: commit_release
        if: steps.changelog_engine.outputs.mode == 'release'
        env:
          TARGET_VERSION: ${{ steps.changelog_engine.outputs.target_version }}
          TARGET_BRANCH: ${{ steps.changelog_engine.outputs.target_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- CHANGELOG.md; then
            echo "No release changelog changes to commit"
            echo "pushed=false" >> $GITHUB_OUTPUT
            echo "ran=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          git add CHANGELOG.md
          git commit -m "chore(changelog): update changelog for v${TARGET_VERSION}"
          git push origin HEAD:${TARGET_BRANCH}
          echo "pushed=true" >> $GITHUB_OUTPUT
          echo "ran=true" >> $GITHUB_OUTPUT

      - name: Refresh release PR metadata (release mode)
        if: >-
          steps.changelog_engine.outputs.mode == 'release' &&
          steps.commit_release.outputs.pushed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          COMPARE_RANGE: ${{ steps.changelog_engine.outputs.compare_range }}
          TARGET_VERSION: ${{ steps.changelog_engine.outputs.target_version }}
          TARGET_BRANCH: ${{ steps.changelog_engine.outputs.target_branch }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            /**
             * PR management helpers for the changelog-generation workflow.
             *
             * Extracted from inline `actions/github-script` blocks so the logic can be
             * unit-tested independently of the GitHub Actions runner.
             *
             * Two functions handle the two distinct modes:
             *   - manageUnreleasedPR  — singleton `generated-changelog` → `main` PR
             *   - refreshReleasePR    — update the prep-release-* PR body with metadata
             */
            
            /**
             * Build the PR body for the generated-changelog PR (unreleased mode).
             *
             * @param {{ compareRange: string }} opts
             * @returns {string}
             */
            function buildUnreleasedPRBody({ compareRange }) {
              const today = new Date().toISOString().split('T')[0];
              return [
                `**Generated:** ${today}`,
                `**Compare range:** \`${compareRange}\``,
                '',
                '> This PR is auto-generated by the changelog-generation workflow.',
                '> Re-runs will force-push this branch and overwrite any manual edits.',
                '> Do not make manual edits to the `generated-changelog` branch.',
              ].join('\n');
            }
            
            /**
             * Build the PR body for the release prep PR (release mode).
             *
             * @param {{ targetVersion: string, compareRange: string }} opts
             * @returns {string}
             */
            function buildReleasePRBody({ targetVersion, compareRange }) {
              const today = new Date().toISOString().split('T')[0];
              return [
                `**Generated:** ${today}`,
                `**Version:** \`${targetVersion}\``,
                `**Compare range:** \`${compareRange}\``,
                '',
                '> This PR body was last refreshed by the changelog-generation workflow.',
              ].join('\n');
            }
            
            /**
             * Manage the singleton `generated-changelog` PR (unreleased mode).
             *
             * Looks up any existing open PR from `generated-changelog` → `main`.
             * If found, updates its body and returns action='updated'.
             * If not found, creates a new PR and returns action='created'.
             *
             * @param {{ github: object, owner: string, repo: string, compareRange: string }} opts
             * @returns {Promise<{ prAction: string, prNumber: number, prUrl: string }>}
             */
            async function manageUnreleasedPR({ github, owner, repo, compareRange }) {
              const prBody = buildUnreleasedPRBody({ compareRange });
            
              const { data: existingPRs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                head: `${owner}:generated-changelog`,
                base: 'main',
              });
            
              if (existingPRs.length > 0) {
                const existingPR = existingPRs[0];
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: existingPR.number,
                  body: prBody,
                });
                return {
                  prAction: 'updated',
                  prNumber: existingPR.number,
                  prUrl: existingPR.html_url,
                };
              }
            
              const { data: newPR } = await github.rest.pulls.create({
                owner,
                repo,
                title: 'chore: update CHANGELOG.md [Unreleased] section',
                body: prBody,
                head: 'generated-changelog',
                base: 'main',
              });
              return {
                prAction: 'created',
                prNumber: newPR.number,
                prUrl: newPR.html_url,
              };
            }
            
            /**
             * Refresh the release prep PR body with generated metadata.
             *
             * If prNumber is null/undefined, emits a warning and returns without failing.
             *
             * @param {{ github: object, core: object, owner: string, repo: string, prNumber: number|null, compareRange: string, targetVersion: string }} opts
             * @returns {Promise<void>}
             */
            async function refreshReleasePR({ github, core, owner, repo, prNumber, compareRange, targetVersion }) {
              if (!prNumber) {
                core.warning('No pull_request.number in event metadata; skipping PR metadata refresh');
                return;
              }
            
              const prBody = buildReleasePRBody({ targetVersion, compareRange });
            
              core.info(`Refreshing release PR #${prNumber} metadata`);
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: prNumber,
                body: prBody,
              });
              core.info(`Release PR #${prNumber} metadata refreshed`);
            }
            
            if (typeof module !== 'undefined') {
              module.exports = {
                buildUnreleasedPRBody,
                buildReleasePRBody,
                manageUnreleasedPR,
                refreshReleasePR,
              };
            }
            
            const { owner, repo } = context.repo;
            let prNumber = context.payload.pull_request?.number ?? null;
            const compareRange = process.env.COMPARE_RANGE;
            const targetVersion = process.env.TARGET_VERSION;
            const targetBranch = process.env.TARGET_BRANCH;
            
            if (!prNumber && targetBranch) {
              const { data: prs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                head: `${owner}:${targetBranch}`,
                base: 'main',
              });
              prNumber = prs[0]?.number ?? null;
            
              if (prNumber) {
                core.info(`Resolved release PR #${prNumber} from branch ${targetBranch}`);
              } else {
                core.info(`No open release PR found for branch ${targetBranch}; skipping PR metadata refresh`);
              }
            }
            
            await refreshReleasePR({ github, core, owner, repo, prNumber, compareRange, targetVersion });
            
      - name: Push to generated-changelog branch (unreleased mode)
        id: push_unreleased
        if: steps.changelog_engine.outputs.mode == 'unreleased'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- CHANGELOG.md; then
            echo "No unreleased changelog changes to commit"
            echo "pushed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git add CHANGELOG.md
          git commit -m "chore(changelog): update unreleased changelog section"
          git push origin HEAD:generated-changelog --force
          echo "pushed=true" >> $GITHUB_OUTPUT

      - name: Look up existing generated-changelog PR (unreleased mode)
        id: lookup_pr
        if: >-
          steps.push_unreleased.outputs.pushed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          COMPARE_RANGE: ${{ steps.changelog_engine.outputs.compare_range }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            /**
             * PR management helpers for the changelog-generation workflow.
             *
             * Extracted from inline `actions/github-script` blocks so the logic can be
             * unit-tested independently of the GitHub Actions runner.
             *
             * Two functions handle the two distinct modes:
             *   - manageUnreleasedPR  — singleton `generated-changelog` → `main` PR
             *   - refreshReleasePR    — update the prep-release-* PR body with metadata
             */
            
            /**
             * Build the PR body for the generated-changelog PR (unreleased mode).
             *
             * @param {{ compareRange: string }} opts
             * @returns {string}
             */
            function buildUnreleasedPRBody({ compareRange }) {
              const today = new Date().toISOString().split('T')[0];
              return [
                `**Generated:** ${today}`,
                `**Compare range:** \`${compareRange}\``,
                '',
                '> This PR is auto-generated by the changelog-generation workflow.',
                '> Re-runs will force-push this branch and overwrite any manual edits.',
                '> Do not make manual edits to the `generated-changelog` branch.',
              ].join('\n');
            }
            
            /**
             * Build the PR body for the release prep PR (release mode).
             *
             * @param {{ targetVersion: string, compareRange: string }} opts
             * @returns {string}
             */
            function buildReleasePRBody({ targetVersion, compareRange }) {
              const today = new Date().toISOString().split('T')[0];
              return [
                `**Generated:** ${today}`,
                `**Version:** \`${targetVersion}\``,
                `**Compare range:** \`${compareRange}\``,
                '',
                '> This PR body was last refreshed by the changelog-generation workflow.',
              ].join('\n');
            }
            
            /**
             * Manage the singleton `generated-changelog` PR (unreleased mode).
             *
             * Looks up any existing open PR from `generated-changelog` → `main`.
             * If found, updates its body and returns action='updated'.
             * If not found, creates a new PR and returns action='created'.
             *
             * @param {{ github: object, owner: string, repo: string, compareRange: string }} opts
             * @returns {Promise<{ prAction: string, prNumber: number, prUrl: string }>}
             */
            async function manageUnreleasedPR({ github, owner, repo, compareRange }) {
              const prBody = buildUnreleasedPRBody({ compareRange });
            
              const { data: existingPRs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                head: `${owner}:generated-changelog`,
                base: 'main',
              });
            
              if (existingPRs.length > 0) {
                const existingPR = existingPRs[0];
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: existingPR.number,
                  body: prBody,
                });
                return {
                  prAction: 'updated',
                  prNumber: existingPR.number,
                  prUrl: existingPR.html_url,
                };
              }
            
              const { data: newPR } = await github.rest.pulls.create({
                owner,
                repo,
                title: 'chore: update CHANGELOG.md [Unreleased] section',
                body: prBody,
                head: 'generated-changelog',
                base: 'main',
              });
              return {
                prAction: 'created',
                prNumber: newPR.number,
                prUrl: newPR.html_url,
              };
            }
            
            /**
             * Refresh the release prep PR body with generated metadata.
             *
             * If prNumber is null/undefined, emits a warning and returns without failing.
             *
             * @param {{ github: object, core: object, owner: string, repo: string, prNumber: number|null, compareRange: string, targetVersion: string }} opts
             * @returns {Promise<void>}
             */
            async function refreshReleasePR({ github, core, owner, repo, prNumber, compareRange, targetVersion }) {
              if (!prNumber) {
                core.warning('No pull_request.number in event metadata; skipping PR metadata refresh');
                return;
              }
            
              const prBody = buildReleasePRBody({ targetVersion, compareRange });
            
              core.info(`Refreshing release PR #${prNumber} metadata`);
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: prNumber,
                body: prBody,
              });
              core.info(`Release PR #${prNumber} metadata refreshed`);
            }
            
            if (typeof module !== 'undefined') {
              module.exports = {
                buildUnreleasedPRBody,
                buildReleasePRBody,
                manageUnreleasedPR,
                refreshReleasePR,
              };
            }
            
            const { owner, repo } = context.repo;
            const compareRange = process.env.COMPARE_RANGE;
            
            const result = await manageUnreleasedPR({ github, owner, repo, compareRange });
            core.setOutput('pr_action', result.prAction);
            core.setOutput('pr_number', String(result.prNumber));
            core.setOutput('pr_url', result.prUrl);
            
      - name: Report result (unreleased mode)
        if: >-
          steps.changelog_engine.outputs.mode == 'unreleased' &&
          steps.lookup_pr.outcome == 'success'
        run: |
          echo "PR action: ${{ steps.lookup_pr.outputs.pr_action }}"
          echo "PR URL: ${{ steps.lookup_pr.outputs.pr_url }}"
