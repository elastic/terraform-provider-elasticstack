          GH_AW_LOCKDOWN_CHECK_FAILED: ${{ needs.activation.outputs.lockdown_check_failed }}
          GH_AW_STALE_LOCK_FILE_FAILED: ${{ needs.activation.outputs.stale_lock_file_failed }}
          GH_AW_PUSH_REPO_MEMORY_RESULT: ${{ needs.push_repo_memory.result }}
          GH_AW_REPO_MEMORY_VALIDATION_FAILED_semantic-function-refactor: ${{ needs.push_repo_memory.outputs.validation_failed_semantic-function-refactor }}
          GH_AW_REPO_MEMORY_VALIDATION_ERROR_semantic-function-refactor: ${{ needs.push_repo_memory.outputs.validation_error_semantic-function-refactor }}
          GH_AW_REPO_MEMORY_PATCH_SIZE_EXCEEDED_semantic-function-refactor: ${{ needs.push_repo_memory.outputs.patch_size_exceeded_semantic-function-refactor }}
          GH_AW_GROUP_REPORTS: "false"
          GH_AW_FAILURE_REPORT_AS_ISSUE: "true"
