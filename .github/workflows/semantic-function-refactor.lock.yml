          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SOURCE_WORKFLOW: semantic-function-refactor

  pre_activation:
    runs-on: ubuntu-slim
    outputs:
      activated: ${{ steps.check_membership.outputs.is_team_member == 'true' }}
      compute_issue_slots_result: ${{ steps.compute_issue_slots.outcome }}
      gate_reason: ${{ steps.compute_issue_slots.outputs.gate_reason }}
      issue_slots_available: ${{ steps.compute_issue_slots.outputs.issue_slots_available }}
      matched_command: ''
      open_issues: ${{ steps.compute_issue_slots.outputs.open_issues }}
      setup-trace-id: ${{ steps.setup.outputs.trace-id }}
    steps:
      - name: Setup Scripts
        id: setup
        uses: github/gh-aw-actions/setup@239aec45b78c8799417efdd5bc6d8cc036629ec1 # v0.71.1
        with:
          destination: ${{ runner.temp }}/gh-aw/actions
          job-name: ${{ github.job }}
      - name: Check team membership for workflow
        id: check_membership
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          GH_AW_REQUIRED_ROLES: "admin,maintainer,write"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/check_membership.cjs');
            await main();
      - name: Compute issue slots
        id: compute_issue_slots
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          ISSUE_SLOTS_CAP: "3"
          ISSUE_SLOTS_LABEL: semantic-refactor
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            /**
             * Computes issue slot availability for a labeled issue bucket.
             * @param {{ label: string, issueCap: number | string, openIssueCount: number }} params
             * @returns {{ open_issues: number, issue_slots_available: number, gate_reason: string }}
             */
            function computeIssueSlots({ label, issueCap, openIssueCount }) {
              const normalizedLabel = String(label).trim();
              const cap = Number(issueCap);

              if (!normalizedLabel) {
                throw new Error('issue slot label must be a non-empty string');
              }

              if (!Number.isInteger(cap) || cap < 0) {
                throw new Error(`issue cap must be a non-negative integer, got: ${issueCap}`);
              }

              if (!Number.isInteger(openIssueCount) || openIssueCount < 0) {
                throw new Error(`open issue count must be a non-negative integer, got: ${openIssueCount}`);
              }

              const slotsAvailable = Math.max(0, cap - openIssueCount);

              let gateReason;
              if (slotsAvailable === 0) {
                gateReason = `Issue cap reached: ${openIssueCount} open ${normalizedLabel} issue(s), cap is ${cap}. Agent job will be skipped.`;
              } else {
                gateReason = `${slotsAvailable} slot(s) available: ${openIssueCount} open ${normalizedLabel} issue(s), cap is ${cap}.`;
              }

              return {
                open_issues: openIssueCount,
                issue_slots_available: slotsAvailable,
                gate_reason: gateReason,
              };
            }

            if (typeof module !== 'undefined') {
              module.exports = { computeIssueSlots };
            }

            const ISSUE_LABEL = process.env.ISSUE_SLOTS_LABEL;
            const ISSUE_CAP = process.env.ISSUE_SLOTS_CAP;
            const { owner, repo } = context.repo;

            // Count open issues for this workflow label, excluding pull requests
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              labels: ISSUE_LABEL,
              state: 'open',
              per_page: 100,
            });

            // GitHub issues API may return pull requests — exclude them
            const openIssueCount = issues.filter(item => !item.pull_request).length;

            const result = computeIssueSlots({
              label: ISSUE_LABEL,
              issueCap: ISSUE_CAP,
              openIssueCount,
            });

            core.setOutput('open_issues', String(result.open_issues));
            core.setOutput('issue_slots_available', String(result.issue_slots_available));
            core.setOutput('gate_reason', result.gate_reason);

            core.info(`Gate reason: ${result.gate_reason}`);

  push_repo_memory:
    needs:
      - activation
      - agent
      - detection
    if: >
      always() && (!cancelled()) && (needs.detection.result == 'success' || needs.detection.result == 'skipped') &&
      needs.agent.result != 'skipped'
    runs-on: ubuntu-slim
    permissions:
      contents: write
    concurrency:
      group: "push-repo-memory-${{ github.repository }}|memory/semantic-function-refactor"
      cancel-in-progress: false
    outputs:
      patch_size_exceeded_semantic-function-refactor: ${{ steps.push_repo_memory_semantic-function-refactor.outputs.patch_size_exceeded }}
      validation_error_semantic-function-refactor: ${{ steps.push_repo_memory_semantic-function-refactor.outputs.validation_error }}
      validation_failed_semantic-function-refactor: ${{ steps.push_repo_memory_semantic-function-refactor.outputs.validation_failed }}
    steps:
      - name: Setup Scripts
        id: setup
        uses: github/gh-aw-actions/setup@239aec45b78c8799417efdd5bc6d8cc036629ec1 # v0.71.1
        with:
          destination: ${{ runner.temp }}/gh-aw/actions
          job-name: ${{ github.job }}
          trace-id: ${{ needs.activation.outputs.setup-trace-id }}
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: .
      - name: Configure Git credentials
        env:
          REPO_NAME: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global am.keepcr true
          # Re-authenticate git with GitHub token
          SERVER_URL_STRIPPED="${SERVER_URL#https://}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@${SERVER_URL_STRIPPED}/${REPO_NAME}.git"
          echo "Git configured with standard GitHub Actions identity"
      - name: Download repo-memory artifact (semantic-function-refactor)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: repo-memory-semanticfunctionrefactor
          path: /tmp/gh-aw/repo-memory/semantic-function-refactor
      - name: Push repo-memory changes (semantic-function-refactor)
        id: push_repo_memory_semantic-function-refactor
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          ARTIFACT_DIR: /tmp/gh-aw/repo-memory/semantic-function-refactor
          MEMORY_ID: semantic-function-refactor
          TARGET_REPO: ${{ github.repository }}
          BRANCH_NAME: memory/semantic-function-refactor
          MAX_FILE_SIZE: 524288
          MAX_FILE_COUNT: 100
          MAX_PATCH_SIZE: 102400
          ALLOWED_EXTENSIONS: '[]'
          FILE_GLOB_FILTER: "memory/semantic-function-refactor/serena-state.json"
        with:
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/push_repo_memory.cjs');
            await main();

  safe_outputs:
    needs:
      - activation
      - agent
      - detection
    if: (!cancelled()) && needs.agent.result != 'skipped' && needs.detection.result == 'success'
    runs-on: ubuntu-slim
    permissions:
      contents: read
      issues: write
    timeout-minutes: 15
    env:
      GH_AW_CALLER_WORKFLOW_ID: "${{ github.repository }}/semantic-function-refactor"
      GH_AW_DETECTION_CONCLUSION: ${{ needs.detection.outputs.detection_conclusion }}
      GH_AW_DETECTION_REASON: ${{ needs.detection.outputs.detection_reason }}
      GH_AW_EFFECTIVE_TOKENS: ${{ needs.agent.outputs.effective_tokens }}
      GH_AW_ENGINE_ID: "claude"
      GH_AW_ENGINE_MODEL: "llm-gateway/claude-sonnet-4-6"
      GH_AW_WORKFLOW_ID: "semantic-function-refactor"
      GH_AW_WORKFLOW_NAME: "Semantic Function Refactor"
    outputs:
      code_push_failure_count: ${{ steps.process_safe_outputs.outputs.code_push_failure_count }}
      code_push_failure_errors: ${{ steps.process_safe_outputs.outputs.code_push_failure_errors }}
      create_discussion_error_count: ${{ steps.process_safe_outputs.outputs.create_discussion_error_count }}
      create_discussion_errors: ${{ steps.process_safe_outputs.outputs.create_discussion_errors }}
      created_issue_number: ${{ steps.process_safe_outputs.outputs.created_issue_number }}
      created_issue_url: ${{ steps.process_safe_outputs.outputs.created_issue_url }}
      process_safe_outputs_processed_count: ${{ steps.process_safe_outputs.outputs.processed_count }}
      process_safe_outputs_temporary_id_map: ${{ steps.process_safe_outputs.outputs.temporary_id_map }}
    steps:
      - name: Setup Scripts
        id: setup
        uses: github/gh-aw-actions/setup@239aec45b78c8799417efdd5bc6d8cc036629ec1 # v0.71.1
        with:
          destination: ${{ runner.temp }}/gh-aw/actions
          job-name: ${{ github.job }}
          trace-id: ${{ needs.activation.outputs.setup-trace-id }}
      - name: Download agent output artifact
        id: download-agent-output
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: agent
          path: /tmp/gh-aw/
      - name: Setup agent output environment variable
        id: setup-agent-output-env
        if: steps.download-agent-output.outcome == 'success'
        run: |
          mkdir -p /tmp/gh-aw/
          find "/tmp/gh-aw/" -type f -print
          echo "GH_AW_AGENT_OUTPUT=/tmp/gh-aw/agent_output.json" >> "$GITHUB_OUTPUT"
      - name: Configure GH_HOST for enterprise compatibility
        id: ghes-host-config
        shell: bash
        run: |
          # Derive GH_HOST from GITHUB_SERVER_URL so the gh CLI targets the correct
          # GitHub instance (GHES/GHEC). On github.com this is a harmless no-op.
          GH_HOST="${GITHUB_SERVER_URL#https://}"
          GH_HOST="${GH_HOST#http://}"
          echo "GH_HOST=${GH_HOST}" >> "$GITHUB_ENV"
      - name: Process Safe Outputs
        id: process_safe_outputs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          GH_AW_AGENT_OUTPUT: ${{ steps.setup-agent-output-env.outputs.GH_AW_AGENT_OUTPUT }}
          GH_AW_ALLOWED_DOMAINS: "*.githubusercontent.com,anthropic.com,api.anthropic.com,api.github.com,api.snapcraft.io,archive.ubuntu.com,azure.archive.ubuntu.com,cdn.playwright.dev,codeload.github.com,crl.geotrust.com,crl.globalsign.com,crl.identrust.com,crl.sectigo.com,crl.thawte.com,crl.usertrust.com,crl.verisign.com,crl3.digicert.com,crl4.digicert.com,crls.ssl.com,elastic.litellm-prod.ai,files.pythonhosted.org,ghcr.io,github-cloud.githubusercontent.com,github-cloud.s3.amazonaws.com,github.com,go.dev,golang.org,goproxy.io,host.docker.internal,json-schema.org,json.schemastore.org,keyserver.ubuntu.com,lfs.github.com,objects.githubusercontent.com,ocsp.digicert.com,ocsp.geotrust.com,ocsp.globalsign.com,ocsp.identrust.com,ocsp.sectigo.com,ocsp.ssl.com,ocsp.thawte.com,ocsp.usertrust.com,ocsp.verisign.com,packagecloud.io,packages.cloud.google.com,packages.microsoft.com,pkg.go.dev,playwright.download.prss.microsoft.com,ppa.launchpad.net,proxy.golang.org,pypi.org,raw.githubusercontent.com,registry.npmjs.org,s.symcb.com,s.symcd.com,security.ubuntu.com,sentry.io,statsig.anthropic.com,storage.googleapis.com,sum.golang.org,ts-crl.ws.symantec.com,ts-ocsp.ws.symantec.com,www.googleapis.com"
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_API_URL: ${{ github.api_url }}
          GH_AW_SAFE_OUTPUT_JOBS: "{\"dispatch_code_factory\":\"\"}"
          GH_AW_SAFE_OUTPUTS_HANDLER_CONFIG: "{\"create_issue\":{\"labels\":[\"semantic-refactor\",\"refactoring\",\"code-quality\",\"automated-analysis\"],\"max\":3,\"title_prefix\":\"[semantic-refactor] \"},\"create_report_incomplete_issue\":{},\"missing_data\":{},\"missing_tool\":{},\"noop\":{\"max\":1,\"report-as-issue\":\"true\"},\"report_incomplete\":{}}"
        with:
          github-token: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/safe_output_handler_manager.cjs');
            await main();
      - name: Upload Safe Outputs Items
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: safe-outputs-items
          path: |
            /tmp/gh-aw/safe-output-items.jsonl
            /tmp/gh-aw/temporary-id-map.json
          if-no-files-found: ignore

