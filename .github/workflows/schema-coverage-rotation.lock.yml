          GH_AW_ASSIGNMENT_ERRORS: ${{ needs.safe_outputs.outputs.assign_to_agent_assignment_errors }}
          GH_AW_ASSIGNMENT_ERROR_COUNT: ${{ needs.safe_outputs.outputs.assign_to_agent_assignment_error_count }}
          GH_AW_LOCKDOWN_CHECK_FAILED: ${{ needs.activation.outputs.lockdown_check_failed }}
          GH_AW_STALE_LOCK_FILE_FAILED: ${{ needs.activation.outputs.stale_lock_file_failed }}
          GH_AW_PUSH_REPO_MEMORY_RESULT: ${{ needs.push_repo_memory.result }}
          GH_AW_REPO_MEMORY_VALIDATION_FAILED_schema-coverage-rotation: ${{ needs.push_repo_memory.outputs.validation_failed_schema-coverage-rotation }}
          GH_AW_REPO_MEMORY_VALIDATION_ERROR_schema-coverage-rotation: ${{ needs.push_repo_memory.outputs.validation_error_schema-coverage-rotation }}
          GH_AW_REPO_MEMORY_PATCH_SIZE_EXCEEDED_schema-coverage-rotation: ${{ needs.push_repo_memory.outputs.patch_size_exceeded_schema-coverage-rotation }}
          GH_AW_GROUP_REPORTS: "false"
          GH_AW_FAILURE_REPORT_AS_ISSUE: "true"
          GH_AW_TIMEOUT_MINUTES: "20"
        with:
          github-token: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/handle_agent_failure.cjs');
