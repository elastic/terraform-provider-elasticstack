          GH_AW_NEEDS_PRE_ACTIVATION_OUTPUTS_ISSUE_SLOTS_AVAILABLE: ${{ needs.pre_activation.outputs.issue_slots_available }}
          GH_AW_NEEDS_PRE_ACTIVATION_OUTPUTS_OPEN_SCHEMA_COVERAGE_ISSUES: ${{ needs.pre_activation.outputs.open_schema_coverage_issues }}
        # poutine:ignore untrusted_checkout_exec
        run: |
          bash "${RUNNER_TEMP}/gh-aw/actions/create_prompt_first.sh"
          {
          cat << 'GH_AW_PROMPT_90aa663b596c9de7_EOF'
          <system>
          GH_AW_PROMPT_90aa663b596c9de7_EOF
          cat "${RUNNER_TEMP}/gh-aw/prompts/xpia.md"
          cat "${RUNNER_TEMP}/gh-aw/prompts/temp_folder_prompt.md"
          cat "${RUNNER_TEMP}/gh-aw/prompts/markdown.md"
          cat "${RUNNER_TEMP}/gh-aw/prompts/repo_memory_prompt_multi.md"
          cat "${RUNNER_TEMP}/gh-aw/prompts/safe_outputs_prompt.md"
          cat << 'GH_AW_PROMPT_90aa663b596c9de7_EOF'
          <safe-output-tools>
          Tools: create_issue(max:3), assign_to_agent(max:3), missing_tool, missing_data, noop
          </safe-output-tools>
