---
# This file is generated by `scripts/compile-workflow-sources/main.go` from `.github/workflows-src/openspec/workflow.yml.tmpl`. Do not edit directly.
name: OpenSpec CI
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate OpenSpecs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install Node dependencies
        run: npm ci
      - name: Validate OpenSpecs
        env:
          OPENSPEC_TELEMETRY: "0"
        run: make check-openspec

  gate:
    name: OpenSpec Gate
    needs: [validate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate gate
        run: |
          if [ "${{ needs.validate.result }}" = "success" ]; then
            echo "OpenSpec validation passed."
            exit 0
          elif [ "${{ needs.validate.result }}" = "skipped" ]; then
            echo "Unexpected: validate job was skipped."
            exit 1
          else
            echo "OpenSpec validation failed or was cancelled."
            exit 1
          fi
