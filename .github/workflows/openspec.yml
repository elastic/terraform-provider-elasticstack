---
name: OpenSpec CI
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate OpenSpecs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install Node dependencies
        run: npm ci
      - name: Validate OpenSpecs
        env:
          OPENSPEC_TELEMETRY: "0"
        run: make check-openspec

  gate:
    name: OpenSpec Gate
    needs: [validate]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate gate
        run: |
          if [ "${{ needs.validate.result }}" = "success" ]; then
            echo "OpenSpec validation passed."
            exit 0
          elif [ "${{ needs.validate.result }}" = "skipped" ]; then
            echo "Unexpected: validate job was skipped."
            exit 1
          else
            echo "OpenSpec validation failed or was cancelled."
            exit 1
          fi
