name: Trigger Tests for Copilot PRs

on: # zizmor: ignore[dangerous-triggers] — workflow_run is required to detect Copilot pushes
  workflow_run:
    workflows: ["Build/Lint/Test"]
    types: [requested]

permissions: {}

jobs:
  trigger-tests:
    name: Trigger test workflow
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.actor.login == 'copilot-swe-agent[bot]' ||
      github.event.workflow_run.triggering_actor.login == 'copilot-swe-agent[bot]' ||
      github.event.workflow_run.actor.login == 'Copilot' ||
      github.event.workflow_run.triggering_actor.login == 'Copilot'
    steps:
      - name: Trigger test workflow on branch
        env:
          GH_TOKEN: >-
            ${{ (secrets.AUTO_APPROVE_WORKFLOWS_TOKEN != '' && secrets.AUTO_APPROVE_WORKFLOWS_TOKEN) || github.token }}
        run: |
          branch="${{ github.event.workflow_run.head_branch }}"
          echo "Triggering test.yml on branch: $branch"
          gh workflow run test.yml --repo "${{ github.repository }}" -f ref="$branch"
