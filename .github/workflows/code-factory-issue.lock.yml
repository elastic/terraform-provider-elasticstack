                  event_eligible: false,
                  event_eligible_reason: `Issue labeled event does not qualify because the applied label is '${labelName || '(empty)'}', not 'code-factory'.`,
                };
              }

              if (eventAction === 'opened') {
                if (Array.isArray(issueLabels) && issueLabels.includes('code-factory')) {
                  return {
                    event_eligible: true,
                    event_eligible_reason: 'Issue opened event qualifies because the issue already has the code-factory label.',
                  };
                }

                return {
                  event_eligible: false,
                  event_eligible_reason: 'Issue opened event does not qualify because the issue was created without the code-factory label.',
                };
              }

              return {
                event_eligible: false,
                event_eligible_reason: `Issue event action '${eventAction || '(empty)'}' is not eligible; expected 'opened' or 'labeled'.`,
              };
            }

            /**
             * Checks whether the triggering actor is trusted for code-factory intake.
             * @param {{ sender: string, permission: string | null }} params
             * @returns {{ actor_trusted: boolean, actor_trusted_reason: string }}
             */
            function checkActorTrust({ sender, permission }) {
              if (sender === 'github-actions[bot]') {
                return {
                  actor_trusted: true,
                  actor_trusted_reason: 'Trigger actor github-actions[bot] is trusted without collaborator permission lookup.',
                };
              }

              if (['write', 'maintain', 'admin'].includes(permission)) {
                return {
                  actor_trusted: true,
                  actor_trusted_reason: `Trigger actor '${sender || '(empty)'}' is trusted with repository permission '${permission}'.`,
                };
              }

              return {
                actor_trusted: false,
                actor_trusted_reason: `Trigger actor '${sender || '(empty)'}' is not trusted; repository permission '${permission || '(none)'}' does not meet the required write/maintain/admin policy.`,
              };
            }

            /**
             * Checks for an existing open linked code-factory PR for the given issue.
             * @param {{ issueNumber: number, pullRequests: Array<{ number: number, state: string, head_branch: string, labels: string[], body: string, html_url: string }> }} params
             * @returns {{ duplicate_pr_found: boolean, duplicate_pr_url: string | null, gate_reason: string }}
             */
            function checkDuplicatePR({ issueNumber, pullRequests }) {
              const expectedBranch = `code-factory/issue-${issueNumber}`;
              const expectedLink = `Closes #${issueNumber}`;
              const closesPattern = new RegExp(`Closes #${issueNumber}(?![0-9])`);
              const duplicate = (pullRequests || []).find(pr => (
                pr.state === 'open' &&
                Array.isArray(pr.labels) && pr.labels.includes('code-factory') &&
                pr.head_branch === expectedBranch &&
                closesPattern.test(String(pr.body || ''))
              ));

              if (duplicate) {
                return {
                  duplicate_pr_found: true,
                  duplicate_pr_url: duplicate.html_url,
                  gate_reason: `Found existing linked code-factory PR #${duplicate.number} (${duplicate.html_url}) for issue #${issueNumber} on branch '${expectedBranch}' with canonical linkage '${expectedLink}'.`,
                };
              }

              return {
                duplicate_pr_found: false,
                duplicate_pr_url: null,
                gate_reason: `No open linked code-factory PR found for issue #${issueNumber}; expected label 'code-factory', branch '${expectedBranch}', and canonical linkage '${expectedLink}'.`,
              };
            }

            /**
             * Computes a consolidated gate reason from step outputs.
             * @param {{ eventEligible: boolean, eventEligibleReason: string, actorTrusted: boolean | null, actorTrustedReason: string | null, duplicatePrFound: boolean | null, duplicatePrUrl: string | null, noDuplicateReason: string | null }} params
             * @returns {{ gate_reason: string }}
             */
            function computeGateReason({ eventEligible, eventEligibleReason, actorTrusted, actorTrustedReason, duplicatePrFound, duplicatePrUrl, noDuplicateReason }) {
              if (!eventEligible) {
                return { gate_reason: eventEligibleReason };
              }

              if (actorTrusted === false) {
                return { gate_reason: actorTrustedReason || 'Trigger actor is not trusted.' };
              }

              if (actorTrusted == null) {
                return { gate_reason: 'Actor trust could not be determined; the trust check step did not produce an output.' };
              }

              if (duplicatePrFound === true) {
                return {
                  gate_reason: noDuplicateReason || `Found existing linked code-factory PR: ${duplicatePrUrl || '(unknown URL)'}.`,
                };
              }

              if (duplicatePrFound == null) {
                return { gate_reason: 'Duplicate PR check did not complete; the check step did not produce an output.' };
              }

              return {
                gate_reason: noDuplicateReason || 'All deterministic gates passed: event eligible, actor trusted, and no linked code-factory PR found.',
              };
            }

            if (typeof module !== 'undefined') {
              module.exports = {
                qualifyTriggerEvent,
                checkActorTrust,
                checkDuplicatePR,
                computeGateReason,
              };
            }

            const { owner, repo } = context.repo;
            const issueNumber = context.payload.issue?.number;
            const expectedBranch = `code-factory/issue-${issueNumber}`;

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:${expectedBranch}`,
              per_page: 100,
            });

            const pullRequests = pulls.map(pr => ({
              number: pr.number,
              state: pr.state,
              head_branch: pr.head.ref,
              labels: pr.labels.map(l => l.name),
              body: pr.body ?? '',
              html_url: pr.html_url,
            }));

            const result = checkDuplicatePR({ issueNumber, pullRequests });

            core.setOutput('duplicate_pr_found', result.duplicate_pr_found ? 'true' : 'false');
            core.setOutput('duplicate_pr_url', result.duplicate_pr_url ?? '');
            core.setOutput('gate_reason', result.gate_reason);

            if (result.duplicate_pr_found) {
              core.info(`Duplicate PR found: ${result.gate_reason}`);
            } else {
              core.info(`No duplicate PR: ${result.gate_reason}`);
            }
      - name: Finalize gate reason
        id: finalize_gate
        if: always()
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        env:
          ACTOR_TRUSTED: ${{ steps.check_actor_trust.outputs.actor_trusted }}
          ACTOR_TRUSTED_REASON: ${{ steps.check_actor_trust.outputs.actor_trusted_reason }}
          DUPLICATE_GATE_REASON: ${{ steps.check_duplicate_pr.outputs.gate_reason }}
          DUPLICATE_PR_FOUND: ${{ steps.check_duplicate_pr.outputs.duplicate_pr_found }}
          DUPLICATE_PR_URL: ${{ steps.check_duplicate_pr.outputs.duplicate_pr_url }}
          EVENT_ELIGIBLE: ${{ steps.qualify_trigger.outputs.event_eligible }}
          EVENT_ELIGIBLE_REASON: ${{ steps.qualify_trigger.outputs.event_eligible_reason }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            /**
             * Qualifies a GitHub issues event for code-factory intake.
             * @param {{ eventName: string, eventAction: string, labelName: string, issueLabels: string[] }} params
             * @returns {{ event_eligible: boolean, event_eligible_reason: string }}
             */
            function qualifyTriggerEvent({ eventName, eventAction, labelName, issueLabels }) {
              if (eventName !== 'issues') {
                return {
                  event_eligible: false,
                  event_eligible_reason: `Unsupported event '${eventName || '(empty)'}'; expected 'issues'.`,
                };
              }

              if (eventAction === 'labeled') {
                if (labelName === 'code-factory') {
                  return {
                    event_eligible: true,
                    event_eligible_reason: 'Issue labeled event qualifies because the applied label is code-factory.',
                  };
                }

                return {
                  event_eligible: false,
                  event_eligible_reason: `Issue labeled event does not qualify because the applied label is '${labelName || '(empty)'}', not 'code-factory'.`,
                };
              }

              if (eventAction === 'opened') {
                if (Array.isArray(issueLabels) && issueLabels.includes('code-factory')) {
                  return {
                    event_eligible: true,
                    event_eligible_reason: 'Issue opened event qualifies because the issue already has the code-factory label.',
                  };
                }

                return {
                  event_eligible: false,
                  event_eligible_reason: 'Issue opened event does not qualify because the issue was created without the code-factory label.',
                };
              }

              return {
                event_eligible: false,
                event_eligible_reason: `Issue event action '${eventAction || '(empty)'}' is not eligible; expected 'opened' or 'labeled'.`,
              };
            }

            /**
             * Checks whether the triggering actor is trusted for code-factory intake.
             * @param {{ sender: string, permission: string | null }} params
             * @returns {{ actor_trusted: boolean, actor_trusted_reason: string }}
             */
            function checkActorTrust({ sender, permission }) {
              if (sender === 'github-actions[bot]') {
                return {
                  actor_trusted: true,
                  actor_trusted_reason: 'Trigger actor github-actions[bot] is trusted without collaborator permission lookup.',
                };
              }

              if (['write', 'maintain', 'admin'].includes(permission)) {
                return {
                  actor_trusted: true,
                  actor_trusted_reason: `Trigger actor '${sender || '(empty)'}' is trusted with repository permission '${permission}'.`,
                };
              }

              return {
                actor_trusted: false,
                actor_trusted_reason: `Trigger actor '${sender || '(empty)'}' is not trusted; repository permission '${permission || '(none)'}' does not meet the required write/maintain/admin policy.`,
              };
            }

            /**
             * Checks for an existing open linked code-factory PR for the given issue.
             * @param {{ issueNumber: number, pullRequests: Array<{ number: number, state: string, head_branch: string, labels: string[], body: string, html_url: string }> }} params
             * @returns {{ duplicate_pr_found: boolean, duplicate_pr_url: string | null, gate_reason: string }}
             */
            function checkDuplicatePR({ issueNumber, pullRequests }) {
              const expectedBranch = `code-factory/issue-${issueNumber}`;
              const expectedLink = `Closes #${issueNumber}`;
              const closesPattern = new RegExp(`Closes #${issueNumber}(?![0-9])`);
              const duplicate = (pullRequests || []).find(pr => (
                pr.state === 'open' &&
                Array.isArray(pr.labels) && pr.labels.includes('code-factory') &&
                pr.head_branch === expectedBranch &&
                closesPattern.test(String(pr.body || ''))
              ));

              if (duplicate) {
                return {
                  duplicate_pr_found: true,
                  duplicate_pr_url: duplicate.html_url,
                  gate_reason: `Found existing linked code-factory PR #${duplicate.number} (${duplicate.html_url}) for issue #${issueNumber} on branch '${expectedBranch}' with canonical linkage '${expectedLink}'.`,
                };
              }

              return {
                duplicate_pr_found: false,
                duplicate_pr_url: null,
                gate_reason: `No open linked code-factory PR found for issue #${issueNumber}; expected label 'code-factory', branch '${expectedBranch}', and canonical linkage '${expectedLink}'.`,
              };
            }

            /**
             * Computes a consolidated gate reason from step outputs.
             * @param {{ eventEligible: boolean, eventEligibleReason: string, actorTrusted: boolean | null, actorTrustedReason: string | null, duplicatePrFound: boolean | null, duplicatePrUrl: string | null, noDuplicateReason: string | null }} params
             * @returns {{ gate_reason: string }}
             */
            function computeGateReason({ eventEligible, eventEligibleReason, actorTrusted, actorTrustedReason, duplicatePrFound, duplicatePrUrl, noDuplicateReason }) {
              if (!eventEligible) {
                return { gate_reason: eventEligibleReason };
              }

              if (actorTrusted === false) {
                return { gate_reason: actorTrustedReason || 'Trigger actor is not trusted.' };
              }

              if (actorTrusted == null) {
                return { gate_reason: 'Actor trust could not be determined; the trust check step did not produce an output.' };
              }

              if (duplicatePrFound === true) {
                return {
                  gate_reason: noDuplicateReason || `Found existing linked code-factory PR: ${duplicatePrUrl || '(unknown URL)'}.`,
                };
              }

              if (duplicatePrFound == null) {
                return { gate_reason: 'Duplicate PR check did not complete; the check step did not produce an output.' };
              }

              return {
                gate_reason: noDuplicateReason || 'All deterministic gates passed: event eligible, actor trusted, and no linked code-factory PR found.',
              };
            }

            if (typeof module !== 'undefined') {
              module.exports = {
                qualifyTriggerEvent,
                checkActorTrust,
                checkDuplicatePR,
                computeGateReason,
              };
            }

            const eventEligible = process.env.EVENT_ELIGIBLE === 'true';
            const eventEligibleReason = process.env.EVENT_ELIGIBLE_REASON ?? '';
            const actorTrustedRaw = process.env.ACTOR_TRUSTED;
            const actorTrustedReason = process.env.ACTOR_TRUSTED_REASON ?? null;
            const duplicatePrFoundRaw = process.env.DUPLICATE_PR_FOUND;
            const duplicatePrUrl = process.env.DUPLICATE_PR_URL || null;
            const noDuplicateReason = process.env.DUPLICATE_GATE_REASON ?? null;

            const result = computeGateReason({
              eventEligible,
              eventEligibleReason,
              actorTrusted: actorTrustedRaw != null && actorTrustedRaw !== '' ? actorTrustedRaw === 'true' : null,
              actorTrustedReason,
              duplicatePrFound: duplicatePrFoundRaw != null && duplicatePrFoundRaw !== '' ? duplicatePrFoundRaw === 'true' : null,
              duplicatePrUrl,
              noDuplicateReason,
            });

            core.setOutput('gate_reason', result.gate_reason);
            core.info(`Gate reason: ${result.gate_reason}`);

  safe_outputs:
    needs:
      - activation
      - agent
      - detection
    if: (!cancelled()) && needs.agent.result != 'skipped' && needs.detection.result == 'success'
    runs-on: ubuntu-slim
    permissions:
      contents: write
      issues: write
      pull-requests: write
    timeout-minutes: 15
    env:
      GH_AW_CALLER_WORKFLOW_ID: "${{ github.repository }}/code-factory-issue"
      GH_AW_DETECTION_CONCLUSION: ${{ needs.detection.outputs.detection_conclusion }}
      GH_AW_DETECTION_REASON: ${{ needs.detection.outputs.detection_reason }}
      GH_AW_EFFECTIVE_TOKENS: ${{ needs.agent.outputs.effective_tokens }}
      GH_AW_ENGINE_ID: "claude"
      GH_AW_ENGINE_MODEL: "llm-gateway/claude-sonnet-4-6"
      GH_AW_WORKFLOW_ID: "code-factory-issue"
      GH_AW_WORKFLOW_NAME: "Code Factory Issue Intake"
    outputs:
      code_push_failure_count: ${{ steps.process_safe_outputs.outputs.code_push_failure_count }}
      code_push_failure_errors: ${{ steps.process_safe_outputs.outputs.code_push_failure_errors }}
      create_discussion_error_count: ${{ steps.process_safe_outputs.outputs.create_discussion_error_count }}
      create_discussion_errors: ${{ steps.process_safe_outputs.outputs.create_discussion_errors }}
      created_pr_number: ${{ steps.process_safe_outputs.outputs.created_pr_number }}
      created_pr_url: ${{ steps.process_safe_outputs.outputs.created_pr_url }}
      process_safe_outputs_processed_count: ${{ steps.process_safe_outputs.outputs.processed_count }}
      process_safe_outputs_temporary_id_map: ${{ steps.process_safe_outputs.outputs.temporary_id_map }}
    steps:
      - name: Setup Scripts
        id: setup
        uses: github/gh-aw-actions/setup@ba90f2186d7ad780ec640f364005fa24e797b360 # v0.68.3
        with:
          destination: ${{ runner.temp }}/gh-aw/actions
          job-name: ${{ github.job }}
          trace-id: ${{ needs.activation.outputs.setup-trace-id }}
      - name: Download agent output artifact
        id: download-agent-output
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: agent
          path: /tmp/gh-aw/
      - name: Setup agent output environment variable
        id: setup-agent-output-env
        if: steps.download-agent-output.outcome == 'success'
        run: |
          mkdir -p /tmp/gh-aw/
          find "/tmp/gh-aw/" -type f -print
          echo "GH_AW_AGENT_OUTPUT=/tmp/gh-aw/agent_output.json" >> "$GITHUB_OUTPUT"
      - name: Download patch artifact
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: agent
          path: /tmp/gh-aw/
      - name: Checkout repository
        if: (!cancelled()) && needs.agent.result != 'skipped' && contains(needs.agent.outputs.output_types, 'create_pull_request')
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.base_ref || github.event.pull_request.base.ref || github.ref_name || github.event.repository.default_branch }}
          token: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: false
          fetch-depth: 1
      - name: Configure Git credentials
        if: (!cancelled()) && needs.agent.result != 'skipped' && contains(needs.agent.outputs.output_types, 'create_pull_request')
        env:
          REPO_NAME: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          GIT_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global am.keepcr true
          # Re-authenticate git with GitHub token
          SERVER_URL_STRIPPED="${SERVER_URL#https://}"
          git remote set-url origin "https://x-access-token:${GIT_TOKEN}@${SERVER_URL_STRIPPED}/${REPO_NAME}.git"
          echo "Git configured with standard GitHub Actions identity"
      - name: Configure GH_HOST for enterprise compatibility
        id: ghes-host-config
        shell: bash
        run: |
          # Derive GH_HOST from GITHUB_SERVER_URL so the gh CLI targets the correct
          # GitHub instance (GHES/GHEC). On github.com this is a harmless no-op.
          GH_HOST="${GITHUB_SERVER_URL#https://}"
          GH_HOST="${GH_HOST#http://}"
          echo "GH_HOST=${GH_HOST}" >> "$GITHUB_ENV"
      - name: Process Safe Outputs
        id: process_safe_outputs
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        env:
          GH_AW_AGENT_OUTPUT: ${{ steps.setup-agent-output-env.outputs.GH_AW_AGENT_OUTPUT }}
          GH_AW_ALLOWED_DOMAINS: "*.githubusercontent.com,anthropic.com,api.anthropic.com,api.github.com,api.npms.io,api.snapcraft.io,archive.ubuntu.com,azure.archive.ubuntu.com,bun.sh,cdn.jsdelivr.net,cdn.playwright.dev,codeload.github.com,crl.geotrust.com,crl.globalsign.com,crl.identrust.com,crl.sectigo.com,crl.thawte.com,crl.usertrust.com,crl.verisign.com,crl3.digicert.com,crl4.digicert.com,crls.ssl.com,deb.nodesource.com,deno.land,elastic.litellm-prod.ai,esm.sh,files.pythonhosted.org,get.pnpm.io,ghcr.io,github-cloud.githubusercontent.com,github-cloud.s3.amazonaws.com,github.com,googleapis.deno.dev,googlechromelabs.github.io,host.docker.internal,json-schema.org,json.schemastore.org,jsr.io,keyserver.ubuntu.com,lfs.github.com,nodejs.org,npm.pkg.github.com,npmjs.com,npmjs.org,objects.githubusercontent.com,ocsp.digicert.com,ocsp.geotrust.com,ocsp.globalsign.com,ocsp.identrust.com,ocsp.sectigo.com,ocsp.ssl.com,ocsp.thawte.com,ocsp.usertrust.com,ocsp.verisign.com,packagecloud.io,packages.cloud.google.com,packages.microsoft.com,playwright.download.prss.microsoft.com,ppa.launchpad.net,pypi.org,raw.githubusercontent.com,registry.bower.io,registry.npmjs.com,registry.npmjs.org,registry.yarnpkg.com,repo.yarnpkg.com,s.symcb.com,s.symcd.com,security.ubuntu.com,sentry.io,skimdb.npmjs.com,statsig.anthropic.com,storage.googleapis.com,telemetry.vercel.com,ts-crl.ws.symantec.com,ts-ocsp.ws.symantec.com,www.googleapis.com,www.npmjs.com,www.npmjs.org,yarnpkg.com"
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_API_URL: ${{ github.api_url }}
          GH_AW_SAFE_OUTPUTS_HANDLER_CONFIG: "{\"create_pull_request\":{\"labels\":[\"code-factory\"],\"max\":1,\"max_patch_size\":1024,\"protected_files\":[\"package.json\",\"bun.lockb\",\"bunfig.toml\",\"deno.json\",\"deno.jsonc\",\"deno.lock\",\"global.json\",\"NuGet.Config\",\"Directory.Packages.props\",\"mix.exs\",\"mix.lock\",\"go.mod\",\"go.sum\",\"stack.yaml\",\"stack.yaml.lock\",\"pom.xml\",\"build.gradle\",\"build.gradle.kts\",\"settings.gradle\",\"settings.gradle.kts\",\"gradle.properties\",\"package-lock.json\",\"yarn.lock\",\"pnpm-lock.yaml\",\"npm-shrinkwrap.json\",\"requirements.txt\",\"Pipfile\",\"Pipfile.lock\",\"pyproject.toml\",\"setup.py\",\"setup.cfg\",\"Gemfile\",\"Gemfile.lock\",\"uv.lock\",\"CODEOWNERS\",\"CLAUDE.md\"],\"protected_path_prefixes\":[\".github/\",\".agents/\",\".claude/\"]},\"create_report_incomplete_issue\":{},\"missing_data\":{},\"missing_tool\":{},\"noop\":{\"max\":1,\"report-as-issue\":\"false\"},\"report_incomplete\":{}}"
          GH_AW_CI_TRIGGER_TOKEN: ${{ secrets.GH_AW_CI_TRIGGER_TOKEN }}
        with:
          github-token: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/safe_output_handler_manager.cjs');
            await main();
      - name: Upload Safe Outputs Items
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: safe-outputs-items
          path: |
            /tmp/gh-aw/safe-output-items.jsonl
            /tmp/gh-aw/temporary-id-map.json
          if-no-files-found: ignore

