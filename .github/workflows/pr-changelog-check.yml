name: "PR Changelog Check"

on:
  pull_request_target:
    types: [opened, synchronize, edited, labeled, unlabeled]

permissions:
  pull-requests: write
  issues: write

concurrency:
  group: pr-changelog-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-changelog:
    name: "Check PR changelog"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: "Validate changelog section"
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const check = require('${{ github.workspace }}/.github/scripts/workflows/pr-changelog-check/check.js');
            await check({ github, context, core });
