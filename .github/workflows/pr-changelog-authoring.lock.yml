            const { main } = require('${{ runner.temp }}/gh-aw/actions/report_incomplete_handler.cjs');
            await main();
      - name: Handle agent failure
        id: handle_agent_failure
        if: always()
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        env:
          GH_AW_AGENT_OUTPUT: ${{ steps.setup-agent-output-env.outputs.GH_AW_AGENT_OUTPUT }}
          GH_AW_WORKFLOW_NAME: "PR Changelog Authoring"
          GH_AW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_AW_AGENT_CONCLUSION: ${{ needs.agent.result }}
          GH_AW_WORKFLOW_ID: "pr-changelog-authoring"
          GH_AW_ENGINE_ID: "claude"
          GH_AW_SECRET_VERIFICATION_RESULT: ${{ needs.activation.outputs.secret_verification_result }}
          GH_AW_CHECKOUT_PR_SUCCESS: ${{ needs.agent.outputs.checkout_pr_success }}
          GH_AW_LOCKDOWN_CHECK_FAILED: ${{ needs.activation.outputs.lockdown_check_failed }}
          GH_AW_STALE_LOCK_FILE_FAILED: ${{ needs.activation.outputs.stale_lock_file_failed }}
          GH_AW_GROUP_REPORTS: "false"
          GH_AW_FAILURE_REPORT_AS_ISSUE: "true"
          GH_AW_TIMEOUT_MINUTES: "20"
        with:
          github-token: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/handle_agent_failure.cjs');
            await main();

  detection:
    needs:
      - activation
      - agent
    if: >
      always() && needs.agent.result != 'skipped' && (needs.agent.outputs.output_types != '' || needs.agent.outputs.has_patch == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      detection_conclusion: ${{ steps.detection_conclusion.outputs.conclusion }}
      detection_reason: ${{ steps.detection_conclusion.outputs.reason }}
      detection_success: ${{ steps.detection_conclusion.outputs.success }}
    steps:
      - name: Setup Scripts
        id: setup
        uses: github/gh-aw-actions/setup@ba90f2186d7ad780ec640f364005fa24e797b360 # v0.68.3
        with:
          destination: ${{ runner.temp }}/gh-aw/actions
          job-name: ${{ github.job }}
          trace-id: ${{ needs.activation.outputs.setup-trace-id }}
      - name: Download agent output artifact
        id: download-agent-output
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: agent
          path: /tmp/gh-aw/
      - name: Setup agent output environment variable
        id: setup-agent-output-env
        if: steps.download-agent-output.outcome == 'success'
        run: |
          mkdir -p /tmp/gh-aw/
          find "/tmp/gh-aw/" -type f -print
          echo "GH_AW_AGENT_OUTPUT=/tmp/gh-aw/agent_output.json" >> "$GITHUB_OUTPUT"
      - name: Checkout repository for patch context
        if: needs.agent.outputs.has_patch == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # --- Threat Detection ---
      - name: Clean stale firewall files from agent artifact
        run: |
          rm -rf /tmp/gh-aw/sandbox/firewall/logs
          rm -rf /tmp/gh-aw/sandbox/firewall/audit
      - name: Download container images
        run: bash "${RUNNER_TEMP}/gh-aw/actions/download_docker_images.sh" ghcr.io/github/gh-aw-firewall/agent:0.25.20 ghcr.io/github/gh-aw-firewall/api-proxy:0.25.20 ghcr.io/github/gh-aw-firewall/squid:0.25.20
      - name: Check if detection needed
        id: detection_guard
        if: always()
        env:
          OUTPUT_TYPES: ${{ needs.agent.outputs.output_types }}
          HAS_PATCH: ${{ needs.agent.outputs.has_patch }}
        run: |
          if [[ -n "$OUTPUT_TYPES" || "$HAS_PATCH" == "true" ]]; then
            echo "run_detection=true" >> "$GITHUB_OUTPUT"
            echo "Detection will run: output_types=$OUTPUT_TYPES, has_patch=$HAS_PATCH"
          else
            echo "run_detection=false" >> "$GITHUB_OUTPUT"
            echo "Detection skipped: no agent outputs or patches to analyze"
          fi
      - name: Clear MCP configuration for detection
        if: always() && steps.detection_guard.outputs.run_detection == 'true'
        run: |
          rm -f /tmp/gh-aw/mcp-config/mcp-servers.json
          rm -f /home/runner/.copilot/mcp-config.json
          rm -f "$GITHUB_WORKSPACE/.gemini/settings.json"
      - name: Prepare threat detection files
        if: always() && steps.detection_guard.outputs.run_detection == 'true'
        run: |
          mkdir -p /tmp/gh-aw/threat-detection/aw-prompts
          cp /tmp/gh-aw/aw-prompts/prompt.txt /tmp/gh-aw/threat-detection/aw-prompts/prompt.txt 2>/dev/null || true
          cp /tmp/gh-aw/agent_output.json /tmp/gh-aw/threat-detection/agent_output.json 2>/dev/null || true
          for f in /tmp/gh-aw/aw-*.patch; do
            [ -f "$f" ] && cp "$f" /tmp/gh-aw/threat-detection/ 2>/dev/null || true
          done
          for f in /tmp/gh-aw/aw-*.bundle; do
            [ -f "$f" ] && cp "$f" /tmp/gh-aw/threat-detection/ 2>/dev/null || true
          done
          echo "Prepared threat detection files:"
          ls -la /tmp/gh-aw/threat-detection/ 2>/dev/null || true
      - name: Setup threat detection
        if: always() && steps.detection_guard.outputs.run_detection == 'true'
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        env:
          WORKFLOW_NAME: "PR Changelog Authoring"
          WORKFLOW_DESCRIPTION: "Ensures each pull request either contains a valid ## Changelog section in its body or explicitly opts out with the no-changelog label. Triggered after Build/Lint/Test completes. Deterministic pre-activation steps resolve the PR, check the no-changelog label, and validate any existing changelog section. The agent only drafts a missing section from PR title and description."
          HAS_PATCH: ${{ needs.agent.outputs.has_patch }}
        with:
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/setup_threat_detection.cjs');
            await main();
      - name: Ensure threat-detection directory and log
        if: always() && steps.detection_guard.outputs.run_detection == 'true'
        run: |
          mkdir -p /tmp/gh-aw/threat-detection
          touch /tmp/gh-aw/threat-detection/detection.log
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Install AWF binary
        run: bash "${RUNNER_TEMP}/gh-aw/actions/install_awf_binary.sh" v0.25.20
      - name: Install Claude Code CLI
        run: npm install --ignore-scripts -g @anthropic-ai/claude-code@2.1.98
      - name: Execute Claude Code CLI
        if: always() && steps.detection_guard.outputs.run_detection == 'true'
        id: detection_agentic_execution
        # Allowed tools (sorted):
        # - Bash
        # - BashOutput
        # - ExitPlanMode
        # - Glob
        # - Grep
        # - KillBash
        # - LS
        # - NotebookRead
        # - Read
        # - Task
        # - TodoWrite
        timeout-minutes: 20
        run: |
          set -o pipefail
          touch /tmp/gh-aw/agent-step-summary.md
          (umask 177 && touch /tmp/gh-aw/threat-detection/detection.log)
          # shellcheck disable=SC1003
          sudo -E awf --container-workdir "${GITHUB_WORKSPACE}" --mount "${RUNNER_TEMP}/gh-aw:${RUNNER_TEMP}/gh-aw:ro" --mount "${RUNNER_TEMP}/gh-aw:/host${RUNNER_TEMP}/gh-aw:ro" --tty --env-all --exclude-env ANTHROPIC_API_KEY --allow-domains '*.githubusercontent.com,anthropic.com,api.anthropic.com,api.github.com,api.snapcraft.io,archive.ubuntu.com,azure.archive.ubuntu.com,cdn.playwright.dev,codeload.github.com,crl.geotrust.com,crl.globalsign.com,crl.identrust.com,crl.sectigo.com,crl.thawte.com,crl.usertrust.com,crl.verisign.com,crl3.digicert.com,crl4.digicert.com,crls.ssl.com,files.pythonhosted.org,ghcr.io,github-cloud.githubusercontent.com,github-cloud.s3.amazonaws.com,github.com,host.docker.internal,json-schema.org,json.schemastore.org,keyserver.ubuntu.com,lfs.github.com,objects.githubusercontent.com,ocsp.digicert.com,ocsp.geotrust.com,ocsp.globalsign.com,ocsp.identrust.com,ocsp.sectigo.com,ocsp.ssl.com,ocsp.thawte.com,ocsp.usertrust.com,ocsp.verisign.com,packagecloud.io,packages.cloud.google.com,packages.microsoft.com,playwright.download.prss.microsoft.com,ppa.launchpad.net,pypi.org,raw.githubusercontent.com,registry.npmjs.org,s.symcb.com,s.symcd.com,security.ubuntu.com,sentry.io,statsig.anthropic.com,ts-crl.ws.symantec.com,ts-ocsp.ws.symantec.com' --log-level info --proxy-logs-dir /tmp/gh-aw/sandbox/firewall/logs --audit-dir /tmp/gh-aw/sandbox/firewall/audit --enable-host-access --image-tag 0.25.20 --skip-pull --enable-api-proxy --anthropic-api-target elastic.litellm-prod.ai \
            -- /bin/bash -c 'export PATH="$(find /opt/hostedtoolcache -maxdepth 4 -type d -name bin 2>/dev/null | tr '\''\n'\'' '\'':'\'')$PATH"; [ -n "$GOROOT" ] && export PATH="$GOROOT/bin:$PATH" || true && claude --print --no-chrome --allowed-tools Bash,BashOutput,ExitPlanMode,Glob,Grep,KillBash,LS,NotebookRead,Read,Task,TodoWrite --debug-file /tmp/gh-aw/threat-detection/detection.log --verbose --permission-mode bypassPermissions --output-format stream-json "$(cat /tmp/gh-aw/aw-prompts/prompt.txt)"' 2>&1 | tee -a /tmp/gh-aw/threat-detection/detection.log
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_LITELLM_PROXY_API_KEY }}
          ANTHROPIC_BASE_URL: https://elastic.litellm-prod.ai
          ANTHROPIC_MODEL: llm-gateway/gpt-5.4
          BASH_DEFAULT_TIMEOUT_MS: 60000
          BASH_MAX_TIMEOUT_MS: 60000
          DISABLE_BUG_COMMAND: 1
          DISABLE_ERROR_REPORTING: 1
          DISABLE_TELEMETRY: 1
          GH_AW_PHASE: detection
          GH_AW_PROMPT: /tmp/gh-aw/aw-prompts/prompt.txt
          GH_AW_VERSION: v0.68.3
          GITHUB_AW: true
          GITHUB_STEP_SUMMARY: /tmp/gh-aw/agent-step-summary.md
          GITHUB_WORKSPACE: ${{ github.workspace }}
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          MCP_TIMEOUT: 120000
          MCP_TOOL_TIMEOUT: 60000
      - name: Upload threat detection log
        if: always() && steps.detection_guard.outputs.run_detection == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: detection
          path: /tmp/gh-aw/threat-detection/detection.log
          if-no-files-found: ignore
      - name: Parse and conclude threat detection
        id: detection_conclusion
        if: always()
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        env:
          RUN_DETECTION: ${{ steps.detection_guard.outputs.run_detection }}
          GH_AW_DETECTION_CONTINUE_ON_ERROR: "true"
        with:
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/parse_threat_detection_results.cjs');
            await main();

  pre_activation:
    runs-on: ubuntu-slim
    outputs:
      activated: ${{ steps.check_membership.outputs.is_team_member == 'true' }}
      changelog_present: ${{ steps.validate_changelog.outputs.changelog_present }}
      changelog_valid: ${{ steps.validate_changelog.outputs.changelog_valid }}
      check_pr_event_result: ${{ steps.check_pr_event.outcome }}
      has_no_changelog_label: ${{ steps.resolve_pr.outputs.has_no_changelog_label }}
      is_pr_event: ${{ steps.check_pr_event.outputs.is_pr_event }}
      matched_command: ''
      pr_body: ${{ steps.resolve_pr.outputs.pr_body }}
      pr_number: ${{ steps.resolve_pr.outputs.pr_number }}
      pr_title: ${{ steps.resolve_pr.outputs.pr_title }}
      pr_url: ${{ steps.resolve_pr.outputs.pr_url }}
      resolve_pr_result: ${{ steps.resolve_pr.outcome }}
      setup-trace-id: ${{ steps.setup.outputs.trace-id }}
      validate_changelog_result: ${{ steps.validate_changelog.outcome }}
    steps:
      - name: Setup Scripts
        id: setup
        uses: github/gh-aw-actions/setup@ba90f2186d7ad780ec640f364005fa24e797b360 # v0.68.3
        with:
          destination: ${{ runner.temp }}/gh-aw/actions
          job-name: ${{ github.job }}
      - name: Check team membership for workflow
        id: check_membership
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        env:
          GH_AW_REQUIRED_ROLES: "admin,maintainer,write"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/check_membership.cjs');
            await main();
      - name: Check for pull-request event
        id: check_pr_event
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const eventName = context.payload.workflow_run?.event;
            const isPR = eventName === 'pull_request';
            core.info(`Triggering workflow_run event: ${eventName}`);
            core.setOutput('is_pr_event', isPR ? 'true' : 'false');
            if (!isPR) {
              core.info(`Skipping: workflow_run was triggered by event '${eventName}', not 'pull_request'`);
            }
      - name: Resolve pull request
        id: resolve_pr
        if: steps.check_pr_event.outputs.is_pr_event == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const workflowRun = context.payload.workflow_run;
            const headSha = workflowRun?.head_sha;
            const headBranch = workflowRun?.head_branch;

            if (!headSha) {
              core.setFailed('PR_CHANGELOG_GATING: No head_sha in workflow_run payload — cannot resolve PR');
              return;
            }

            if (!headBranch) {
              core.setFailed('PR_CHANGELOG_GATING: Could not determine head branch from workflow_run event');
              return;
            }

            const headRepoFullName = workflowRun.head_repository?.full_name;
            const baseRepoFullName = `${context.repo.owner}/${context.repo.repo}`;
            if (headRepoFullName !== baseRepoFullName) {
              core.info(`Skipping: workflow_run is for a fork PR (${headRepoFullName})`);
              core.setOutput('is_pr_event', 'false');
              return;
            }

            core.info(`Resolving PR for head_sha=${headSha} head_branch=${headBranch}`);

            // List open PRs from the triggering head branch
            const { data: matchingPRs } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${headBranch}`,
              per_page: 10,
            });

            const candidatePRs = matchingPRs.filter((pr) => pr.head.sha === headSha);

            if (candidatePRs.length === 0) {
              core.setFailed(
                `PR_CHANGELOG_GATING: No open pull request found for head_sha=${headSha} head_branch=${headBranch}`
              );
              return;
            }

            if (candidatePRs.length > 1) {
              const numbers = candidatePRs.map((pr) => `#${pr.number}`).join(', ');
              core.setFailed(
                `PR_CHANGELOG_GATING: Multiple open pull requests found for head_sha=${headSha}: ${numbers} — cannot resolve deterministically`
              );
              return;
            }

            const pr = candidatePRs[0];
            core.info(`Resolved PR #${pr.number}: ${pr.title}`);

            const labelNames = (pr.labels ?? []).map((l) => l.name);
            const hasNoChangelog = labelNames.includes('no-changelog');
            core.info(`PR labels: ${labelNames.join(', ') || '(none)'}`);
            core.info(`no-changelog label present: ${hasNoChangelog}`);

            const prBody = pr.body ?? '';
            const prBodyPath = '/tmp/pr-body.txt';
            fs.mkdirSync('/tmp', { recursive: true });
            fs.writeFileSync(prBodyPath, prBody, 'utf8');
            core.info(`PR body written to ${prBodyPath} (${prBody.length} bytes)`);

            core.setOutput('pr_number', String(pr.number));
            core.setOutput('pr_title', pr.title);
            core.setOutput('pr_body', prBody);
            core.setOutput('pr_body_path', prBodyPath);
            core.setOutput('pr_url', pr.html_url);
            core.setOutput('has_no_changelog_label', hasNoChangelog ? 'true' : 'false');
      - name: Validate or skip changelog section
        id: validate_changelog
        if: steps.check_pr_event.outputs.is_pr_event == 'true' && steps.resolve_pr.outputs.has_no_changelog_label != 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          PR_BODY: ${{ steps.resolve_pr.outputs.pr_body }}
          PR_NUMBER: ${{ steps.resolve_pr.outputs.pr_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            /**
             * Helpers to parse and validate the PR-body `## Changelog` contract.
             *
             * Contract:
             *   ## Changelog
             *   Customer impact: <none|fix|enhancement|breaking>
             *   Summary: <text>          (required when Customer impact is not "none")
             *
             *   ### Breaking changes
             *   <free-form markdown>     (optional subsection)
             */

            const VALID_CUSTOMER_IMPACTS = new Set(['none', 'fix', 'enhancement', 'breaking']);

            /**
             * Extract the raw text of the `## Changelog` section from a PR body.
             * Returns the content between `## Changelog` and the next `##`-level heading
             * (or the end of the string).
             *
             * @param {string} body
             * @returns {string|null}
             */
            function extractChangelogSection(body) {
              if (!body) return null;

              const lines = body.split('\n');
              let inChangelog = false;
              /** @type {null | '`' | '~'} */
              let fenceType = null;
              const content = [];

              for (const line of lines) {
                if (/^##\s+Changelog/.test(line)) {
                  inChangelog = true;
                  continue;
                }
                if (inChangelog) {
                  if (fenceType === null && /^```/.test(line)) {
                    fenceType = '`';
                  } else if (fenceType === null && /^~~~/.test(line)) {
                    fenceType = '~';
                  } else if (fenceType === '`' && /^```/.test(line)) {
                    fenceType = null;
                  } else if (fenceType === '~' && /^~~~/.test(line)) {
                    fenceType = null;
                  }
                  if (fenceType === null && /^##\s/.test(line)) {
                    break;
                  }
                  content.push(line);
                }
              }

              if (!inChangelog) return null;

              return content.join('\n');
            }

            /**
             * Extract the raw markdown content of the `### Breaking changes` subsection
             * from a PR body string. Returns everything from the heading line (exclusive)
             * up to the next `##` or `###` heading, or the end of the string.
             *
             * @param {string} body
             * @returns {string|null} Trimmed markdown content, or null if not present or empty.
             */
            function extractBreakingChanges(changelogSection) {
              if (!changelogSection) return null;

              const lines = changelogSection.split('\n');
              let inBreaking = false;
              /** @type {null | '`' | '~'} */
              let fenceType = null;
              const content = [];

              for (const line of lines) {
                if (/^###\s+Breaking changes/.test(line)) {
                  inBreaking = true;
                  continue;
                }
                if (inBreaking) {
                  if (fenceType === null && /^```/.test(line)) {
                    fenceType = '`';
                  } else if (fenceType === null && /^~~~/.test(line)) {
                    fenceType = '~';
                  } else if (fenceType === '`' && /^```/.test(line)) {
                    fenceType = null;
                  } else if (fenceType === '~' && /^~~~/.test(line)) {
                    fenceType = null;
                  }
                  if (fenceType === null && /^#{2,3}\s/.test(line)) {
                    break;
                  }
                  content.push(line);
                }
              }

              if (!inBreaking) return null;

              const trimmed = content.join('\n').trimEnd();
              return trimmed.length > 0 ? trimmed : null;
            }

            /**
             * Parse the `## Changelog` section from a PR body string.
             *
             * @param {string} body - Full PR body text.
             * @returns {{ customerImpact: string|null, summary: string|null, breakingChanges: string|null }|null}
             *   Returns null when no `## Changelog` section is found.
             */
            function parseChangelogSection(body) {
              const section = extractChangelogSection(body);
              if (section === null) return null;

              // Parse `Customer impact: <value>`
              const customerImpactMatch = section.match(/^Customer impact:\s*(.+)$/m);
              const customerImpact = customerImpactMatch ? customerImpactMatch[1].trim() : null;

              // Parse `Summary: <text>`
              const summaryMatch = section.match(/^Summary:\s*(.+)$/m);
              const summary = summaryMatch ? summaryMatch[1].trim() : null;

              // Extract breaking changes from the changelog section only
              const breakingChanges = extractBreakingChanges(section);

              return {
                customerImpact,
                summary: summary || null,
                breakingChanges,
              };
            }

            /**
             * Validate a parsed changelog section.
             *
             * @param {{ customerImpact: string|null, summary: string|null, breakingChanges: string|null }|null} parsed
             * @returns {{ valid: boolean, errors: string[] }}
             */
            function validateChangelogSection(parsed) {
              const errors = [];

              if (parsed === null) {
                errors.push('No ## Changelog section found in PR body');
                return { valid: false, errors };
              }

              const { customerImpact, summary } = parsed;

              // Validate Customer impact
              if (!customerImpact) {
                errors.push('Missing required field: Customer impact');
              } else if (!VALID_CUSTOMER_IMPACTS.has(customerImpact)) {
                errors.push(
                  `Invalid Customer impact value: "${customerImpact}". Must be one of: ${[...VALID_CUSTOMER_IMPACTS].join(', ')}`
                );
              }

              // Summary is required unless Customer impact is "none"
              if (customerImpact && customerImpact !== 'none' && VALID_CUSTOMER_IMPACTS.has(customerImpact)) {
                if (!summary) {
                  errors.push('Missing required field: Summary (required when Customer impact is not "none")');
                }
              }

              return {
                valid: errors.length === 0,
                errors,
              };
            }

            /**
             * Internal variant that also detects whether a `### Breaking changes` heading
             * was present but had no content.
             *
             * @param {string} body
             * @returns {{ customerImpact: string|null, summary: string|null, breakingChanges: string|null, breakingChangesHeadingPresent: boolean }|null}
             */
            function parseChangelogSectionFull(body) {
              const section = extractChangelogSection(body);
              if (section === null) return null;

              const customerImpactMatch = section.match(/^Customer impact:\s*(.+)$/m);
              const customerImpact = customerImpactMatch ? customerImpactMatch[1].trim() : null;

              const summaryMatch = section.match(/^Summary:\s*(.+)$/m);
              const summary = summaryMatch ? summaryMatch[1].trim() : null;

              // Detect whether the heading exists within the changelog section (not the full body)
              const lines = section.split('\n');
              const breakingChangesHeadingPresent = lines.some((line) => /^###\s+Breaking changes/.test(line));
              const breakingChanges = extractBreakingChanges(section);

              return {
                customerImpact,
                summary: summary || null,
                breakingChanges,
                breakingChangesHeadingPresent,
              };
            }

            /**
             * Validate a full parsed changelog section (including empty breaking-changes detection).
             *
             * @param {ReturnType<typeof parseChangelogSectionFull>|null} parsed
             * @returns {{ valid: boolean, errors: string[] }}
             */
            function validateChangelogSectionFull(parsed) {
              const base = validateChangelogSection(parsed);
              if (!parsed) return base;

              const errors = [...base.errors];

              if (parsed.breakingChangesHeadingPresent && parsed.breakingChanges === null) {
                errors.push('### Breaking changes section is present but contains no content');
              }

              if (parsed.customerImpact === 'breaking' && !parsed.breakingChangesHeadingPresent) {
                errors.push('Customer impact: breaking requires a ### Breaking changes subsection');
              }

              return { valid: errors.length === 0, errors };
            }

            if (typeof module !== 'undefined') {
              module.exports = {
                VALID_CUSTOMER_IMPACTS,
                extractBreakingChanges,
                extractChangelogSection,
                parseChangelogSection,
                parseChangelogSectionFull,
                validateChangelogSection,
                validateChangelogSectionFull,
              };
            }

            const fs = require('fs');

            const prNumber = process.env.PR_NUMBER || '';
            const prBodyPath = '/tmp/pr-body.txt';
            let prBody;
            if (fs.existsSync(prBodyPath)) {
              prBody = fs.readFileSync(prBodyPath, 'utf8');
              core.info(`PR body read from ${prBodyPath} (${prBody.length} bytes)`);
            } else {
              prBody = process.env.PR_BODY || '';
              core.info(`PR body read from PR_BODY env var (${prBody.length} bytes)`);
            }

            core.info(`Validating changelog section for PR #${prNumber}`);

            const parsed = parseChangelogSectionFull(prBody);

            if (parsed === null) {
              // No ## Changelog section found — agent will draft it
              core.info('No ## Changelog section found — agent will draft one');
              core.setOutput('changelog_present', 'false');
              core.setOutput('changelog_valid', 'false');
            } else {
              // Section exists — validate it
              const validation = validateChangelogSectionFull(parsed);

              if (validation.valid) {
                core.info(`## Changelog section is valid (Customer impact: ${parsed.customerImpact})`);
                core.setOutput('changelog_present', 'true');
                core.setOutput('changelog_valid', 'true');
              } else {
                const errorList = validation.errors.map((e) => `  - ${e}`).join('\n');
                core.setOutput('changelog_valid', 'false');
                core.setFailed(
                  `## Changelog section is malformed in PR #${prNumber}:\n${errorList}\n\nFix the ## Changelog section in the PR body and re-push to re-run this check.`
                );
              }
            }

  safe_outputs:
    needs:
      - activation
      - agent
      - detection
    if: (!cancelled()) && needs.agent.result != 'skipped' && needs.detection.result == 'success'
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 15
    env:
      GH_AW_CALLER_WORKFLOW_ID: "${{ github.repository }}/pr-changelog-authoring"
      GH_AW_DETECTION_CONCLUSION: ${{ needs.detection.outputs.detection_conclusion }}
      GH_AW_DETECTION_REASON: ${{ needs.detection.outputs.detection_reason }}
      GH_AW_EFFECTIVE_TOKENS: ${{ needs.agent.outputs.effective_tokens }}
      GH_AW_ENGINE_ID: "claude"
      GH_AW_ENGINE_MODEL: "llm-gateway/gpt-5.4"
      GH_AW_WORKFLOW_ID: "pr-changelog-authoring"
      GH_AW_WORKFLOW_NAME: "PR Changelog Authoring"
    outputs:
      code_push_failure_count: ${{ steps.process_safe_outputs.outputs.code_push_failure_count }}
      code_push_failure_errors: ${{ steps.process_safe_outputs.outputs.code_push_failure_errors }}
      create_discussion_error_count: ${{ steps.process_safe_outputs.outputs.create_discussion_error_count }}
      create_discussion_errors: ${{ steps.process_safe_outputs.outputs.create_discussion_errors }}
      process_safe_outputs_processed_count: ${{ steps.process_safe_outputs.outputs.processed_count }}
      process_safe_outputs_temporary_id_map: ${{ steps.process_safe_outputs.outputs.temporary_id_map }}
    steps:
      - name: Setup Scripts
        id: setup
        uses: github/gh-aw-actions/setup@ba90f2186d7ad780ec640f364005fa24e797b360 # v0.68.3
        with:
          destination: ${{ runner.temp }}/gh-aw/actions
          job-name: ${{ github.job }}
          trace-id: ${{ needs.activation.outputs.setup-trace-id }}
      - name: Download agent output artifact
        id: download-agent-output
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: agent
          path: /tmp/gh-aw/
      - name: Setup agent output environment variable
        id: setup-agent-output-env
        if: steps.download-agent-output.outcome == 'success'
        run: |
          mkdir -p /tmp/gh-aw/
          find "/tmp/gh-aw/" -type f -print
          echo "GH_AW_AGENT_OUTPUT=/tmp/gh-aw/agent_output.json" >> "$GITHUB_OUTPUT"
      - name: Configure GH_HOST for enterprise compatibility
        id: ghes-host-config
        shell: bash
        run: |
          # Derive GH_HOST from GITHUB_SERVER_URL so the gh CLI targets the correct
          # GitHub instance (GHES/GHEC). On github.com this is a harmless no-op.
          GH_HOST="${GITHUB_SERVER_URL#https://}"
          GH_HOST="${GH_HOST#http://}"
          echo "GH_HOST=${GH_HOST}" >> "$GITHUB_ENV"
      - name: Process Safe Outputs
        id: process_safe_outputs
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        env:
          GH_AW_AGENT_OUTPUT: ${{ steps.setup-agent-output-env.outputs.GH_AW_AGENT_OUTPUT }}
          GH_AW_ALLOWED_DOMAINS: "*.githubusercontent.com,anthropic.com,api.anthropic.com,api.github.com,api.npms.io,api.snapcraft.io,archive.ubuntu.com,azure.archive.ubuntu.com,bun.sh,cdn.jsdelivr.net,cdn.playwright.dev,codeload.github.com,crl.geotrust.com,crl.globalsign.com,crl.identrust.com,crl.sectigo.com,crl.thawte.com,crl.usertrust.com,crl.verisign.com,crl3.digicert.com,crl4.digicert.com,crls.ssl.com,deb.nodesource.com,deno.land,elastic.litellm-prod.ai,esm.sh,files.pythonhosted.org,get.pnpm.io,ghcr.io,github-cloud.githubusercontent.com,github-cloud.s3.amazonaws.com,github.com,googleapis.deno.dev,googlechromelabs.github.io,host.docker.internal,json-schema.org,json.schemastore.org,jsr.io,keyserver.ubuntu.com,lfs.github.com,nodejs.org,npm.pkg.github.com,npmjs.com,npmjs.org,objects.githubusercontent.com,ocsp.digicert.com,ocsp.geotrust.com,ocsp.globalsign.com,ocsp.identrust.com,ocsp.sectigo.com,ocsp.ssl.com,ocsp.thawte.com,ocsp.usertrust.com,ocsp.verisign.com,packagecloud.io,packages.cloud.google.com,packages.microsoft.com,playwright.download.prss.microsoft.com,ppa.launchpad.net,pypi.org,raw.githubusercontent.com,registry.bower.io,registry.npmjs.com,registry.npmjs.org,registry.yarnpkg.com,repo.yarnpkg.com,s.symcb.com,s.symcd.com,security.ubuntu.com,sentry.io,skimdb.npmjs.com,statsig.anthropic.com,storage.googleapis.com,telemetry.vercel.com,ts-crl.ws.symantec.com,ts-ocsp.ws.symantec.com,www.googleapis.com,www.npmjs.com,www.npmjs.org,yarnpkg.com"
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_API_URL: ${{ github.api_url }}
          GH_AW_SAFE_OUTPUTS_HANDLER_CONFIG: "{\"create_report_incomplete_issue\":{},\"missing_data\":{},\"missing_tool\":{},\"noop\":{\"max\":1,\"report-as-issue\":\"false\"},\"report_incomplete\":{},\"update_pull_request\":{\"allow_body\":true,\"allow_title\":true,\"max\":1}}"
        with:
          github-token: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/safe_output_handler_manager.cjs');
            await main();
      - name: Upload Safe Outputs Items
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: safe-outputs-items
          path: |
            /tmp/gh-aw/safe-output-items.jsonl
            /tmp/gh-aw/temporary-id-map.json
          if-no-files-found: ignore

