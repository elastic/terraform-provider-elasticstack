---
name: Workflows CI
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  classify:
    name: Change Classification
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      workflow_changes: ${{ steps.classify.outputs.workflow_changes }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - id: classify
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const classify = require('${{ github.workspace }}/.github/scripts/workflows/workflows/classify-changes.js');
            await classify({ github, context, core });

  test:
    name: Test
    needs: classify
    if: needs.classify.outputs.workflow_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Get dependencies
        run: make vendor
      - name: Workflow tests
        run: make workflow-test
      - name: Hook tests
        run: make hook-test

  gate:
    name: Workflows Gate
    needs: [classify, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - id: gate
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          GATE_NAME: workflows
          WORKFLOWS_GATE_CLASSIFY_RESULT: ${{ needs.classify.outputs.workflow_changes }}
          WORKFLOWS_GATE_TEST_RESULT: ${{ needs.test.result }}
        with:
          script: |
            const gate = require('${{ github.workspace }}/.github/scripts/workflows/lib/runners/gate.js');
            await gate({ github, context, core });
