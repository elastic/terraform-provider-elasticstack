---
# This file is generated by `scripts/compile-workflow-sources/main.go` from `.github/workflows-src/workflows/workflow.yml.tmpl`. Do not edit directly.
name: Workflows CI
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  classify:
    name: Change Classification
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      workflow_changes: ${{ steps.classify.outputs.workflow_changes }}
    steps:
      - id: classify
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            let changedFiles = [];
            
            if (context.eventName === 'pull_request') {
              try {
                const files = await github.paginate(github.rest.pulls.listFiles, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.payload.pull_request.number,
                  per_page: 100,
                });
                changedFiles = files.map((f) => f.filename);
              } catch (err) {
                core.warning(`Failed to list PR files: ${err.message}; defaulting to workflow_changes=true.`);
                core.setOutput('workflow_changes', 'true');
                return;
              }
            } else if (context.eventName === 'push') {
              core.setOutput('workflow_changes', 'true');
              core.info('Push event: unconditionally running workflows CI.');
              return;
            } else {
              // workflow_dispatch or other events: conservative default
              core.setOutput('workflow_changes', 'true');
              core.info(`${context.eventName}: defaulting to workflow_changes=true.`);
              return;
            }
            
            const workflowChanges = changedFiles.length === 0 || changedFiles.some((f) => f.startsWith('.github/'));
            core.setOutput('workflow_changes', workflowChanges ? 'true' : 'false');
            
  test:
    name: Test
    needs: classify
    if: needs.classify.outputs.workflow_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Get dependencies
        run: make vendor
      - name: Workflow tests
        run: make workflow-test
      - name: Hook tests
        run: make hook-test

  gate:
    name: Gate
    needs: [classify, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - id: gate
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            /**
             * Evaluate whether the workflows workflow gate passed or failed.
             *
             * @param {{ classifyResult: string, testResult: string }} params
             * @returns {{ passed: boolean, reason: string }}
             */
            function gateWorkflows({ classifyResult, testResult }) {
              if (classifyResult !== 'true' && classifyResult !== 'false') {
                return {
                  passed: false,
                  reason: `Invalid classify result '${classifyResult}'. Expected 'true' or 'false'.`,
                };
              }
            
              const validResults = ['success', 'skipped', 'failure', 'cancelled'];
              if (!validResults.includes(testResult)) {
                return {
                  passed: false,
                  reason: `Invalid test result '${testResult}'. Expected one of: success, skipped, failure, cancelled.`,
                };
              }
            
              if (classifyResult === 'false' && testResult === 'skipped') {
                return {
                  passed: true,
                  reason: 'No workflow changes detected; test legitimately skipped. Gate passed.',
                };
              }
            
              if (testResult === 'success') {
                return {
                  passed: true,
                  reason: 'Workflow tests succeeded. Gate passed.',
                };
              }
            
              if (classifyResult === 'true' && testResult === 'skipped') {
                return {
                  passed: false,
                  reason: 'Unexpected skip: workflow changes detected but test was skipped. Gate failed.',
                };
              }
            
              if (testResult === 'failure' || testResult === 'cancelled') {
                return {
                  passed: false,
                  reason: `Workflow test ${testResult}. Gate failed.`,
                };
              }
            
              // Fallback for any other unexpected combination
              return {
                passed: false,
                reason: `Unexpected result combination (classify=${classifyResult}, test=${testResult}). Gate failed.`,
              };
            }
            
            if (typeof module !== 'undefined') {
              module.exports = { gateWorkflows };
            }
            
            const classifyResult = '${{ needs.classify.outputs.workflow_changes }}';
            const testResult = '${{ needs.test.result }}';
            
            const result = gateWorkflows({ classifyResult, testResult });
            
            if (result.passed) {
              core.info(result.reason);
            } else {
              core.setFailed(result.reason);
            }
            