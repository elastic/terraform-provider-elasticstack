---
name: Workflows CI
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  classify:
    name: Change Classification
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      workflow_changes: ${{ steps.classify.outputs.workflow_changes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - id: classify
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const classify = require('${{ github.workspace }}/.github/scripts/workflows/workflows/classify-changes.js');
            await classify({ github, context, core });

  test:
    name: Test
    needs: classify
    if: needs.classify.outputs.workflow_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Get dependencies
        run: make vendor
      - name: Workflow tests
        run: make workflow-test
      - name: Hook tests
        run: make hook-test

  gate:
    name: Workflows Gate
    needs: [classify, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - id: gate
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          GATE_NAME: workflows
          WORKFLOWS_GATE_CLASSIFY_RESULT: ${{ needs.classify.outputs.workflow_changes }}
          WORKFLOWS_GATE_TEST_RESULT: ${{ needs.test.result }}
        with:
          script: |
            const gate = require('${{ github.workspace }}/.github/scripts/workflows/lib/runners/gate.js');
            await gate({ github, context, core });
