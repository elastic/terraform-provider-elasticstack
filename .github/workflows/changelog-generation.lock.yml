  pre_activation:
    runs-on: ubuntu-slim
    outputs:
      activated: ${{ steps.check_membership.outputs.is_team_member == 'true' }}
      compare_range: ${{ steps.resolve_release_context.outputs.compare_range }}
      gather_pr_evidence_result: ${{ steps.gather_pr_evidence.outcome }}
      has_evidence: ${{ steps.gather_pr_evidence.outputs.has_evidence }}
      matched_command: ''
      mode: ${{ steps.resolve_release_context.outputs.mode }}
      previous_tag: ${{ steps.resolve_release_context.outputs.previous_tag }}
      resolve_release_context_result: ${{ steps.resolve_release_context.outcome }}
      setup-trace-id: ${{ steps.setup.outputs.trace-id }}
      target_branch: ${{ steps.resolve_release_context.outputs.target_branch }}
      target_version: ${{ steps.resolve_release_context.outputs.target_version }}
    steps:
      - name: Setup Scripts
        id: setup
        uses: github/gh-aw-actions/setup@ba90f2186d7ad780ec640f364005fa24e797b360 # v0.68.3
        with:
          destination: ${{ runner.temp }}/gh-aw/actions
          job-name: ${{ github.job }}
      - name: Check team membership for workflow
        id: check_membership
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        env:
          GH_AW_REQUIRED_ROLES: "admin,maintainer,write"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/check_membership.cjs');
            await main();
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Resolve release context
        id: resolve_release_context
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            const RELEASE_BRANCH_PATTERN = /^prep-release-(.+)$/;
            const SEMVER_TAG_PATTERN = /^v\d+\.\d+\.\d+$/;

            function resolveReleaseMode({ eventName, headBranch = '' }) {
              let mode = 'unreleased';
              let targetVersion = '';
              let targetBranch = 'generated-changelog';

              if (eventName === 'pull_request' || eventName === 'pull_request_target') {
                const match = headBranch.match(RELEASE_BRANCH_PATTERN);
                if (match) {
                  mode = 'release';
                  targetVersion = match[1];
                  targetBranch = headBranch;
                }
              }

              return { mode, targetVersion, targetBranch };
            }

            function parseSemverTags(tagsRaw = '') {
              return tagsRaw
                .split('\n')
                .map((tag) => tag.trim())
                .filter((tag) => SEMVER_TAG_PATTERN.test(tag));
            }

            function selectPreviousTag({ tags = [], mode = 'unreleased', targetVersion = '' }) {
              const excludedTag = mode === 'release' && targetVersion ? `v${targetVersion}` : '';
              const candidates = excludedTag ? tags.filter((tag) => tag !== excludedTag) : tags;

              return {
                previousTag: candidates[0] ?? '',
                excludedTag,
                excludedCurrentTag: Boolean(excludedTag) && candidates.length < tags.length,
              };
            }

            function buildCompareRange(previousTag) {
              return previousTag ? `${previousTag}..HEAD` : 'HEAD';
            }

            function buildReleaseContext({ eventName, headBranch = '', tags = [] }) {
              const modeResult = resolveReleaseMode({ eventName, headBranch });
              const previousTagResult = selectPreviousTag({
                tags,
                mode: modeResult.mode,
                targetVersion: modeResult.targetVersion,
              });

              return {
                ...modeResult,
                ...previousTagResult,
                compareRange: buildCompareRange(previousTagResult.previousTag),
              };
            }

            if (typeof module !== 'undefined') {
              module.exports = {
                RELEASE_BRANCH_PATTERN,
                SEMVER_TAG_PATTERN,
                buildCompareRange,
                buildReleaseContext,
                parseSemverTags,
                resolveReleaseMode,
                selectPreviousTag,
              };
            }

            // Determine mode from event
            const eventName = context.eventName;
            const headBranch =
              context.payload.pull_request?.head?.ref ??
              context.payload.ref?.replace('refs/heads/', '') ??
              process.env.GITHUB_HEAD_REF ??
              process.env.GITHUB_REF_NAME ??
              '';

            let tags = [];
            try {
              // List all tags matching vX.Y.Z semver pattern, sort by version, pick the latest
              const tagsRaw = execSync(
                'git tag --list "v[0-9]*.[0-9]*.[0-9]*" --sort=-version:refname',
                { encoding: 'utf8', stdio: ['pipe', 'pipe', 'pipe'] }
              ).trim();

              tags = parseSemverTags(tagsRaw);
            } catch (err) {
              core.warning(`Failed to list git tags: ${err.message}`);
            }

            const releaseContext = buildReleaseContext({ eventName, headBranch, tags });

            if (releaseContext.mode === 'release') {
              core.info(`Release mode: branch=${headBranch}, version=${releaseContext.targetVersion}`);
            }
            if (releaseContext.excludedCurrentTag) {
              core.info(
                `Excluded current release tag ${releaseContext.excludedTag} from previous tag candidates`
              );
            }
            if (releaseContext.previousTag) {
              core.info(`Resolved previous tag: ${releaseContext.previousTag}`);
            } else if (tags.length === 0) {
              core.warning('No semver release tags found; compare range will cover full history');
            }

            core.setOutput('mode', releaseContext.mode);
            core.setOutput('target_version', releaseContext.targetVersion);
            core.setOutput('previous_tag', releaseContext.previousTag);
            core.setOutput('compare_range', releaseContext.compareRange);
            core.setOutput('target_branch', releaseContext.targetBranch);

            core.info(`Mode: ${releaseContext.mode}`);
            core.info(`Compare range: ${releaseContext.compareRange}`);
            core.info(`Target branch: ${releaseContext.targetBranch}`);
      - name: Gather PR evidence
        id: gather_pr_evidence
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          COMPARE_RANGE: ${{ steps.resolve_release_context.outputs.compare_range }}
          MODE: ${{ steps.resolve_release_context.outputs.mode }}
          PREVIOUS_TAG: ${{ steps.resolve_release_context.outputs.previous_tag }}
          TARGET_VERSION: ${{ steps.resolve_release_context.outputs.target_version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const USER_FACING_LABELS = new Set([
              'enhancement',
              'bug',
              'feature',
              'breaking-change',
              'deprecation',
              'new-resource',
              'new-data-source',
            ]);

            const INTERNAL_LABELS = new Set([
              'dependencies',
              'chore',
              'internal',
              'documentation',
              'ci',
              'test',
              'openspec',
            ]);

            const PROVIDER_PATH_PREFIXES = ['internal/', 'pkg/', 'libs/', 'provider/', 'go.mod', 'go.sum'];

            function getLabelNames(pr) {
              return (pr.labels ?? []).map((label) => label.name);
            }

            function classifyPullRequestForChangelog(pr, files = []) {
              const labels = getLabelNames(pr);
              const hasUserFacingLabel = labels.some((label) => USER_FACING_LABELS.has(label));
              const hasInternalLabel = labels.some((label) => INTERNAL_LABELS.has(label));
              const isAutomated =
                pr.user?.login === 'dependabot[bot]' ||
                pr.user?.login === 'dependabot' ||
                pr.user?.login === 'github-actions[bot]';

              const touchesProviderCode = files.some((file) =>
                PROVIDER_PATH_PREFIXES.some((prefix) => file.filename.startsWith(prefix))
              );
              const openspecOnly = files.length > 0 && files.every((file) => file.filename.startsWith('openspec/'));

              let classification;
              let inclusionRationale;
              let exclusionRationale;

              if (isAutomated) {
                classification = 'internal';
                exclusionRationale = `Automated PR by ${pr.user?.login}`;
              } else if (openspecOnly) {
                classification = 'internal';
                exclusionRationale = 'Touches only openspec/ files — no provider code changes';
              } else if (hasUserFacingLabel) {
                classification = 'user-facing';
                inclusionRationale = `Has user-facing label(s): ${labels
                  .filter((label) => USER_FACING_LABELS.has(label))
                  .join(', ')}`;
              } else if (hasInternalLabel && !touchesProviderCode) {
                classification = 'internal';
                exclusionRationale = `Has internal label(s): ${labels
                  .filter((label) => INTERNAL_LABELS.has(label))
                  .join(', ')} and does not touch provider code`;
              } else if (touchesProviderCode) {
                classification = 'user-facing';
                inclusionRationale = 'Touches provider implementation paths — presumed user-facing';
              } else {
                classification = 'uncertain';
                inclusionRationale = 'Classification uncertain — agent to decide';
              }

              return {
                classification,
                inclusionRationale: inclusionRationale ?? null,
                exclusionRationale: exclusionRationale ?? null,
              };
            }

            function parseCommitShas(raw = '') {
              return raw
                .split('\n')
                .map((sha) => sha.trim())
                .filter(Boolean);
            }

            function selectMergedPullRequests(prs = []) {
              const seen = new Set();
              const merged = [];

              for (const pr of prs) {
                if (pr.state === 'closed' && pr.merged_at && !seen.has(pr.number)) {
                  seen.add(pr.number);
                  merged.push(pr);
                }
              }

              return merged;
            }

            function buildPullRequestEvidence(pr, files = []) {
              const { classification, inclusionRationale, exclusionRationale } =
                classifyPullRequestForChangelog(pr, files);

              return {
                number: pr.number,
                title: pr.title,
                url: pr.html_url,
                merge_commit_sha: pr.merge_commit_sha,
                author: pr.user?.login ?? 'unknown',
                labels: getLabelNames(pr),
                touched_files: files.map((file) => file.filename),
                classification,
                inclusion_rationale: inclusionRationale,
                exclusion_rationale: exclusionRationale,
              };
            }

            function buildTargetSection({ mode = 'unreleased', targetVersion = '', date = new Date().toISOString() }) {
              if (mode === 'release' && targetVersion) {
                return `## [${targetVersion}] - ${String(date).split('T')[0]}`;
              }

              return '## [Unreleased]';
            }

            function countByClassification(evidence = []) {
              return {
                user_facing_count: evidence.filter((item) => item.classification === 'user-facing').length,
                internal_count: evidence.filter((item) => item.classification === 'internal').length,
                uncertain_count: evidence.filter((item) => item.classification === 'uncertain').length,
              };
            }

            function buildEvidenceManifest({
              mode = 'unreleased',
              targetVersion = '',
              previousTag = '',
              compareRange = 'HEAD',
              evidence = [],
              generatedAt = new Date().toISOString(),
            }) {
              const counts = countByClassification(evidence);

              return {
                generated_at: generatedAt,
                mode,
                target_section: buildTargetSection({ mode, targetVersion, date: generatedAt }),
                target_section_mode: mode,
                target_version: targetVersion,
                previous_tag: previousTag,
                compare_range: compareRange,
                pr_count: evidence.length,
                ...counts,
                pull_requests: evidence,
              };
            }

            if (typeof module !== 'undefined') {
              module.exports = {
                INTERNAL_LABELS,
                PROVIDER_PATH_PREFIXES,
                USER_FACING_LABELS,
                buildEvidenceManifest,
                buildPullRequestEvidence,
                buildTargetSection,
                classifyPullRequestForChangelog,
                countByClassification,
                parseCommitShas,
                selectMergedPullRequests,
              };
            }

            const path = require('path');

            const DEFAULT_EVIDENCE_ARTIFACT_NAME = 'changelog-release-evidence';
            const DEFAULT_EVIDENCE_ARTIFACT_PATH = '/tmp/gh-aw/pre-activation/evidence.json';

            function buildEvidenceArtifactPlan({
              manifest,
              artifactName = DEFAULT_EVIDENCE_ARTIFACT_NAME,
              artifactPath = DEFAULT_EVIDENCE_ARTIFACT_PATH,
            }) {
              if (!manifest || typeof manifest !== 'object' || Array.isArray(manifest)) {
                throw new Error('manifest must be a non-null object');
              }

              if (!artifactName) {
                throw new Error('artifactName must be provided');
              }

              if (!artifactPath) {
                throw new Error('artifactPath must be provided');
              }

              return {
                artifactName,
                artifactPath,
                directory: path.dirname(artifactPath),
                formattedJson: JSON.stringify(manifest, null, 2),
                prCount: manifest.pr_count ?? '?',
              };
            }

            if (typeof module !== 'undefined') {
              module.exports = {
                DEFAULT_EVIDENCE_ARTIFACT_NAME,
                DEFAULT_EVIDENCE_ARTIFACT_PATH,
                buildEvidenceArtifactPlan,
              };
            }

            const previousTag = process.env.PREVIOUS_TAG || core.getInput('previous_tag') || process.env.INPUT_PREVIOUS_TAG || '';
            const compareRange = process.env.COMPARE_RANGE || core.getInput('compare_range') || process.env.INPUT_COMPARE_RANGE || 'HEAD';
            const mode = process.env.MODE || core.getInput('mode') || process.env.INPUT_MODE || 'unreleased';
            const targetVersion = process.env.TARGET_VERSION || core.getInput('target_version') || process.env.INPUT_TARGET_VERSION || '';

            const { owner, repo } = context.repo;

            // Collect commits in range
            let commitSHAs = [];
            try {
              const range = compareRange || 'HEAD';
              const raw = execSync(`git log --format=%H ${range}`, {
                encoding: 'utf8',
                stdio: ['pipe', 'pipe', 'pipe'],
              }).trim();
              commitSHAs = parseCommitShas(raw);
              core.info(`Found ${commitSHAs.length} commit(s) in range ${range}`);
            } catch (err) {
              core.warning(`Failed to list commits in range: ${err.message}`);
            }

            // Find PRs associated with these commits and dedupe merged PRs as we go.
            const mergedPullRequestsByNumber = new Map();

            for (const sha of commitSHAs) {
              try {
                const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner,
                  repo,
                  commit_sha: sha,
                });
                for (const pr of prs) {
                  if (pr.state === 'closed' && pr.merged_at && !mergedPullRequestsByNumber.has(pr.number)) {
                    mergedPullRequestsByNumber.set(pr.number, pr);
                  }
                }
              } catch (err) {
                core.warning(`Failed to list PRs for commit ${sha}: ${err.message}`);
              }
            }

            const mergedPullRequests = Array.from(mergedPullRequestsByNumber.values());
            core.info(`Found ${mergedPullRequests.length} unique merged PR(s) in compare range`);

            // Enrich each PR with file information
            const evidence = [];

            for (const pr of mergedPullRequests) {
              const prNumber = pr.number;
              let files = [];
              try {
                files = await github.paginate(github.rest.pulls.listFiles, {
                  owner,
                  repo,
                  pull_number: prNumber,
                  per_page: 100,
                });
              } catch (err) {
                core.warning(`Failed to list files for PR #${prNumber}: ${err.message}`);
              }

              evidence.push(buildPullRequestEvidence(pr, files));
            }

            const manifest = buildEvidenceManifest({
              mode,
              targetVersion,
              previousTag,
              compareRange,
              evidence,
              generatedAt: new Date().toISOString(),
            });

            const artifactPlan = buildEvidenceArtifactPlan({ manifest });
            fs.mkdirSync(artifactPlan.directory, { recursive: true });
            fs.writeFileSync(artifactPlan.artifactPath, artifactPlan.formattedJson, 'utf8');

            core.setOutput('evidence_file_path', artifactPlan.artifactPath);
            const hasEvidence = evidence.length > 0;
            core.setOutput('has_evidence', hasEvidence ? 'true' : 'false');
            core.info(`Evidence manifest written to ${artifactPlan.artifactPath} (${artifactPlan.prCount} PRs)`);
            core.info(`Evidence manifest built: ${evidence.length} PRs (${manifest.user_facing_count} user-facing, ${manifest.internal_count} internal, ${manifest.uncertain_count} uncertain)`);
      - name: Upload release evidence artifact
        if: steps.gather_pr_evidence.outputs.has_evidence == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          if-no-files-found: error
          name: changelog-release-evidence
          path: ${{ steps.gather_pr_evidence.outputs.evidence_file_path }}

  safe_outputs:
    needs:
      - activation
      - agent
      - detection
    if: (!cancelled()) && needs.agent.result != 'skipped' && needs.detection.result == 'success'
    runs-on: ubuntu-slim
    permissions:
      contents: write
      issues: write
      pull-requests: write
    timeout-minutes: 15
    env:
      GH_AW_CALLER_WORKFLOW_ID: "${{ github.repository }}/changelog-generation"
      GH_AW_DETECTION_CONCLUSION: ${{ needs.detection.outputs.detection_conclusion }}
      GH_AW_DETECTION_REASON: ${{ needs.detection.outputs.detection_reason }}
      GH_AW_EFFECTIVE_TOKENS: ${{ needs.agent.outputs.effective_tokens }}
      GH_AW_ENGINE_ID: "claude"
      GH_AW_ENGINE_MODEL: "llm-gateway/gpt-5.4"
      GH_AW_WORKFLOW_ID: "changelog-generation"
      GH_AW_WORKFLOW_NAME: "Changelog Generation"
    outputs:
      code_push_failure_count: ${{ steps.process_safe_outputs.outputs.code_push_failure_count }}
      code_push_failure_errors: ${{ steps.process_safe_outputs.outputs.code_push_failure_errors }}
      create_discussion_error_count: ${{ steps.process_safe_outputs.outputs.create_discussion_error_count }}
      create_discussion_errors: ${{ steps.process_safe_outputs.outputs.create_discussion_errors }}
      created_pr_number: ${{ steps.process_safe_outputs.outputs.created_pr_number }}
      created_pr_url: ${{ steps.process_safe_outputs.outputs.created_pr_url }}
      process_safe_outputs_processed_count: ${{ steps.process_safe_outputs.outputs.processed_count }}
      process_safe_outputs_temporary_id_map: ${{ steps.process_safe_outputs.outputs.temporary_id_map }}
      push_commit_sha: ${{ steps.process_safe_outputs.outputs.push_commit_sha }}
      push_commit_url: ${{ steps.process_safe_outputs.outputs.push_commit_url }}
    steps:
      - name: Setup Scripts
        id: setup
        uses: github/gh-aw-actions/setup@ba90f2186d7ad780ec640f364005fa24e797b360 # v0.68.3
        with:
          destination: ${{ runner.temp }}/gh-aw/actions
          job-name: ${{ github.job }}
          trace-id: ${{ needs.activation.outputs.setup-trace-id }}
      - name: Download agent output artifact
        id: download-agent-output
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: agent
          path: /tmp/gh-aw/
      - name: Setup agent output environment variable
        id: setup-agent-output-env
        if: steps.download-agent-output.outcome == 'success'
        run: |
          mkdir -p /tmp/gh-aw/
          find "/tmp/gh-aw/" -type f -print
          echo "GH_AW_AGENT_OUTPUT=/tmp/gh-aw/agent_output.json" >> "$GITHUB_OUTPUT"
      - name: Download patch artifact
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: agent
          path: /tmp/gh-aw/
      - name: Checkout repository
        if: (!cancelled()) && needs.agent.result != 'skipped' && contains(needs.agent.outputs.output_types, 'create_pull_request') || (!cancelled()) && needs.agent.result != 'skipped' && contains(needs.agent.outputs.output_types, 'push_to_pull_request_branch')
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.base_ref || github.event.pull_request.base.ref || github.ref_name || github.event.repository.default_branch }}
          token: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: false
          fetch-depth: 1
      - name: Configure Git credentials
        if: (!cancelled()) && needs.agent.result != 'skipped' && contains(needs.agent.outputs.output_types, 'create_pull_request') || (!cancelled()) && needs.agent.result != 'skipped' && contains(needs.agent.outputs.output_types, 'push_to_pull_request_branch')
        env:
          REPO_NAME: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          GIT_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global am.keepcr true
          # Re-authenticate git with GitHub token
          SERVER_URL_STRIPPED="${SERVER_URL#https://}"
          git remote set-url origin "https://x-access-token:${GIT_TOKEN}@${SERVER_URL_STRIPPED}/${REPO_NAME}.git"
          echo "Git configured with standard GitHub Actions identity"
      - name: Configure GH_HOST for enterprise compatibility
        id: ghes-host-config
        shell: bash
        run: |
          # Derive GH_HOST from GITHUB_SERVER_URL so the gh CLI targets the correct
          # GitHub instance (GHES/GHEC). On github.com this is a harmless no-op.
          GH_HOST="${GITHUB_SERVER_URL#https://}"
          GH_HOST="${GH_HOST#http://}"
          echo "GH_HOST=${GH_HOST}" >> "$GITHUB_ENV"
      - name: Process Safe Outputs
        id: process_safe_outputs
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        env:
          GH_AW_AGENT_OUTPUT: ${{ steps.setup-agent-output-env.outputs.GH_AW_AGENT_OUTPUT }}
          GH_AW_ALLOWED_DOMAINS: "*.githubusercontent.com,anthropic.com,api.anthropic.com,api.github.com,api.npms.io,api.snapcraft.io,archive.ubuntu.com,azure.archive.ubuntu.com,bun.sh,cdn.jsdelivr.net,cdn.playwright.dev,codeload.github.com,crl.geotrust.com,crl.globalsign.com,crl.identrust.com,crl.sectigo.com,crl.thawte.com,crl.usertrust.com,crl.verisign.com,crl3.digicert.com,crl4.digicert.com,crls.ssl.com,deb.nodesource.com,deno.land,elastic.litellm-prod.ai,esm.sh,files.pythonhosted.org,get.pnpm.io,ghcr.io,github-cloud.githubusercontent.com,github-cloud.s3.amazonaws.com,github.com,go.dev,golang.org,googleapis.deno.dev,googlechromelabs.github.io,goproxy.io,host.docker.internal,json-schema.org,json.schemastore.org,jsr.io,keyserver.ubuntu.com,lfs.github.com,nodejs.org,npm.pkg.github.com,npmjs.com,npmjs.org,objects.githubusercontent.com,ocsp.digicert.com,ocsp.geotrust.com,ocsp.globalsign.com,ocsp.identrust.com,ocsp.sectigo.com,ocsp.ssl.com,ocsp.thawte.com,ocsp.usertrust.com,ocsp.verisign.com,packagecloud.io,packages.cloud.google.com,packages.microsoft.com,pkg.go.dev,playwright.download.prss.microsoft.com,ppa.launchpad.net,proxy.golang.org,pypi.org,raw.githubusercontent.com,registry.bower.io,registry.npmjs.com,registry.npmjs.org,registry.yarnpkg.com,repo.yarnpkg.com,s.symcb.com,s.symcd.com,security.ubuntu.com,sentry.io,skimdb.npmjs.com,statsig.anthropic.com,storage.googleapis.com,sum.golang.org,telemetry.vercel.com,ts-crl.ws.symantec.com,ts-ocsp.ws.symantec.com,www.googleapis.com,www.npmjs.com,www.npmjs.org,yarnpkg.com"
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_API_URL: ${{ github.api_url }}
          GH_AW_SAFE_OUTPUTS_HANDLER_CONFIG: "{\"create_pull_request\":{\"max\":1,\"max_patch_size\":1024,\"preserve_branch_name\":true,\"protected_files\":[\"package.json\",\"bun.lockb\",\"bunfig.toml\",\"deno.json\",\"deno.jsonc\",\"deno.lock\",\"global.json\",\"NuGet.Config\",\"Directory.Packages.props\",\"mix.exs\",\"mix.lock\",\"go.mod\",\"go.sum\",\"stack.yaml\",\"stack.yaml.lock\",\"pom.xml\",\"build.gradle\",\"build.gradle.kts\",\"settings.gradle\",\"settings.gradle.kts\",\"gradle.properties\",\"package-lock.json\",\"yarn.lock\",\"pnpm-lock.yaml\",\"npm-shrinkwrap.json\",\"requirements.txt\",\"Pipfile\",\"Pipfile.lock\",\"pyproject.toml\",\"setup.py\",\"setup.cfg\",\"Gemfile\",\"Gemfile.lock\",\"uv.lock\",\"CODEOWNERS\",\"CLAUDE.md\"],\"protected_path_prefixes\":[\".github/\",\".agents/\",\".claude/\"]},\"create_report_incomplete_issue\":{},\"missing_data\":{},\"missing_tool\":{},\"noop\":{\"max\":1,\"report-as-issue\":\"false\"},\"push_to_pull_request_branch\":{\"if_no_changes\":\"warn\",\"max\":1,\"max_patch_size\":1024,\"protected_files\":[\"package.json\",\"bun.lockb\",\"bunfig.toml\",\"deno.json\",\"deno.jsonc\",\"deno.lock\",\"global.json\",\"NuGet.Config\",\"Directory.Packages.props\",\"mix.exs\",\"mix.lock\",\"go.mod\",\"go.sum\",\"stack.yaml\",\"stack.yaml.lock\",\"pom.xml\",\"build.gradle\",\"build.gradle.kts\",\"settings.gradle\",\"settings.gradle.kts\",\"gradle.properties\",\"package-lock.json\",\"yarn.lock\",\"pnpm-lock.yaml\",\"npm-shrinkwrap.json\",\"requirements.txt\",\"Pipfile\",\"Pipfile.lock\",\"pyproject.toml\",\"setup.py\",\"setup.cfg\",\"Gemfile\",\"Gemfile.lock\",\"uv.lock\",\"CODEOWNERS\",\"CLAUDE.md\"],\"protected_path_prefixes\":[\".github/\",\".agents/\",\".claude/\"],\"target\":\"triggering\"},\"report_incomplete\":{},\"update_pull_request\":{\"allow_body\":true,\"allow_title\":true,\"max\":1}}"
          GH_AW_CI_TRIGGER_TOKEN: ${{ secrets.GH_AW_CI_TRIGGER_TOKEN }}
        with:
          github-token: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/safe_output_handler_manager.cjs');
            await main();
      - name: Upload Safe Outputs Items
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: safe-outputs-items
          path: |
            /tmp/gh-aw/safe-output-items.jsonl
            /tmp/gh-aw/temporary-id-map.json
          if-no-files-found: ignore

