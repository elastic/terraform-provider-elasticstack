             * @param {{
             *   branchPrefix: string,
             *   factoryLabel: string,
             *   issueOpenedNotEligibleReason: string,
             *   duplicateLinkageMode: 'closes-literal' | 'related-literal' | 'github-keywords',
             *   issueBranchNameAliases?: string[],
             * }} config
             */
            function createFactoryIssueModule(config) {
              const intake = createFactoryIssueIntake(config);
              const issueBranchNameAliases = config.issueBranchNameAliases || [];
              const factoryIssueModule = {
                ...intake,
                actorTrustWhenSenderMissing: factoryActorTrustWhenSenderMissing,
                parseOptionalTriStateFromEnv: factoryParseOptionalTriStateFromEnv,
                parseFinalizeGateEnv: factoryParseFinalizeGateEnv,
              };

              for (const alias of issueBranchNameAliases) {
                factoryIssueModule[alias] = intake.issueBranchName;
              }

              return factoryIssueModule;
            }

            if (typeof module !== 'undefined') {
              module.exports = {
                issueClosingReferencePattern,
                factoryQualifyTriggerEvent,
                factoryCheckActorTrust,
                factoryActorTrustWhenSenderMissing,
                factoryCheckDuplicatePR,
                factoryComputeGateReason,
                factoryParseOptionalTriStateFromEnv,
                factoryParseFinalizeGateEnv,
                createFactoryIssueIntake,
                createFactoryIssueModule,
              };
            }

            /**
             * Shared comment helpers for research-factory issue intake workflows.
             */

            /**
             * Fetches human-authored comments for an issue, paginated, with bot filtering and a hard cap.
             *
             * @param {{ github: object, owner: string, repo: string, issueNumber: number }} params
             * @returns {Promise<{ comments: Array<{author: string, createdAt: string, body: string}>, truncated: boolean }>}
             */
            async function factoryFetchIssueComments({ github, owner, repo, issueNumber }) {
              const MAX_COMMENTS = 200;
              const allComments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });

              const humanComments = [];
              let truncated = false;
              for (const comment of allComments) {
                if (comment.user?.login?.endsWith('[bot]')) {
                  continue;
                }
                if (humanComments.length >= MAX_COMMENTS) {
                  truncated = true;
                  break;
                }
                humanComments.push({
                  author: comment.user?.login ?? '',
                  createdAt: comment.created_at ?? '',
                  body: comment.body ?? '',
                });
              }

              return {
                comments: humanComments,
                truncated,
              };
            }

            const COMMENT_CONTEXT_BUDGET = 50_000;
            /** Overhead reserved for truncation markers appended after the loop. */
            const COMMENT_CONTEXT_MARKER_OVERHEAD = 200;

            /**
             * Serializes captured issue comments into a deterministic markdown string for agent prompts.
             *
             * @param {{ comments: Array<{author: string, createdAt: string, body: string}>, truncated: boolean }} params
             * @returns {string}
             */
            function serializeIssueComments({ comments, truncated }) {
              if (!Array.isArray(comments) || comments.length === 0) {
                return '';
              }

              const bodyBudget = COMMENT_CONTEXT_BUDGET - COMMENT_CONTEXT_MARKER_OVERHEAD;
              let result = '';
              let includedCount = 0;

              for (const comment of comments) {
                const header = `**@${comment.author || ''}** (${comment.createdAt || ''}):\n\n`;
                const body = comment.body || '';
                const footer = '\n\n---\n';
                const available = bodyBudget - result.length;

                if (available <= 0) {
                  break;
                }

                const frameLength = header.length + footer.length;
                if (frameLength > available) {
                  break;
                }
                const fullBlock = header + body + footer;
                if (fullBlock.length <= available) {
                  result += fullBlock;
                } else {
                  // Truncate this comment's body so the output stays within budget
                  const truncatedBody = body.slice(0, available - frameLength);
                  result += header + truncatedBody + footer;
                }
                includedCount++;
              }

              const remaining = comments.length - includedCount;
              if (remaining > 0) {
                result += `[... ${remaining} more comments truncated for context budget]\n`;
              }

              if (truncated) {
                result += '[... comment history truncated at 200 comments]\n';
              }

              return result;
            }

            if (typeof module !== 'undefined') {
              module.exports = {
                factoryFetchIssueComments,
                serializeIssueComments,
                COMMENT_CONTEXT_BUDGET,
              };
            }

            // Concatenated by the workflow compiler; not executable standalone.
            const factoryIssueModule = createFactoryIssueModule({
              branchPrefix: ISSUE_BRANCH_PREFIX,
              factoryLabel: FACTORY_LABEL,
              issueOpenedNotEligibleReason: ISSUE_OPENED_NOT_ELIGIBLE_REASON,
              duplicateLinkageMode: DUPLICATE_LINKAGE_MODE,
            });

            const qualifyTriggerEvent = factoryIssueModule.qualifyTriggerEvent;
            const checkActorTrust = factoryIssueModule.checkActorTrust;
            const checkDuplicatePR = factoryIssueModule.checkDuplicatePR;
            const computeGateReason = factoryIssueModule.computeGateReason;
            const issueBranchName = factoryIssueModule.issueBranchName;
            const actorTrustWhenSenderMissing = factoryIssueModule.actorTrustWhenSenderMissing;
            const parseFinalizeGateEnv = factoryIssueModule.parseFinalizeGateEnv;

            const { owner, repo } = context.repo;
            const issueNumber = parseInt(process.env.INPUT_ISSUE_NUMBER, 10);

            if (!issueNumber || issueNumber <= 0) {
              core.setOutput('comment_count', '0');
              core.setOutput('issue_comments', '');
              core.setFailed('Cannot fetch issue comments: invalid issue number.');
            } else {
              try {
                const fetchResult = await factoryFetchIssueComments({ github, owner, repo, issueNumber });
                const serialized = serializeIssueComments(fetchResult);

                const fs = require('fs');
                const crypto = require('crypto');
                const eofDelim = `EOF_${crypto.randomUUID().replace(/-/g, '')}`;
                const output = `issue_comments<<${eofDelim}\n${serialized}\n${eofDelim}\n`;
                fs.appendFileSync(process.env.GITHUB_OUTPUT, output);

                core.setOutput('comment_count', String(fetchResult.comments.length));
                core.info(`Fetched ${fetchResult.comments.length} comments for issue #${issueNumber}${fetchResult.truncated ? ' (truncated)' : ''}`);
              } catch (err) {
                core.setOutput('comment_count', '0');
                core.setOutput('issue_comments', '');
                core.setFailed(`Failed to fetch issue comments for #${issueNumber}: ${err.message}`);
              }
            }
      - name: Fetch prior reproducer comment
        id: fetch_prior_reproducer_comment
        if: |-
          (
            steps.determine_intake_mode.outputs.intake_mode == 'issue-event' &&
            steps.qualify_trigger.outputs.event_eligible == 'true' &&
            steps.check_actor_trust.outputs.actor_trusted == 'true'
          ) || (
            steps.determine_intake_mode.outputs.intake_mode == 'dispatch' &&
            steps.validate_dispatch_inputs.outputs.event_eligible == 'true'
          )
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          INPUT_ISSUE_NUMBER: |-
            ${{ steps.determine_intake_mode.outputs.intake_mode == 'issue-event'
              && steps.capture_issue_context.outputs.issue_number
              || steps.validate_dispatch_inputs.outputs.issue_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = parseInt(process.env.INPUT_ISSUE_NUMBER, 10);
            const marker = '<!-- gha-reproducer-factory -->';

            if (!issueNumber || issueNumber <= 0) {
              core.setOutput('prior_reproducer_comment', '');
              return;
            }

            try {
              const allComments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });

              const matches = allComments.filter(
                (c) => c.user?.login === 'github-actions[bot]' && c.body?.trimStart().startsWith(marker),
              );

              if (matches.length > 0) {
                const latest = matches[matches.length - 1];
                core.setOutput('prior_reproducer_comment', latest.body);
                core.info(`Found prior reproducer comment ${latest.id} for issue #${issueNumber}`);
              } else {
                core.setOutput('prior_reproducer_comment', '');
                core.info(`No prior reproducer comment found for issue #${issueNumber}`);
              }
            } catch (err) {
              core.setOutput('prior_reproducer_comment', '');
              core.warning(`Could not fetch prior reproducer comment for issue #${issueNumber}: ${err.message}`);
            }
      - name: Check duplicate PR
        id: check_duplicate_pr
        if: |-
          (
            steps.determine_intake_mode.outputs.intake_mode == 'issue-event' &&
            steps.qualify_trigger.outputs.event_eligible == 'true' &&
            steps.check_actor_trust.outputs.actor_trusted == 'true'
          ) || (
            steps.determine_intake_mode.outputs.intake_mode == 'dispatch' &&
            steps.validate_dispatch_inputs.outputs.event_eligible == 'true'
          )
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            /**
             * Reproducer-factory issue intake configuration. Keep `ISSUE_BRANCH_PREFIX` aligned with
             * `workflow.md.tmpl` (branch pattern `reproducer-factory/issue-{n}`).
             */
            'use strict';

            const ISSUE_BRANCH_PREFIX = 'reproducer-factory/issue-';
            const FACTORY_LABEL = 'reproducer-factory';
            const DUPLICATE_LINKAGE_MODE = 'related-literal';
            const ISSUE_OPENED_NOT_ELIGIBLE_REASON =
              'Issue opened event does not qualify because the issue was created without the reproducer-factory label.';

            if (typeof module !== 'undefined') {
              module.exports = {
                ISSUE_BRANCH_PREFIX,
                FACTORY_LABEL,
                DUPLICATE_LINKAGE_MODE,
                ISSUE_OPENED_NOT_ELIGIBLE_REASON,
              };
            }

            /**
             * Shared deterministic helpers for code-factory and change-factory issue intake workflows.
             * Workflow-specific configuration is passed via {@link createFactoryIssueIntake}.
             */

            /** GitHub-recognized issue-closing keywords (case-insensitive). See https://docs.github.com/en/get-started/writing-on-github/working-with-advanced-formatting/using-keywords-in-issues-and-pull-requests */
            const GITHUB_ISSUE_CLOSING_KEYWORDS = '(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)';

            /**
             * GitHub closing-keyword reference: `#` is immediately followed by the issue digits (no whitespace),
             * per GitHub keyword syntax. Case-insensitive keywords; `(?![0-9])` avoids matching `#42` inside `#420`.
             *
             * @param {number} issueNumber
             * @returns {RegExp}
             */
            function issueClosingReferencePattern(issueNumber) {
              return new RegExp(
                `\\b${GITHUB_ISSUE_CLOSING_KEYWORDS}\\s*#${issueNumber}(?![0-9])`,
                'i',
              );
            }

            /**
             * @param {{ eventName: string, eventAction: string, labelName: string, issueLabels: string[] | null | undefined, factoryLabel: string, issueOpenedNotEligibleReason: string }} params
             * @returns {{ event_eligible: boolean, event_eligible_reason: string }}
             */
            function factoryQualifyTriggerEvent({
              eventName,
              eventAction,
              labelName,
              issueLabels,
              factoryLabel,
              issueOpenedNotEligibleReason,
            }) {
              if (eventName === 'issue_comment') {
                return {
                  event_eligible: true,
                  event_eligible_reason: `Issue comment event qualifies because the slash_command trigger routes to issue_comment.`,
                };
              }

              if (eventName !== 'issues') {
                return {
                  event_eligible: false,
                  event_eligible_reason: `Unsupported event '${eventName || '(empty)'}'; expected 'issues'.`,
                };
              }

              if (eventAction === 'labeled') {
                if (labelName === factoryLabel) {
                  return {
                    event_eligible: true,
                    event_eligible_reason: `Issue labeled event qualifies because the applied label is ${factoryLabel}.`,
                  };
                }

                return {
                  event_eligible: false,
                  event_eligible_reason: `Issue labeled event does not qualify because the applied label is '${labelName || '(empty)'}', not '${factoryLabel}'.`,
                };
              }

              if (eventAction === 'opened') {
                if (Array.isArray(issueLabels) && issueLabels.includes(factoryLabel)) {
                  return {
                    event_eligible: true,
                    event_eligible_reason: `Issue opened event qualifies because the issue already has the ${factoryLabel} label.`,
                  };
                }

                return {
                  event_eligible: false,
                  event_eligible_reason: issueOpenedNotEligibleReason,
                };
              }

              return {
                event_eligible: false,
                event_eligible_reason: `Issue event action '${eventAction || '(empty)'}' is not eligible; expected 'opened' or 'labeled'.`,
              };
            }

            /**
             * @param {{ sender: string, permission: string | null }} params
             * @returns {{ actor_trusted: boolean, actor_trusted_reason: string }}
             */
            function factoryCheckActorTrust({ sender, permission }) {
              if (sender === 'github-actions[bot]') {
                return {
                  actor_trusted: true,
                  actor_trusted_reason: 'Trigger actor github-actions[bot] is trusted without collaborator permission lookup.',
                };
              }

              if (['write', 'maintain', 'admin'].includes(permission)) {
                return {
                  actor_trusted: true,
                  actor_trusted_reason: `Trigger actor '${sender || '(empty)'}' is trusted with repository permission '${permission}'.`,
                };
              }

              return {
                actor_trusted: false,
                actor_trusted_reason: `Trigger actor '${sender || '(empty)'}' is not trusted; repository permission '${permission || '(none)'}' does not meet the required write/maintain/admin policy.`,
              };
            }

            /**
             * @returns {{ actor_trusted: boolean, actor_trusted_reason: string }}
             */
            function factoryActorTrustWhenSenderMissing() {
              return {
                actor_trusted: false,
                actor_trusted_reason: 'Trigger actor could not be identified; sender login is missing from the event payload.',
              };
            }

            /**
             * @param {{ issueNumber: number, pullRequests: Array<{ number: number, state: string, head_branch: string, labels: string[], body: string, html_url: string }>, branchPrefix: string, prLabel: string, duplicateLinkageMode: 'closes-literal' | 'related-literal' | 'github-keywords' }} params
             * @returns {{ duplicate_pr_found: boolean, duplicate_pr_url: string | null, gate_reason: string }}
             */
            function factoryCheckDuplicatePR({
              issueNumber,
              pullRequests,
              branchPrefix,
              prLabel,
              duplicateLinkageMode,
            }) {
              const expectedBranch = `${branchPrefix}${issueNumber}`;
              const expectedClosesExample = `Closes #${issueNumber}`;
              const expectedRelatedExample = `Related to #${issueNumber}`;

              let bodyPattern;
              if (duplicateLinkageMode === 'closes-literal') {
                bodyPattern = new RegExp(`Closes #${issueNumber}(?![0-9])`);
              } else if (duplicateLinkageMode === 'related-literal') {
                bodyPattern = new RegExp(`\\bRelated to #${issueNumber}(?![0-9])`);
              } else {
                bodyPattern = issueClosingReferencePattern(issueNumber);
              }

              const duplicate = (pullRequests || []).find(pr => (
                pr.state === 'open' &&
                Array.isArray(pr.labels) && pr.labels.includes(prLabel) &&
                pr.head_branch === expectedBranch &&
                bodyPattern.test(String(pr.body || ''))
              ));

              if (duplicate) {
                const url = duplicate.html_url ?? null;
                let linkagePhrase;
                if (duplicateLinkageMode === 'closes-literal') {
                  linkagePhrase = `canonical linkage '${expectedClosesExample}'`;
                } else if (duplicateLinkageMode === 'related-literal') {
                  linkagePhrase = `literal linkage \`${expectedRelatedExample}\``;
                } else {
                  linkagePhrase = `issue-closing reference such as '${expectedClosesExample}'`;
                }

                return {
                  duplicate_pr_found: true,
                  duplicate_pr_url: url,
                  gate_reason: `Found existing linked ${prLabel} PR #${duplicate.number} (${url ?? '(unknown URL)'}) for issue #${issueNumber} on branch '${expectedBranch}' with ${linkagePhrase}.`,
                };
              }

              let linkageTail;
              if (duplicateLinkageMode === 'closes-literal') {
                linkageTail = `canonical linkage '${expectedClosesExample}'`;
              } else if (duplicateLinkageMode === 'related-literal') {
                linkageTail = `literal linkage \`${expectedRelatedExample}\``;
              } else {
                linkageTail = `issue-closing reference such as '${expectedClosesExample}'`;
              }

              return {
                duplicate_pr_found: false,
                duplicate_pr_url: null,
                gate_reason: `No open linked ${prLabel} PR found for issue #${issueNumber}; expected label '${prLabel}', branch '${expectedBranch}', and ${linkageTail}.`,
              };
            }

            /**
             * @param {{ eventEligible: boolean, eventEligibleReason: string, actorTrusted: boolean | null, actorTrustedReason: string | null, duplicatePrFound: boolean | null, duplicatePrUrl: string | null, duplicateCheckGateReason: string | null }} params
             * @param {string} factoryLabel
             * @returns {{ gate_reason: string }}
             */
            function factoryComputeGateReason({
              eventEligible,
              eventEligibleReason,
              actorTrusted,
              actorTrustedReason,
              duplicatePrFound,
              duplicatePrUrl,
              duplicateCheckGateReason,
            }, factoryLabel) {
              if (!eventEligible) {
                return { gate_reason: eventEligibleReason };
              }

              if (actorTrusted === false) {
                return { gate_reason: actorTrustedReason || 'Trigger actor is not trusted.' };
              }

              if (actorTrusted == null) {
                return { gate_reason: 'Actor trust could not be determined; the trust check step did not produce an output.' };
              }

              if (duplicatePrFound === true) {
                return {
                  gate_reason: duplicateCheckGateReason || `Found existing linked ${factoryLabel} PR: ${duplicatePrUrl || '(unknown URL)'}.`,
                };
              }

              if (duplicatePrFound == null) {
                return { gate_reason: 'Duplicate PR check did not complete; the check step did not produce an output.' };
              }

              return {
                gate_reason: duplicateCheckGateReason || `All deterministic gates passed: event eligible, actor trusted, and no linked ${factoryLabel} PR found.`,
              };
            }

            /**
             * @param {string | undefined} raw
             * @returns {boolean | null}
             */
            function factoryParseOptionalTriStateFromEnv(raw) {
              if (raw == null || raw === '') {
                return null;
              }
              return raw === 'true';
            }

            /**
             * @param {Record<string, string | undefined>} env
             */
            function factoryParseFinalizeGateEnv(env) {
              const e = env || {};
              return {
                eventEligible: e.EVENT_ELIGIBLE === 'true',
                eventEligibleReason: e.EVENT_ELIGIBLE_REASON ?? '',
                actorTrusted: factoryParseOptionalTriStateFromEnv(e.ACTOR_TRUSTED),
                actorTrustedReason: e.ACTOR_TRUSTED_REASON ?? null,
                duplicatePrFound: factoryParseOptionalTriStateFromEnv(e.DUPLICATE_PR_FOUND),
                duplicatePrUrl: e.DUPLICATE_PR_URL && e.DUPLICATE_PR_URL !== '' ? e.DUPLICATE_PR_URL : null,
                duplicateCheckGateReason: e.DUPLICATE_GATE_REASON ?? null,
              };
            }

            /**
             * @param {{
             *   branchPrefix: string,
             *   factoryLabel: string,
             *   issueOpenedNotEligibleReason: string,
             *   duplicateLinkageMode: 'closes-literal' | 'related-literal' | 'github-keywords',
             * }} config
             */
            function createFactoryIssueIntake(config) {
              const {
                branchPrefix,
                factoryLabel,
                issueOpenedNotEligibleReason,
                duplicateLinkageMode,
              } = config;

              function issueBranchName(issueNumber) {
                return `${branchPrefix}${issueNumber}`;
              }

              /**
               * @param {{ eventName: string, eventAction: string, labelName: string, issueLabels?: string[] | null | undefined }} params
               */
              function qualifyTriggerEvent(params) {
                return factoryQualifyTriggerEvent({
                  ...params,
                  factoryLabel,
                  issueOpenedNotEligibleReason,
                });
              }

              function checkDuplicatePR(params) {
                return factoryCheckDuplicatePR({
                  ...params,
                  branchPrefix,
                  prLabel: factoryLabel,
                  duplicateLinkageMode,
                });
              }

              function computeGateReason(params) {
                return factoryComputeGateReason(params, factoryLabel);
              }

              return {
                issueBranchName,
                qualifyTriggerEvent,
                checkActorTrust: factoryCheckActorTrust,
                checkDuplicatePR,
                computeGateReason,
              };
            }

            /**
             * @param {{
             *   branchPrefix: string,
             *   factoryLabel: string,
             *   issueOpenedNotEligibleReason: string,
             *   duplicateLinkageMode: 'closes-literal' | 'related-literal' | 'github-keywords',
             *   issueBranchNameAliases?: string[],
             * }} config
             */
            function createFactoryIssueModule(config) {
              const intake = createFactoryIssueIntake(config);
              const issueBranchNameAliases = config.issueBranchNameAliases || [];
              const factoryIssueModule = {
                ...intake,
                actorTrustWhenSenderMissing: factoryActorTrustWhenSenderMissing,
                parseOptionalTriStateFromEnv: factoryParseOptionalTriStateFromEnv,
                parseFinalizeGateEnv: factoryParseFinalizeGateEnv,
              };

              for (const alias of issueBranchNameAliases) {
                factoryIssueModule[alias] = intake.issueBranchName;
              }

              return factoryIssueModule;
            }

            if (typeof module !== 'undefined') {
              module.exports = {
                issueClosingReferencePattern,
                factoryQualifyTriggerEvent,
                factoryCheckActorTrust,
                factoryActorTrustWhenSenderMissing,
                factoryCheckDuplicatePR,
                factoryComputeGateReason,
                factoryParseOptionalTriStateFromEnv,
                factoryParseFinalizeGateEnv,
                createFactoryIssueIntake,
                createFactoryIssueModule,
              };
            }

            // Concatenated by the workflow compiler; not executable standalone.
            const factoryIssueModule = createFactoryIssueModule({
              branchPrefix: ISSUE_BRANCH_PREFIX,
              factoryLabel: FACTORY_LABEL,
              issueOpenedNotEligibleReason: ISSUE_OPENED_NOT_ELIGIBLE_REASON,
              duplicateLinkageMode: DUPLICATE_LINKAGE_MODE,
            });

            const qualifyTriggerEvent = factoryIssueModule.qualifyTriggerEvent;
            const checkActorTrust = factoryIssueModule.checkActorTrust;
            const checkDuplicatePR = factoryIssueModule.checkDuplicatePR;
            const computeGateReason = factoryIssueModule.computeGateReason;
            const issueBranchName = factoryIssueModule.issueBranchName;
            const actorTrustWhenSenderMissing = factoryIssueModule.actorTrustWhenSenderMissing;
            const parseFinalizeGateEnv = factoryIssueModule.parseFinalizeGateEnv;

            const { owner, repo } = context.repo;
            const intakeMode = context.eventName === 'workflow_dispatch' ? 'dispatch' : 'issue-event';
            let issueNumber;

            if (intakeMode === 'dispatch') {
              issueNumber = parseInt(context.payload.inputs?.issue_number, 10) || null;
            } else {
              issueNumber = context.payload.issue?.number || null;
            }

            if (!issueNumber) {
              core.setOutput('duplicate_pr_found', 'false');
              core.setOutput('duplicate_pr_url', '');
              core.setOutput('gate_reason', 'No issue number available for duplicate PR check.');
              core.info('Duplicate PR check skipped: issue number is not available.');
              return;
            }

            const expectedBranch = issueBranchName(issueNumber);

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head: `${owner}:${expectedBranch}`,
              per_page: 100,
            });

            const pullRequests = pulls.map(pr => ({
              number: pr.number,
              state: pr.state,
              head_branch: pr.head.ref,
              labels: pr.labels.map(l => l.name),
              body: pr.body ?? '',
              html_url: pr.html_url,
            }));

            const result = checkDuplicatePR({ issueNumber, pullRequests });

            core.setOutput('duplicate_pr_found', result.duplicate_pr_found ? 'true' : 'false');
            core.setOutput('duplicate_pr_url', result.duplicate_pr_url ?? '');
            core.setOutput('gate_reason', result.gate_reason);

            if (result.duplicate_pr_found) {
              core.info(`Duplicate PR found: ${result.gate_reason}`);
            } else {
              core.info(`No duplicate PR: ${result.gate_reason}`);
            }
      - name: Remove trigger label
        id: remove_trigger_label
        if: steps.determine_intake_mode.outputs.intake_mode == 'issue-event' && steps.qualify_trigger.outputs.event_eligible == 'true' && steps.check_actor_trust.outputs.actor_trusted == 'true' && steps.check_duplicate_pr.outputs.duplicate_pr_found != 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            /**
             * Removes a single label from an issue or pull request (GitHub issue API).
             * @param {{ github: object, context: object, issueNumber: number|undefined, labelName: string|undefined }} opts
             * @returns {Promise<{ trigger_label_removed: boolean, trigger_label_removed_reason: string }>}
             */
            async function removeTriggerLabel({ github, context, issueNumber, labelName }) {
              if (issueNumber === undefined || issueNumber === null) {
                return {
                  trigger_label_removed: false,
                  trigger_label_removed_reason: 'No issue number in event payload',
                };
              }

              const label =
                typeof labelName === 'string' && labelName.trim() !== '' ? labelName.trim() : null;
              if (!label) {
                return {
                  trigger_label_removed: false,
                  trigger_label_removed_reason: 'No label name provided',
                };
              }

              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: label,
                });
                return {
                  trigger_label_removed: true,
                  trigger_label_removed_reason: `Removed label: ${label}`,
                };
              } catch (err) {
                // GitHub returns 404 when the label does not exist on the issue; treat as success
                if (err.status === 404) {
                  return {
                    trigger_label_removed: true,
                    trigger_label_removed_reason: `Label ${label} was not present (already removed or never applied)`,
                  };
                }
                return {
                  trigger_label_removed: false,
                  trigger_label_removed_reason: `Failed to remove label: ${err.message}`,
                };
              }
            }

            if (typeof module !== 'undefined') {
              module.exports = { removeTriggerLabel };
            }

            const issueNumber = context.payload.issue?.number;
            const result = await removeTriggerLabel({
              github,
              context,
              issueNumber,
              labelName: 'reproducer-factory',
            });

            core.setOutput('trigger_label_removed', result.trigger_label_removed ? 'true' : 'false');
            core.setOutput('trigger_label_removed_reason', result.trigger_label_removed_reason);

            if (result.trigger_label_removed) {
              core.info(`Removed trigger label reproducer-factory from issue #${issueNumber}`);
            } else {
              core.info(`Trigger label removal skipped: ${result.trigger_label_removed_reason}`);
            }
      - name: Normalize context
        id: normalize_context
        if: always()
        run: |
          echo "intake_mode=${INTAKE_MODE}" >> "$GITHUB_OUTPUT"
          EOF_DELIM="EOF_$(cat /proc/sys/kernel/random/uuid 2>/dev/null || date +%s%N)"

          if [ "${INTAKE_MODE}" = "issue-event" ]; then
            echo "issue_number=${ISSUE_NUMBER_EVENT}" >> "$GITHUB_OUTPUT"
            echo "issue_title=${ISSUE_TITLE_EVENT}" >> "$GITHUB_OUTPUT"
            {
              echo "issue_body<<${EOF_DELIM}"
              printf '%s\n' "${ISSUE_BODY_EVENT}"
              echo "${EOF_DELIM}"
            } >> "$GITHUB_OUTPUT"
            echo "event_eligible=${EVENT_ELIGIBLE_EVENT}" >> "$GITHUB_OUTPUT"
            echo "event_eligible_reason=${EVENT_ELIGIBLE_REASON_EVENT}" >> "$GITHUB_OUTPUT"
            echo "actor_trusted=${ACTOR_TRUSTED_EVENT}" >> "$GITHUB_OUTPUT"
            echo "actor_trusted_reason=${ACTOR_TRUSTED_REASON_EVENT}" >> "$GITHUB_OUTPUT"
            echo "trigger_label_removed=${TRIGGER_LABEL_REMOVED_EVENT}" >> "$GITHUB_OUTPUT"
            echo "trigger_label_removed_reason=${TRIGGER_LABEL_REMOVED_REASON_EVENT}" >> "$GITHUB_OUTPUT"
          else
            echo "issue_number=${ISSUE_NUMBER_DISPATCH}" >> "$GITHUB_OUTPUT"
            echo "issue_title=${ISSUE_TITLE_DISPATCH}" >> "$GITHUB_OUTPUT"
            {
              echo "issue_body<<${EOF_DELIM}"
              printf '%s\n' "${ISSUE_BODY_DISPATCH}"
              echo "${EOF_DELIM}"
            } >> "$GITHUB_OUTPUT"
            echo "event_eligible=${EVENT_ELIGIBLE_DISPATCH}" >> "$GITHUB_OUTPUT"
            echo "event_eligible_reason=${EVENT_ELIGIBLE_REASON_DISPATCH}" >> "$GITHUB_OUTPUT"
            echo "actor_trusted=true" >> "$GITHUB_OUTPUT"
            echo "actor_trusted_reason=Dispatch intake bypasses actor trust check." >> "$GITHUB_OUTPUT"
            echo "trigger_label_removed=false" >> "$GITHUB_OUTPUT"
            echo "trigger_label_removed_reason=Trigger label removal is not required for dispatch intake." >> "$GITHUB_OUTPUT"
            echo "source_workflow=${SOURCE_WORKFLOW}" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "issue_comments<<${EOF_DELIM}"
            printf '%s\n' "${ISSUE_COMMENTS}"
            echo "${EOF_DELIM}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "prior_reproducer_comment<<${EOF_DELIM}"
            printf '%s\n' "${PRIOR_REPRODUCER_COMMENT}"
            echo "${EOF_DELIM}"
          } >> "$GITHUB_OUTPUT"

          echo "duplicate_pr_found=${DUPLICATE_PR_FOUND}" >> "$GITHUB_OUTPUT"
          echo "duplicate_pr_url=${DUPLICATE_PR_URL}" >> "$GITHUB_OUTPUT"
        env:
          ACTOR_TRUSTED_EVENT: ${{ steps.check_actor_trust.outputs.actor_trusted }}
          ACTOR_TRUSTED_REASON_EVENT: ${{ steps.check_actor_trust.outputs.actor_trusted_reason }}
          DUPLICATE_PR_FOUND: ${{ steps.check_duplicate_pr.outputs.duplicate_pr_found }}
          DUPLICATE_PR_URL: ${{ steps.check_duplicate_pr.outputs.duplicate_pr_url }}
          EVENT_ELIGIBLE_DISPATCH: ${{ steps.validate_dispatch_inputs.outputs.event_eligible }}
          EVENT_ELIGIBLE_EVENT: ${{ steps.qualify_trigger.outputs.event_eligible }}
          EVENT_ELIGIBLE_REASON_DISPATCH: ${{ steps.validate_dispatch_inputs.outputs.event_eligible_reason }}
          EVENT_ELIGIBLE_REASON_EVENT: ${{ steps.qualify_trigger.outputs.event_eligible_reason }}
          INTAKE_MODE: ${{ steps.determine_intake_mode.outputs.intake_mode }}
          ISSUE_BODY_DISPATCH: ${{ steps.fetch_live_issue.outputs.issue_body }}
          ISSUE_BODY_EVENT: ${{ steps.capture_issue_context.outputs.issue_body }}
          ISSUE_COMMENTS: ${{ steps.fetch_issue_comments.outputs.issue_comments }}
          ISSUE_NUMBER_DISPATCH: ${{ steps.fetch_live_issue.outputs.issue_number }}
          ISSUE_NUMBER_EVENT: ${{ steps.capture_issue_context.outputs.issue_number }}
          ISSUE_TITLE_DISPATCH: ${{ steps.fetch_live_issue.outputs.issue_title }}
          ISSUE_TITLE_EVENT: ${{ steps.capture_issue_context.outputs.issue_title }}
          PRIOR_REPRODUCER_COMMENT: ${{ steps.fetch_prior_reproducer_comment.outputs.prior_reproducer_comment }}
          SOURCE_WORKFLOW: ${{ github.event.inputs.source_workflow }}
          TRIGGER_LABEL_REMOVED_EVENT: ${{ steps.remove_trigger_label.outputs.trigger_label_removed }}
          TRIGGER_LABEL_REMOVED_REASON_EVENT: ${{ steps.remove_trigger_label.outputs.trigger_label_removed_reason }}
        shell: bash
      - name: Write issue context to files
        id: write_context_files
        if: steps.normalize_context.outputs.event_eligible == 'true' && steps.normalize_context.outputs.actor_trusted == 'true' && steps.check_duplicate_pr.outputs.duplicate_pr_found != 'true' && steps.normalize_context.outputs.issue_number != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          ISSUE_BODY: ${{ steps.normalize_context.outputs.issue_body }}
          ISSUE_COMMENTS: ${{ steps.normalize_context.outputs.issue_comments }}
          PRIOR_REPRODUCER_COMMENT: ${{ steps.normalize_context.outputs.prior_reproducer_comment }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            /**
             * HTML comment sanitisation, control/invisible-char removal, and research-comment lookup helpers.
             */

            /**
             * Removes all HTML comment sequences (<code>&lt;!--</code> through the next <code>--&gt;</code>).
             * If an opening sequence has no closing counterpart, everything from the opener to the end of
             * the string is removed.
             *
             * @param {string} text
             * @returns {string}
             */
            function stripHtmlComments(text) {
              if (typeof text !== 'string') return '';
              return text.replace(/<!--[\s\S]*?(?:-->|$)/g, '');
            }

            /**
             * Removes non-printable ASCII control characters while preserving tab, newline,
             * and carriage return. Also strips Unicode line/paragraph separators.
             *
             * Stripped ASCII:  \x00-\x08, \x0B, \x0C, \x0E-\x1F, \x7F
             * Preserved:       \x09 (tab), \x0A (LF), \x0D (CR)
             * Unicode:         \u2028, \u2029
             *
             * @param {string} text
             * @returns {string}
             */
            function stripControlChars(text) {
              if (typeof text !== 'string') return '';
              return text.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F\u2028\u2029]/g, '');
            }

            /**
             * Removes invisible Unicode characters that have no legitimate use in issue content:
             * zero-width spaces/joiners, bidirectional marks, word/function/invisible operators,
             * and the BOM (byte order mark).
             *
             * Ranges stripped:
             *   \u200B-\u200F  — zero-width space, non-joiner, joiner, LTR mark, RTL mark
             *   \u2060-\u2064  — word joiner, function application, invisible times/separator/plus
             *   \uFEFF           — BOM / zero-width no-break space
             *
             * @param {string} text
             * @returns {string}
             */
            function stripInvisibleUnicode(text) {
              if (typeof text !== 'string') return '';
              return text.replace(/[\u200B-\u200F\u2060-\u2064\uFEFF]/g, '');
            }

            /**
             * Composed sanitisation pipeline. Runs all three filters in sequence:
             *
             *   input → stripHtmlComments → stripControlChars → stripInvisibleUnicode → output
             *
             * Idempotent: applying twice produces the same result as applying once.
             *
             * @param {string} text
             * @returns {string}
             */
            function sanitizeUserContent(text) {
              if (typeof text !== 'string') return '';
              return stripInvisibleUnicode(stripControlChars(stripHtmlComments(text)));
            }

            /**
             * Finds the most recently created matching research comment written by
             * <code>github-actions[bot]</code> whose body starts with <code>marker</code>.
             *
             * @param {Array<{author: string, body: string}>} comments Ordered oldest-first.
             * @param {string} marker
             * @returns {{author: string, body: string} | null}
             */
            function findResearchComment(comments, marker) {
              if (!Array.isArray(comments)) {
                return null;
              }
              const matches = comments.filter(
                (c) =>
                  c != null &&
                  typeof c.body === 'string' &&
                  (c.author ?? c.user?.login) === 'github-actions[bot]' &&
                  c.body.trimStart().startsWith(marker),
              );
              return matches.length > 0 ? matches[matches.length - 1] : null;
            }

            if (typeof module !== 'undefined') {
              module.exports = {
                stripHtmlComments,
                stripControlChars,
                stripInvisibleUnicode,
                sanitizeUserContent,
                findResearchComment,
              };
            }

            const fs = require('fs');
            const dir = '/tmp/reproducer-factory-context';

            fs.mkdirSync(dir, { recursive: true });
            fs.writeFileSync(`${dir}/issue_body.md`, sanitizeUserContent(process.env.ISSUE_BODY));
            fs.writeFileSync(`${dir}/issue_comments.md`, sanitizeUserContent(process.env.ISSUE_COMMENTS));
            fs.writeFileSync(`${dir}/prior_reproducer_comment.md`, sanitizeUserContent(process.env.PRIOR_REPRODUCER_COMMENT || ''));
            core.info('Wrote sanitized issue context files to /tmp/reproducer-factory-context/');
      - name: Upload issue context artifact
        if: steps.normalize_context.outputs.event_eligible == 'true' && steps.normalize_context.outputs.actor_trusted == 'true' && steps.check_duplicate_pr.outputs.duplicate_pr_found != 'true' && steps.normalize_context.outputs.issue_number != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          if-no-files-found: error
          name: reproducer-factory-issue-context
          path: /tmp/reproducer-factory-context/
      - name: Finalize gate reason
        id: finalize_gate
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          ACTOR_TRUSTED: ${{ steps.normalize_context.outputs.actor_trusted }}
          ACTOR_TRUSTED_REASON: ${{ steps.normalize_context.outputs.actor_trusted_reason }}
          DUPLICATE_GATE_REASON: ${{ steps.check_duplicate_pr.outputs.gate_reason }}
          DUPLICATE_PR_FOUND: ${{ steps.check_duplicate_pr.outputs.duplicate_pr_found }}
          DUPLICATE_PR_URL: ${{ steps.check_duplicate_pr.outputs.duplicate_pr_url }}
          EVENT_ELIGIBLE: ${{ steps.normalize_context.outputs.event_eligible }}
          EVENT_ELIGIBLE_REASON: ${{ steps.normalize_context.outputs.event_eligible_reason }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            /**
             * Reproducer-factory issue intake configuration. Keep `ISSUE_BRANCH_PREFIX` aligned with
             * `workflow.md.tmpl` (branch pattern `reproducer-factory/issue-{n}`).
             */
            'use strict';

            const ISSUE_BRANCH_PREFIX = 'reproducer-factory/issue-';
            const FACTORY_LABEL = 'reproducer-factory';
            const DUPLICATE_LINKAGE_MODE = 'related-literal';
            const ISSUE_OPENED_NOT_ELIGIBLE_REASON =
              'Issue opened event does not qualify because the issue was created without the reproducer-factory label.';

            if (typeof module !== 'undefined') {
              module.exports = {
                ISSUE_BRANCH_PREFIX,
                FACTORY_LABEL,
                DUPLICATE_LINKAGE_MODE,
                ISSUE_OPENED_NOT_ELIGIBLE_REASON,
              };
            }

            /**
             * Shared deterministic helpers for code-factory and change-factory issue intake workflows.
             * Workflow-specific configuration is passed via {@link createFactoryIssueIntake}.
             */

            /** GitHub-recognized issue-closing keywords (case-insensitive). See https://docs.github.com/en/get-started/writing-on-github/working-with-advanced-formatting/using-keywords-in-issues-and-pull-requests */
            const GITHUB_ISSUE_CLOSING_KEYWORDS = '(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)';

            /**
             * GitHub closing-keyword reference: `#` is immediately followed by the issue digits (no whitespace),
             * per GitHub keyword syntax. Case-insensitive keywords; `(?![0-9])` avoids matching `#42` inside `#420`.
             *
             * @param {number} issueNumber
             * @returns {RegExp}
             */
            function issueClosingReferencePattern(issueNumber) {
              return new RegExp(
                `\\b${GITHUB_ISSUE_CLOSING_KEYWORDS}\\s*#${issueNumber}(?![0-9])`,
                'i',
              );
            }

            /**
             * @param {{ eventName: string, eventAction: string, labelName: string, issueLabels: string[] | null | undefined, factoryLabel: string, issueOpenedNotEligibleReason: string }} params
             * @returns {{ event_eligible: boolean, event_eligible_reason: string }}
             */
            function factoryQualifyTriggerEvent({
              eventName,
              eventAction,
              labelName,
              issueLabels,
              factoryLabel,
              issueOpenedNotEligibleReason,
            }) {
              if (eventName === 'issue_comment') {
                return {
                  event_eligible: true,
                  event_eligible_reason: `Issue comment event qualifies because the slash_command trigger routes to issue_comment.`,
                };
              }

              if (eventName !== 'issues') {
                return {
                  event_eligible: false,
                  event_eligible_reason: `Unsupported event '${eventName || '(empty)'}'; expected 'issues'.`,
                };
              }

              if (eventAction === 'labeled') {
                if (labelName === factoryLabel) {
                  return {
                    event_eligible: true,
                    event_eligible_reason: `Issue labeled event qualifies because the applied label is ${factoryLabel}.`,
                  };
                }

                return {
                  event_eligible: false,
                  event_eligible_reason: `Issue labeled event does not qualify because the applied label is '${labelName || '(empty)'}', not '${factoryLabel}'.`,
                };
              }

              if (eventAction === 'opened') {
                if (Array.isArray(issueLabels) && issueLabels.includes(factoryLabel)) {
                  return {
                    event_eligible: true,
                    event_eligible_reason: `Issue opened event qualifies because the issue already has the ${factoryLabel} label.`,
                  };
                }

                return {
                  event_eligible: false,
                  event_eligible_reason: issueOpenedNotEligibleReason,
                };
              }

              return {
                event_eligible: false,
                event_eligible_reason: `Issue event action '${eventAction || '(empty)'}' is not eligible; expected 'opened' or 'labeled'.`,
              };
            }

            /**
             * @param {{ sender: string, permission: string | null }} params
             * @returns {{ actor_trusted: boolean, actor_trusted_reason: string }}
             */
            function factoryCheckActorTrust({ sender, permission }) {
              if (sender === 'github-actions[bot]') {
                return {
                  actor_trusted: true,
                  actor_trusted_reason: 'Trigger actor github-actions[bot] is trusted without collaborator permission lookup.',
                };
              }

              if (['write', 'maintain', 'admin'].includes(permission)) {
                return {
                  actor_trusted: true,
                  actor_trusted_reason: `Trigger actor '${sender || '(empty)'}' is trusted with repository permission '${permission}'.`,
                };
              }

              return {
                actor_trusted: false,
                actor_trusted_reason: `Trigger actor '${sender || '(empty)'}' is not trusted; repository permission '${permission || '(none)'}' does not meet the required write/maintain/admin policy.`,
              };
            }

            /**
             * @returns {{ actor_trusted: boolean, actor_trusted_reason: string }}
             */
            function factoryActorTrustWhenSenderMissing() {
              return {
                actor_trusted: false,
                actor_trusted_reason: 'Trigger actor could not be identified; sender login is missing from the event payload.',
              };
            }

            /**
             * @param {{ issueNumber: number, pullRequests: Array<{ number: number, state: string, head_branch: string, labels: string[], body: string, html_url: string }>, branchPrefix: string, prLabel: string, duplicateLinkageMode: 'closes-literal' | 'related-literal' | 'github-keywords' }} params
             * @returns {{ duplicate_pr_found: boolean, duplicate_pr_url: string | null, gate_reason: string }}
             */
            function factoryCheckDuplicatePR({
              issueNumber,
              pullRequests,
              branchPrefix,
              prLabel,
              duplicateLinkageMode,
            }) {
              const expectedBranch = `${branchPrefix}${issueNumber}`;
              const expectedClosesExample = `Closes #${issueNumber}`;
              const expectedRelatedExample = `Related to #${issueNumber}`;

              let bodyPattern;
              if (duplicateLinkageMode === 'closes-literal') {
                bodyPattern = new RegExp(`Closes #${issueNumber}(?![0-9])`);
              } else if (duplicateLinkageMode === 'related-literal') {
                bodyPattern = new RegExp(`\\bRelated to #${issueNumber}(?![0-9])`);
              } else {
                bodyPattern = issueClosingReferencePattern(issueNumber);
              }

              const duplicate = (pullRequests || []).find(pr => (
                pr.state === 'open' &&
                Array.isArray(pr.labels) && pr.labels.includes(prLabel) &&
                pr.head_branch === expectedBranch &&
                bodyPattern.test(String(pr.body || ''))
              ));

              if (duplicate) {
                const url = duplicate.html_url ?? null;
                let linkagePhrase;
                if (duplicateLinkageMode === 'closes-literal') {
                  linkagePhrase = `canonical linkage '${expectedClosesExample}'`;
                } else if (duplicateLinkageMode === 'related-literal') {
                  linkagePhrase = `literal linkage \`${expectedRelatedExample}\``;
                } else {
                  linkagePhrase = `issue-closing reference such as '${expectedClosesExample}'`;
                }

                return {
                  duplicate_pr_found: true,
                  duplicate_pr_url: url,
                  gate_reason: `Found existing linked ${prLabel} PR #${duplicate.number} (${url ?? '(unknown URL)'}) for issue #${issueNumber} on branch '${expectedBranch}' with ${linkagePhrase}.`,
                };
              }

              let linkageTail;
              if (duplicateLinkageMode === 'closes-literal') {
                linkageTail = `canonical linkage '${expectedClosesExample}'`;
              } else if (duplicateLinkageMode === 'related-literal') {
                linkageTail = `literal linkage \`${expectedRelatedExample}\``;
              } else {
                linkageTail = `issue-closing reference such as '${expectedClosesExample}'`;
              }

              return {
                duplicate_pr_found: false,
                duplicate_pr_url: null,
                gate_reason: `No open linked ${prLabel} PR found for issue #${issueNumber}; expected label '${prLabel}', branch '${expectedBranch}', and ${linkageTail}.`,
              };
            }

            /**
             * @param {{ eventEligible: boolean, eventEligibleReason: string, actorTrusted: boolean | null, actorTrustedReason: string | null, duplicatePrFound: boolean | null, duplicatePrUrl: string | null, duplicateCheckGateReason: string | null }} params
             * @param {string} factoryLabel
             * @returns {{ gate_reason: string }}
             */
            function factoryComputeGateReason({
              eventEligible,
              eventEligibleReason,
              actorTrusted,
              actorTrustedReason,
              duplicatePrFound,
              duplicatePrUrl,
              duplicateCheckGateReason,
            }, factoryLabel) {
              if (!eventEligible) {
                return { gate_reason: eventEligibleReason };
              }

              if (actorTrusted === false) {
                return { gate_reason: actorTrustedReason || 'Trigger actor is not trusted.' };
              }

              if (actorTrusted == null) {
                return { gate_reason: 'Actor trust could not be determined; the trust check step did not produce an output.' };
              }

              if (duplicatePrFound === true) {
                return {
                  gate_reason: duplicateCheckGateReason || `Found existing linked ${factoryLabel} PR: ${duplicatePrUrl || '(unknown URL)'}.`,
                };
              }

              if (duplicatePrFound == null) {
                return { gate_reason: 'Duplicate PR check did not complete; the check step did not produce an output.' };
              }

              return {
                gate_reason: duplicateCheckGateReason || `All deterministic gates passed: event eligible, actor trusted, and no linked ${factoryLabel} PR found.`,
              };
            }

            /**
             * @param {string | undefined} raw
             * @returns {boolean | null}
             */
            function factoryParseOptionalTriStateFromEnv(raw) {
              if (raw == null || raw === '') {
                return null;
              }
              return raw === 'true';
            }

            /**
             * @param {Record<string, string | undefined>} env
             */
            function factoryParseFinalizeGateEnv(env) {
              const e = env || {};
              return {
                eventEligible: e.EVENT_ELIGIBLE === 'true',
                eventEligibleReason: e.EVENT_ELIGIBLE_REASON ?? '',
                actorTrusted: factoryParseOptionalTriStateFromEnv(e.ACTOR_TRUSTED),
                actorTrustedReason: e.ACTOR_TRUSTED_REASON ?? null,
                duplicatePrFound: factoryParseOptionalTriStateFromEnv(e.DUPLICATE_PR_FOUND),
                duplicatePrUrl: e.DUPLICATE_PR_URL && e.DUPLICATE_PR_URL !== '' ? e.DUPLICATE_PR_URL : null,
                duplicateCheckGateReason: e.DUPLICATE_GATE_REASON ?? null,
              };
            }

            /**
             * @param {{
             *   branchPrefix: string,
             *   factoryLabel: string,
             *   issueOpenedNotEligibleReason: string,
             *   duplicateLinkageMode: 'closes-literal' | 'related-literal' | 'github-keywords',
             * }} config
             */
            function createFactoryIssueIntake(config) {
              const {
                branchPrefix,
                factoryLabel,
                issueOpenedNotEligibleReason,
                duplicateLinkageMode,
              } = config;

              function issueBranchName(issueNumber) {
                return `${branchPrefix}${issueNumber}`;
              }

              /**
               * @param {{ eventName: string, eventAction: string, labelName: string, issueLabels?: string[] | null | undefined }} params
               */
              function qualifyTriggerEvent(params) {
                return factoryQualifyTriggerEvent({
                  ...params,
                  factoryLabel,
                  issueOpenedNotEligibleReason,
                });
              }

              function checkDuplicatePR(params) {
                return factoryCheckDuplicatePR({
                  ...params,
                  branchPrefix,
                  prLabel: factoryLabel,
                  duplicateLinkageMode,
                });
              }

              function computeGateReason(params) {
                return factoryComputeGateReason(params, factoryLabel);
              }

              return {
                issueBranchName,
                qualifyTriggerEvent,
                checkActorTrust: factoryCheckActorTrust,
                checkDuplicatePR,
                computeGateReason,
              };
            }

            /**
             * @param {{
             *   branchPrefix: string,
             *   factoryLabel: string,
             *   issueOpenedNotEligibleReason: string,
             *   duplicateLinkageMode: 'closes-literal' | 'related-literal' | 'github-keywords',
             *   issueBranchNameAliases?: string[],
             * }} config
             */
            function createFactoryIssueModule(config) {
              const intake = createFactoryIssueIntake(config);
              const issueBranchNameAliases = config.issueBranchNameAliases || [];
              const factoryIssueModule = {
                ...intake,
                actorTrustWhenSenderMissing: factoryActorTrustWhenSenderMissing,
                parseOptionalTriStateFromEnv: factoryParseOptionalTriStateFromEnv,
                parseFinalizeGateEnv: factoryParseFinalizeGateEnv,
              };

              for (const alias of issueBranchNameAliases) {
                factoryIssueModule[alias] = intake.issueBranchName;
              }

              return factoryIssueModule;
            }

            if (typeof module !== 'undefined') {
              module.exports = {
                issueClosingReferencePattern,
                factoryQualifyTriggerEvent,
                factoryCheckActorTrust,
                factoryActorTrustWhenSenderMissing,
                factoryCheckDuplicatePR,
                factoryComputeGateReason,
                factoryParseOptionalTriStateFromEnv,
                factoryParseFinalizeGateEnv,
                createFactoryIssueIntake,
                createFactoryIssueModule,
              };
            }

            // Concatenated by the workflow compiler; not executable standalone.
            const factoryIssueModule = createFactoryIssueModule({
              branchPrefix: ISSUE_BRANCH_PREFIX,
              factoryLabel: FACTORY_LABEL,
              issueOpenedNotEligibleReason: ISSUE_OPENED_NOT_ELIGIBLE_REASON,
              duplicateLinkageMode: DUPLICATE_LINKAGE_MODE,
            });

            const qualifyTriggerEvent = factoryIssueModule.qualifyTriggerEvent;
            const checkActorTrust = factoryIssueModule.checkActorTrust;
            const checkDuplicatePR = factoryIssueModule.checkDuplicatePR;
            const computeGateReason = factoryIssueModule.computeGateReason;
            const issueBranchName = factoryIssueModule.issueBranchName;
            const actorTrustWhenSenderMissing = factoryIssueModule.actorTrustWhenSenderMissing;
            const parseFinalizeGateEnv = factoryIssueModule.parseFinalizeGateEnv;

            const result = computeGateReason(parseFinalizeGateEnv(process.env));

            core.setOutput('gate_reason', result.gate_reason);
            core.info(`Gate reason: ${result.gate_reason}`);

  safe_outputs:
    needs:
      - activation
      - agent
      - detection
    if: (!cancelled()) && needs.agent.result != 'skipped' && needs.detection.result == 'success'
    runs-on: ubuntu-slim
    permissions:
      contents: write
      issues: write
      pull-requests: write
    timeout-minutes: 15
    env:
      GH_AW_CALLER_WORKFLOW_ID: "${{ github.repository }}/reproducer-factory-issue"
      GH_AW_DETECTION_CONCLUSION: ${{ needs.detection.outputs.detection_conclusion }}
      GH_AW_DETECTION_REASON: ${{ needs.detection.outputs.detection_reason }}
      GH_AW_EFFECTIVE_TOKENS: ${{ needs.agent.outputs.effective_tokens }}
      GH_AW_ENGINE_ID: "claude"
      GH_AW_ENGINE_MODEL: "llm-gateway/claude-sonnet-4-6"
      GH_AW_WORKFLOW_ID: "reproducer-factory-issue"
      GH_AW_WORKFLOW_NAME: "Reproducer Factory Issue Intake"
    outputs:
      code_push_failure_count: ${{ steps.process_safe_outputs.outputs.code_push_failure_count }}
      code_push_failure_errors: ${{ steps.process_safe_outputs.outputs.code_push_failure_errors }}
      create_discussion_error_count: ${{ steps.process_safe_outputs.outputs.create_discussion_error_count }}
      create_discussion_errors: ${{ steps.process_safe_outputs.outputs.create_discussion_errors }}
      created_pr_number: ${{ steps.process_safe_outputs.outputs.created_pr_number }}
      created_pr_url: ${{ steps.process_safe_outputs.outputs.created_pr_url }}
      process_safe_outputs_processed_count: ${{ steps.process_safe_outputs.outputs.processed_count }}
      process_safe_outputs_temporary_id_map: ${{ steps.process_safe_outputs.outputs.temporary_id_map }}
    steps:
      - name: Setup Scripts
        id: setup
        uses: github/gh-aw-actions/setup@bc56a0cad2f450c562810785ef38649c04db812a # v0.72.1
        with:
          destination: ${{ runner.temp }}/gh-aw/actions
          job-name: ${{ github.job }}
          trace-id: ${{ needs.activation.outputs.setup-trace-id }}
        env:
          GH_AW_SETUP_WORKFLOW_NAME: "Reproducer Factory Issue Intake"
          GH_AW_CURRENT_WORKFLOW_REF: ${{ github.repository }}/.github/workflows/reproducer-factory-issue.lock.yml@${{ github.ref }}
          GH_AW_INFO_VERSION: "2.1.126"
      - name: Download agent output artifact
        id: download-agent-output
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: agent
          path: /tmp/gh-aw/
      - name: Setup agent output environment variable
        id: setup-agent-output-env
        if: steps.download-agent-output.outcome == 'success'
        run: |
          mkdir -p /tmp/gh-aw/
          find "/tmp/gh-aw/" -type f -print
          echo "GH_AW_AGENT_OUTPUT=/tmp/gh-aw/agent_output.json" >> "$GITHUB_OUTPUT"
      - name: Download patch artifact
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: agent
          path: /tmp/gh-aw/
      - name: Extract base branch from agent output
        id: extract-base-branch
        if: steps.download-agent-output.outcome == 'success'
        shell: bash
        run: |
          if [ -f "/tmp/gh-aw/agent_output.json" ]; then
            GH_AW_NODE=$(which node 2>/dev/null || command -v node 2>/dev/null || echo node)
            BASE_BRANCH=$("$GH_AW_NODE" -e "
              try {
                const data = JSON.parse(require('fs').readFileSync('/tmp/gh-aw/agent_output.json', 'utf8'));
                const item = (data.items || []).find(i =>
                  (i.type === 'create_pull_request' || i.type === 'push_to_pull_request_branch') &&
                  i.base_branch
                );
                if (item) process.stdout.write(item.base_branch);
              } catch(e) {}
            " 2>/dev/null || true)
            # Validate: only allow safe git branch name characters
            if [[ "$BASE_BRANCH" =~ ^[a-zA-Z0-9/_.-]+$ ]] && [ ${#BASE_BRANCH} -le 255 ]; then
              printf 'base-branch=%s\n' "$BASE_BRANCH" >> "$GITHUB_OUTPUT"
              echo "Extracted base branch from safe output: $BASE_BRANCH"
            fi
          fi
      - name: Checkout repository
        if: (!cancelled()) && needs.agent.result != 'skipped' && contains(needs.agent.outputs.output_types, 'create_pull_request')
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.extract-base-branch.outputs.base-branch || github.base_ref || github.event.pull_request.base.ref || github.ref_name || github.event.repository.default_branch }}
          token: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: false
          fetch-depth: 1
      - name: Configure Git credentials
        if: (!cancelled()) && needs.agent.result != 'skipped' && contains(needs.agent.outputs.output_types, 'create_pull_request')
        env:
          REPO_NAME: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          GIT_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global am.keepcr true
          # Re-authenticate git with GitHub token
          SERVER_URL_STRIPPED="${SERVER_URL#https://}"
          git remote set-url origin "https://x-access-token:${GIT_TOKEN}@${SERVER_URL_STRIPPED}/${REPO_NAME}.git"
          echo "Git configured with standard GitHub Actions identity"
      - name: Configure GH_HOST for enterprise compatibility
        id: ghes-host-config
        shell: bash
        run: |
          # Derive GH_HOST from GITHUB_SERVER_URL so the gh CLI targets the correct
          # GitHub instance (GHES/GHEC). On github.com this is a harmless no-op.
          GH_HOST="${GITHUB_SERVER_URL#https://}"
          GH_HOST="${GH_HOST#http://}"
          echo "GH_HOST=${GH_HOST}" >> "$GITHUB_ENV"
      - name: Process Safe Outputs
        id: process_safe_outputs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GH_AW_AGENT_OUTPUT: ${{ steps.setup-agent-output-env.outputs.GH_AW_AGENT_OUTPUT }}
          GH_AW_ALLOWED_DOMAINS: "*.githubusercontent.com,anthropic.com,api.anthropic.com,api.github.com,api.npms.io,api.snapcraft.io,archive.ubuntu.com,azure.archive.ubuntu.com,bun.sh,cdn.jsdelivr.net,cdn.playwright.dev,codeload.github.com,crl.geotrust.com,crl.globalsign.com,crl.identrust.com,crl.sectigo.com,crl.thawte.com,crl.usertrust.com,crl.verisign.com,crl3.digicert.com,crl4.digicert.com,crls.ssl.com,deb.nodesource.com,deno.land,elastic.litellm-prod.ai,esm.sh,files.pythonhosted.org,get.pnpm.io,ghcr.io,github-cloud.githubusercontent.com,github-cloud.s3.amazonaws.com,github.com,go.dev,golang.org,googleapis.deno.dev,googlechromelabs.github.io,goproxy.io,host.docker.internal,json-schema.org,json.schemastore.org,jsr.io,keyserver.ubuntu.com,lfs.github.com,nodejs.org,npm.pkg.github.com,npmjs.com,npmjs.org,objects.githubusercontent.com,ocsp.digicert.com,ocsp.geotrust.com,ocsp.globalsign.com,ocsp.identrust.com,ocsp.sectigo.com,ocsp.ssl.com,ocsp.thawte.com,ocsp.usertrust.com,ocsp.verisign.com,packagecloud.io,packages.cloud.google.com,packages.microsoft.com,pkg.go.dev,playwright.download.prss.microsoft.com,ppa.launchpad.net,proxy.golang.org,pypi.org,raw.githubusercontent.com,registry.bower.io,registry.npmjs.com,registry.npmjs.org,registry.yarnpkg.com,repo.yarnpkg.com,s.symcb.com,s.symcd.com,security.ubuntu.com,sentry.io,skimdb.npmjs.com,statsig.anthropic.com,storage.googleapis.com,sum.golang.org,telemetry.vercel.com,ts-crl.ws.symantec.com,ts-ocsp.ws.symantec.com,www.elastic.co,www.googleapis.com,www.npmjs.com,www.npmjs.org,yarnpkg.com"
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_API_URL: ${{ github.api_url }}
          GH_AW_SAFE_OUTPUT_JOBS: "{\"update_reproducer_comment\":\"\"}"
          GH_AW_SAFE_OUTPUTS_HANDLER_CONFIG: "{\"create_pull_request\":{\"labels\":[\"reproducer-factory\"],\"max\":1,\"max_patch_files\":100,\"max_patch_size\":1024,\"protect_top_level_dot_folders\":true,\"protected_files\":[\"package.json\",\"bun.lockb\",\"bunfig.toml\",\"deno.json\",\"deno.jsonc\",\"deno.lock\",\"global.json\",\"NuGet.Config\",\"Directory.Packages.props\",\"mix.exs\",\"mix.lock\",\"go.mod\",\"go.sum\",\"stack.yaml\",\"stack.yaml.lock\",\"pom.xml\",\"build.gradle\",\"build.gradle.kts\",\"settings.gradle\",\"settings.gradle.kts\",\"gradle.properties\",\"package-lock.json\",\"yarn.lock\",\"pnpm-lock.yaml\",\"npm-shrinkwrap.json\",\"requirements.txt\",\"Pipfile\",\"Pipfile.lock\",\"pyproject.toml\",\"setup.py\",\"setup.cfg\",\"Gemfile\",\"Gemfile.lock\",\"uv.lock\",\"CODEOWNERS\",\"DESIGN.md\",\"README.md\",\"CONTRIBUTING.md\",\"CHANGELOG.md\",\"SECURITY.md\",\"CODE_OF_CONDUCT.md\",\"CLAUDE.md\",\"AGENTS.md\"]},\"create_report_incomplete_issue\":{},\"missing_data\":{},\"missing_tool\":{},\"noop\":{\"max\":1,\"report-as-issue\":\"false\"},\"report_incomplete\":{}}"
          GH_AW_CI_TRIGGER_TOKEN: ${{ secrets.GH_AW_CI_TRIGGER_TOKEN }}
        with:
          github-token: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/safe_output_handler_manager.cjs');
            await main();
      - name: Upload Safe Outputs Items
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: safe-outputs-items
          path: |
            /tmp/gh-aw/safe-output-items.jsonl
            /tmp/gh-aw/temporary-id-map.json
          if-no-files-found: ignore

  update_reproducer_comment:
    needs:
      - agent
      - detection
    if: >
      (!cancelled()) && needs.agent.result != 'skipped' && contains(needs.agent.outputs.output_types, 'update_reproducer_comment')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Download agent output artifact
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: agent
          path: ${{ runner.temp }}/gh-aw/safe-jobs/
      - name: Configure Safe Outputs Job Environment Variables
        id: setup-safe-job-env
        run: |
          find "${RUNNER_TEMP}/gh-aw/safe-jobs/" -type f -print
          echo "GH_AW_AGENT_OUTPUT=${RUNNER_TEMP}/gh-aw/safe-jobs/agent_output.json" >> "$GITHUB_OUTPUT"
      - name: Create or update reproducer comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          GH_AW_AGENT_OUTPUT: ${{ steps.setup-safe-job-env.outputs.GH_AW_AGENT_OUTPUT }}
          REPRODUCER_FACTORY_ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const issueNumber = parseInt(process.env.REPRODUCER_FACTORY_ISSUE_NUMBER, 10);
            const marker = '<!-- gha-reproducer-factory -->';

            const outputFile = process.env.GH_AW_AGENT_OUTPUT;
            if (!outputFile) {
              core.setFailed('update-reproducer-comment: GH_AW_AGENT_OUTPUT environment variable is not set');
              return;
            }

            if (!issueNumber || issueNumber <= 0) {
              core.setFailed('update-reproducer-comment: invalid issue number.');
              return;
            }

            const fileContent = fs.readFileSync(outputFile, 'utf8');
            const agentOutput = JSON.parse(fileContent);
            const items = (agentOutput.items || []).filter(i => i.type === 'update_reproducer_comment');

            if (items.length === 0) {
              core.info('update-reproducer-comment: no update_reproducer_comment items in agent output; nothing to do.');
              return;
            }

            const item = items[0];
            let body = item.body || '';

            // Prepend the marker automatically; the agent does not need to supply it.
            if (body.startsWith(marker + '\n') || body.startsWith(marker + '\r\n')) {
              // body already starts with marker; leave as-is
            } else if (body.startsWith(marker)) {
              // marker without newline; normalize
              body = marker + '\n' + body.slice(marker.length);
            } else {
              body = marker + '\n' + body;
            }

            // Find existing reproducer comment by github-actions[bot]
            let existingComment = null;
            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });
              for (let i = comments.length - 1; i >= 0; i--) {
                const c = comments[i];
                if (c.user?.login === 'github-actions[bot]' && c.body?.trimStart().startsWith(marker)) {
                  existingComment = c;
                  break;
                }
              }
            } catch (err) {
              core.setFailed(`Could not list comments while searching for existing reproducer comment: ${err.message}`);
              return;
            }

            if (existingComment) {
              try {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existingComment.id,
                  body,
                });
                core.info(`Updated reproducer comment ${existingComment.id} on issue #${issueNumber}`);
              } catch (err) {
                core.setFailed(`Failed to update reproducer comment: ${err.message}`);
              }
            } else {
              try {
                const { data: newComment } = await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  body,
                });
                core.info(`Created reproducer comment ${newComment.id} on issue #${issueNumber}`);
              } catch (err) {
                core.setFailed(`Failed to create reproducer comment: ${err.message}`);
              }
            }

