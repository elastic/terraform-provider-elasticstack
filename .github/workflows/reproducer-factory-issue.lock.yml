        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RUN_DETECTION: ${{ steps.detection_guard.outputs.run_detection }}
          GH_AW_DETECTION_CONTINUE_ON_ERROR: "true"
        with:
          script: |
            try {
              const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
              setupGlobals(core, github, context, exec, io, getOctokit);
              const { main } = require('${{ runner.temp }}/gh-aw/actions/parse_threat_detection_results.cjs');
              await main();
            } catch (loadErr) {
              const continueOnError = process.env.GH_AW_DETECTION_CONTINUE_ON_ERROR !== 'false';
              const msg = 'ERR_SYSTEM: \u274C Unexpected error loading threat detection module: ' + (loadErr && loadErr.message ? loadErr.message : String(loadErr));
              core.error(msg);
              core.setOutput('reason', 'parse_error');
              if (continueOnError) {
                core.warning('\u26A0\uFE0F ' + msg);
                core.setOutput('conclusion', 'warning');
                core.setOutput('success', 'false');
              } else {
                core.setOutput('conclusion', 'failure');
                core.setOutput('success', 'false');
                core.setFailed(msg);
              }
            }

  pre_activation:
    runs-on: ubuntu-slim
    permissions:
      contents: read
      issues: write
      pull-requests: read
    outputs:
      activated: ${{ steps.check_membership.outputs.is_team_member == 'true' }}
      actor_trusted: ${{ steps.normalize_context.outputs.actor_trusted }}
      actor_trusted_reason: ${{ steps.normalize_context.outputs.actor_trusted_reason }}
      capture_issue_context_result: ${{ steps.capture_issue_context.outcome }}
      check_actor_trust_result: ${{ steps.check_actor_trust.outcome }}
      check_duplicate_pr_result: ${{ steps.check_duplicate_pr.outcome }}
      determine_intake_mode_result: ${{ steps.determine_intake_mode.outcome }}
      duplicate_pr_found: ${{ steps.check_duplicate_pr.outputs.duplicate_pr_found }}
      duplicate_pr_url: ${{ steps.check_duplicate_pr.outputs.duplicate_pr_url }}
      event_eligible: ${{ steps.normalize_context.outputs.event_eligible }}
      event_eligible_reason: ${{ steps.normalize_context.outputs.event_eligible_reason }}
      fetch_issue_comments_result: ${{ steps.fetch_issue_comments.outcome }}
      fetch_live_issue_result: ${{ steps.fetch_live_issue.outcome }}
      fetch_prior_reproducer_comment_result: ${{ steps.fetch_prior_reproducer_comment.outcome }}
      finalize_gate_result: ${{ steps.finalize_gate.outcome }}
      gate_reason: ${{ steps.finalize_gate.outputs.gate_reason }}
      intake_mode: ${{ steps.normalize_context.outputs.intake_mode }}
      issue_body: ${{ steps.normalize_context.outputs.issue_body }}
      issue_number: ${{ steps.normalize_context.outputs.issue_number }}
      issue_title: ${{ steps.normalize_context.outputs.issue_title }}
      matched_command: ''
      normalize_context_result: ${{ steps.normalize_context.outcome }}
      qualify_trigger_result: ${{ steps.qualify_trigger.outcome }}
      remove_trigger_label_result: ${{ steps.remove_trigger_label.outcome }}
      setup-trace-id: ${{ steps.setup.outputs.trace-id }}
      source_workflow: ${{ steps.normalize_context.outputs.source_workflow }}
      trigger_label_removed: ${{ steps.normalize_context.outputs.trigger_label_removed }}
      trigger_label_removed_reason: ${{ steps.normalize_context.outputs.trigger_label_removed_reason }}
      validate_dispatch_inputs_result: ${{ steps.validate_dispatch_inputs.outcome }}
      write_context_files_result: ${{ steps.write_context_files.outcome }}
    steps:
      - name: Setup Scripts
        id: setup
        uses: github/gh-aw-actions/setup@bc56a0cad2f450c562810785ef38649c04db812a # v0.72.1
        with:
          destination: ${{ runner.temp }}/gh-aw/actions
          job-name: ${{ github.job }}
        env:
          GH_AW_SETUP_WORKFLOW_NAME: "Reproducer Factory Issue Intake"
          GH_AW_CURRENT_WORKFLOW_REF: ${{ github.repository }}/.github/workflows/reproducer-factory-issue.lock.yml@${{ github.ref }}
          GH_AW_INFO_VERSION: "2.1.126"
      - name: Check team membership for workflow
        id: check_membership
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GH_AW_REQUIRED_ROLES: "admin,maintainer,write"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/check_membership.cjs');
            await main();
      - name: Determine intake mode
        id: determine_intake_mode
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const mode = context.eventName === 'workflow_dispatch' ? 'dispatch' : 'issue-event';
            core.setOutput('intake_mode', mode);
            core.info(`Intake mode: ${mode}`);
      - name: Qualify trigger event
        id: qualify_trigger
        if: steps.determine_intake_mode.outputs.intake_mode == 'issue-event'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            /**
             * Reproducer-factory issue intake configuration. Keep `ISSUE_BRANCH_PREFIX` aligned with
             * `workflow.md.tmpl` (branch pattern `reproducer-factory/issue-{n}`).
             */
            'use strict';

            const ISSUE_BRANCH_PREFIX = 'reproducer-factory/issue-';
            const FACTORY_LABEL = 'reproducer-factory';
            const DUPLICATE_LINKAGE_MODE = 'related-literal';
            const ISSUE_OPENED_NOT_ELIGIBLE_REASON =
              'Issue opened event does not qualify because the issue was created without the reproducer-factory label.';

            if (typeof module !== 'undefined') {
              module.exports = {
                ISSUE_BRANCH_PREFIX,
                FACTORY_LABEL,
                DUPLICATE_LINKAGE_MODE,
                ISSUE_OPENED_NOT_ELIGIBLE_REASON,
              };
            }

            /**
             * Shared deterministic helpers for code-factory and change-factory issue intake workflows.
             * Workflow-specific configuration is passed via {@link createFactoryIssueIntake}.
             */

            /** GitHub-recognized issue-closing keywords (case-insensitive). See https://docs.github.com/en/get-started/writing-on-github/working-with-advanced-formatting/using-keywords-in-issues-and-pull-requests */
            const GITHUB_ISSUE_CLOSING_KEYWORDS = '(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)';

            /**
             * GitHub closing-keyword reference: `#` is immediately followed by the issue digits (no whitespace),
             * per GitHub keyword syntax. Case-insensitive keywords; `(?![0-9])` avoids matching `#42` inside `#420`.
             *
             * @param {number} issueNumber
             * @returns {RegExp}
             */
            function issueClosingReferencePattern(issueNumber) {
              return new RegExp(
                `\\b${GITHUB_ISSUE_CLOSING_KEYWORDS}\\s*#${issueNumber}(?![0-9])`,
                'i',
              );
            }

            /**
             * @param {{ eventName: string, eventAction: string, labelName: string, issueLabels: string[] | null | undefined, factoryLabel: string, issueOpenedNotEligibleReason: string }} params
             * @returns {{ event_eligible: boolean, event_eligible_reason: string }}
             */
            function factoryQualifyTriggerEvent({
              eventName,
              eventAction,
              labelName,
              issueLabels,
              factoryLabel,
              issueOpenedNotEligibleReason,
            }) {
              if (eventName === 'issue_comment') {
                return {
                  event_eligible: true,
                  event_eligible_reason: `Issue comment event qualifies because the slash_command trigger routes to issue_comment.`,
                };
              }

              if (eventName !== 'issues') {
                return {
                  event_eligible: false,
                  event_eligible_reason: `Unsupported event '${eventName || '(empty)'}'; expected 'issues'.`,
                };
              }

              if (eventAction === 'labeled') {
                if (labelName === factoryLabel) {
                  return {
                    event_eligible: true,
                    event_eligible_reason: `Issue labeled event qualifies because the applied label is ${factoryLabel}.`,
                  };
                }

                return {
                  event_eligible: false,
                  event_eligible_reason: `Issue labeled event does not qualify because the applied label is '${labelName || '(empty)'}', not '${factoryLabel}'.`,
                };
              }

              if (eventAction === 'opened') {
                if (Array.isArray(issueLabels) && issueLabels.includes(factoryLabel)) {
                  return {
                    event_eligible: true,
                    event_eligible_reason: `Issue opened event qualifies because the issue already has the ${factoryLabel} label.`,
                  };
                }

                return {
                  event_eligible: false,
                  event_eligible_reason: issueOpenedNotEligibleReason,
                };
              }

              return {
                event_eligible: false,
                event_eligible_reason: `Issue event action '${eventAction || '(empty)'}' is not eligible; expected 'opened' or 'labeled'.`,
              };
            }

            /**
             * @param {{ sender: string, permission: string | null }} params
             * @returns {{ actor_trusted: boolean, actor_trusted_reason: string }}
             */
            function factoryCheckActorTrust({ sender, permission }) {
              if (sender === 'github-actions[bot]') {
                return {
                  actor_trusted: true,
                  actor_trusted_reason: 'Trigger actor github-actions[bot] is trusted without collaborator permission lookup.',
                };
              }

              if (['write', 'maintain', 'admin'].includes(permission)) {
                return {
                  actor_trusted: true,
                  actor_trusted_reason: `Trigger actor '${sender || '(empty)'}' is trusted with repository permission '${permission}'.`,
                };
              }

              return {
                actor_trusted: false,
                actor_trusted_reason: `Trigger actor '${sender || '(empty)'}' is not trusted; repository permission '${permission || '(none)'}' does not meet the required write/maintain/admin policy.`,
              };
            }

            /**
             * @returns {{ actor_trusted: boolean, actor_trusted_reason: string }}
             */
            function factoryActorTrustWhenSenderMissing() {
              return {
                actor_trusted: false,
                actor_trusted_reason: 'Trigger actor could not be identified; sender login is missing from the event payload.',
              };
            }

            /**
             * @param {{ issueNumber: number, pullRequests: Array<{ number: number, state: string, head_branch: string, labels: string[], body: string, html_url: string }>, branchPrefix: string, prLabel: string, duplicateLinkageMode: 'closes-literal' | 'related-literal' | 'github-keywords' }} params
             * @returns {{ duplicate_pr_found: boolean, duplicate_pr_url: string | null, gate_reason: string }}
             */
            function factoryCheckDuplicatePR({
              issueNumber,
              pullRequests,
              branchPrefix,
              prLabel,
              duplicateLinkageMode,
            }) {
              const expectedBranch = `${branchPrefix}${issueNumber}`;
              const expectedClosesExample = `Closes #${issueNumber}`;
              const expectedRelatedExample = `Related to #${issueNumber}`;

              let bodyPattern;
              if (duplicateLinkageMode === 'closes-literal') {
                bodyPattern = new RegExp(`Closes #${issueNumber}(?![0-9])`);
              } else if (duplicateLinkageMode === 'related-literal') {
                bodyPattern = new RegExp(`\\bRelated to #${issueNumber}(?![0-9])`);
              } else {
                bodyPattern = issueClosingReferencePattern(issueNumber);
              }

              const duplicate = (pullRequests || []).find(pr => (
                pr.state === 'open' &&
                Array.isArray(pr.labels) && pr.labels.includes(prLabel) &&
                pr.head_branch === expectedBranch &&
                bodyPattern.test(String(pr.body || ''))
              ));

              if (duplicate) {
                const url = duplicate.html_url ?? null;
                let linkagePhrase;
                if (duplicateLinkageMode === 'closes-literal') {
                  linkagePhrase = `canonical linkage '${expectedClosesExample}'`;
                } else if (duplicateLinkageMode === 'related-literal') {
                  linkagePhrase = `literal linkage \`${expectedRelatedExample}\``;
                } else {
                  linkagePhrase = `issue-closing reference such as '${expectedClosesExample}'`;
                }

                return {
                  duplicate_pr_found: true,
                  duplicate_pr_url: url,
                  gate_reason: `Found existing linked ${prLabel} PR #${duplicate.number} (${url ?? '(unknown URL)'}) for issue #${issueNumber} on branch '${expectedBranch}' with ${linkagePhrase}.`,
                };
              }

              let linkageTail;
              if (duplicateLinkageMode === 'closes-literal') {
                linkageTail = `canonical linkage '${expectedClosesExample}'`;
              } else if (duplicateLinkageMode === 'related-literal') {
                linkageTail = `literal linkage \`${expectedRelatedExample}\``;
              } else {
                linkageTail = `issue-closing reference such as '${expectedClosesExample}'`;
              }

              return {
                duplicate_pr_found: false,
                duplicate_pr_url: null,
                gate_reason: `No open linked ${prLabel} PR found for issue #${issueNumber}; expected label '${prLabel}', branch '${expectedBranch}', and ${linkageTail}.`,
              };
            }

            /**
             * @param {{ eventEligible: boolean, eventEligibleReason: string, actorTrusted: boolean | null, actorTrustedReason: string | null, duplicatePrFound: boolean | null, duplicatePrUrl: string | null, duplicateCheckGateReason: string | null }} params
             * @param {string} factoryLabel
             * @returns {{ gate_reason: string }}
             */
            function factoryComputeGateReason({
              eventEligible,
              eventEligibleReason,
              actorTrusted,
              actorTrustedReason,
              duplicatePrFound,
              duplicatePrUrl,
              duplicateCheckGateReason,
            }, factoryLabel) {
              if (!eventEligible) {
                return { gate_reason: eventEligibleReason };
              }

              if (actorTrusted === false) {
                return { gate_reason: actorTrustedReason || 'Trigger actor is not trusted.' };
              }

              if (actorTrusted == null) {
                return { gate_reason: 'Actor trust could not be determined; the trust check step did not produce an output.' };
              }

              if (duplicatePrFound === true) {
                return {
                  gate_reason: duplicateCheckGateReason || `Found existing linked ${factoryLabel} PR: ${duplicatePrUrl || '(unknown URL)'}.`,
                };
              }

              if (duplicatePrFound == null) {
                return { gate_reason: 'Duplicate PR check did not complete; the check step did not produce an output.' };
              }

              return {
                gate_reason: duplicateCheckGateReason || `All deterministic gates passed: event eligible, actor trusted, and no linked ${factoryLabel} PR found.`,
              };
            }

            /**
             * @param {string | undefined} raw
             * @returns {boolean | null}
             */
            function factoryParseOptionalTriStateFromEnv(raw) {
              if (raw == null || raw === '') {
                return null;
              }
              return raw === 'true';
            }

            /**
             * @param {Record<string, string | undefined>} env
             */
            function factoryParseFinalizeGateEnv(env) {
              const e = env || {};
              return {
                eventEligible: e.EVENT_ELIGIBLE === 'true',
                eventEligibleReason: e.EVENT_ELIGIBLE_REASON ?? '',
                actorTrusted: factoryParseOptionalTriStateFromEnv(e.ACTOR_TRUSTED),
                actorTrustedReason: e.ACTOR_TRUSTED_REASON ?? null,
                duplicatePrFound: factoryParseOptionalTriStateFromEnv(e.DUPLICATE_PR_FOUND),
                duplicatePrUrl: e.DUPLICATE_PR_URL && e.DUPLICATE_PR_URL !== '' ? e.DUPLICATE_PR_URL : null,
                duplicateCheckGateReason: e.DUPLICATE_GATE_REASON ?? null,
              };
            }

            /**
             * @param {{
             *   branchPrefix: string,
             *   factoryLabel: string,
             *   issueOpenedNotEligibleReason: string,
             *   duplicateLinkageMode: 'closes-literal' | 'related-literal' | 'github-keywords',
             * }} config
             */
            function createFactoryIssueIntake(config) {
              const {
                branchPrefix,
                factoryLabel,
                issueOpenedNotEligibleReason,
                duplicateLinkageMode,
              } = config;

              function issueBranchName(issueNumber) {
                return `${branchPrefix}${issueNumber}`;
              }

              /**
               * @param {{ eventName: string, eventAction: string, labelName: string, issueLabels?: string[] | null | undefined }} params
               */
              function qualifyTriggerEvent(params) {
                return factoryQualifyTriggerEvent({
                  ...params,
                  factoryLabel,
                  issueOpenedNotEligibleReason,
                });
              }

              function checkDuplicatePR(params) {
                return factoryCheckDuplicatePR({
                  ...params,
                  branchPrefix,
                  prLabel: factoryLabel,
                  duplicateLinkageMode,
                });
              }

              function computeGateReason(params) {
                return factoryComputeGateReason(params, factoryLabel);
              }

              return {
                issueBranchName,
                qualifyTriggerEvent,
                checkActorTrust: factoryCheckActorTrust,
                checkDuplicatePR,
                computeGateReason,
              };
            }

            /**
             * @param {{
             *   branchPrefix: string,
             *   factoryLabel: string,
             *   issueOpenedNotEligibleReason: string,
             *   duplicateLinkageMode: 'closes-literal' | 'related-literal' | 'github-keywords',
             *   issueBranchNameAliases?: string[],
             * }} config
             */
            function createFactoryIssueModule(config) {
              const intake = createFactoryIssueIntake(config);
              const issueBranchNameAliases = config.issueBranchNameAliases || [];
              const factoryIssueModule = {
                ...intake,
                actorTrustWhenSenderMissing: factoryActorTrustWhenSenderMissing,
                parseOptionalTriStateFromEnv: factoryParseOptionalTriStateFromEnv,
                parseFinalizeGateEnv: factoryParseFinalizeGateEnv,
              };

              for (const alias of issueBranchNameAliases) {
                factoryIssueModule[alias] = intake.issueBranchName;
              }

              return factoryIssueModule;
            }

            if (typeof module !== 'undefined') {
              module.exports = {
                issueClosingReferencePattern,
                factoryQualifyTriggerEvent,
                factoryCheckActorTrust,
                factoryActorTrustWhenSenderMissing,
                factoryCheckDuplicatePR,
                factoryComputeGateReason,
                factoryParseOptionalTriStateFromEnv,
                factoryParseFinalizeGateEnv,
                createFactoryIssueIntake,
                createFactoryIssueModule,
              };
            }

            // Concatenated by the workflow compiler; not executable standalone.
            const factoryIssueModule = createFactoryIssueModule({
              branchPrefix: ISSUE_BRANCH_PREFIX,
              factoryLabel: FACTORY_LABEL,
              issueOpenedNotEligibleReason: ISSUE_OPENED_NOT_ELIGIBLE_REASON,
              duplicateLinkageMode: DUPLICATE_LINKAGE_MODE,
            });

            const qualifyTriggerEvent = factoryIssueModule.qualifyTriggerEvent;
            const checkActorTrust = factoryIssueModule.checkActorTrust;
            const checkDuplicatePR = factoryIssueModule.checkDuplicatePR;
            const computeGateReason = factoryIssueModule.computeGateReason;
            const issueBranchName = factoryIssueModule.issueBranchName;
            const actorTrustWhenSenderMissing = factoryIssueModule.actorTrustWhenSenderMissing;
            const parseFinalizeGateEnv = factoryIssueModule.parseFinalizeGateEnv;

            const eventName = context.eventName;
            const eventAction = context.payload.action;
            const labelName = context.payload.label?.name ?? '';
            const issueLabels = (context.payload.issue?.labels ?? []).map(l => l.name);

            const result = qualifyTriggerEvent({ eventName, eventAction, labelName, issueLabels });

            core.setOutput('event_eligible', result.event_eligible ? 'true' : 'false');
            core.setOutput('event_eligible_reason', result.event_eligible_reason);

            if (result.event_eligible) {
              core.info(`Event eligible: ${result.event_eligible_reason}`);
            } else {
              core.info(`Event not eligible: ${result.event_eligible_reason}`);
            }
      - name: Capture issue context
        id: capture_issue_context
        if: steps.determine_intake_mode.outputs.intake_mode == 'issue-event'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            core.setOutput('issue_number', context.payload.issue?.number ?? '');
            core.setOutput('issue_title', context.payload.issue?.title ?? '');
            core.setOutput('issue_body', context.payload.issue?.body ?? '');
      - name: Validate dispatch inputs
        id: validate_dispatch_inputs
        if: steps.determine_intake_mode.outputs.intake_mode == 'dispatch'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            /**
             * Dispatch-mode helpers for code-factory issue intake.
             */
            'use strict';

            /**
             * @param {{ dispatchIssueNumber: string, currentRepository: string }} params
             * @returns {{ event_eligible: boolean, event_eligible_reason: string, issue_number?: number }}
             */
            function validateDispatchInputs({ dispatchIssueNumber, currentRepository }) {
              const num = parseInt(dispatchIssueNumber, 10);
              if (
                !dispatchIssueNumber ||
                Number.isNaN(num) ||
                num <= 0 ||
                String(num) !== String(dispatchIssueNumber).trim()
              ) {
                return {
                  event_eligible: false,
                  event_eligible_reason: `Dispatch input issue_number '${dispatchIssueNumber || '(empty)'}' is not a valid positive integer.`,
                };
              }

              return {
                event_eligible: true,
                event_eligible_reason: `Dispatch intake validated: issue #${num} in repository '${currentRepository}'.`,
                issue_number: num,
              };
            }

            /**
             * @param {{ eventName: string, payload: { issue?: { number?: number, title?: string, body?: string } } }} params
             * @returns {{ issue_number: number | null, issue_title: string, issue_body: string }}
             */
            function normalizeIssueEventContext({ eventName, payload }) {
              if (eventName !== 'issues') {
                return { issue_number: null, issue_title: '', issue_body: '' };
              }
              return {
                issue_number: payload.issue?.number ?? null,
                issue_title: payload.issue?.title ?? '',
                issue_body: payload.issue?.body ?? '',
              };
            }

            if (typeof module !== 'undefined') {
              module.exports = {
                validateDispatchInputs,
                normalizeIssueEventContext,
              };
            }

            const currentRepository = `${context.repo.owner}/${context.repo.repo}`;
            const dispatchIssueNumber = context.payload.inputs?.issue_number ?? '';

            const result = validateDispatchInputs({
              dispatchIssueNumber,
              currentRepository,
            });

            core.setOutput('event_eligible', result.event_eligible ? 'true' : 'false');
            core.setOutput('event_eligible_reason', result.event_eligible_reason);
            if (result.issue_number != null) {
              core.setOutput('issue_number', String(result.issue_number));
            }

            if (result.event_eligible) {
              core.info(`Dispatch validated: ${result.event_eligible_reason}`);
            } else {
              core.info(`Dispatch rejected: ${result.event_eligible_reason}`);
            }
      - name: Fetch live issue
        id: fetch_live_issue
        if: steps.determine_intake_mode.outputs.intake_mode == 'dispatch' && steps.validate_dispatch_inputs.outputs.event_eligible == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          INPUT_ISSUE_NUMBER: ${{ steps.validate_dispatch_inputs.outputs.issue_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = parseInt(process.env.INPUT_ISSUE_NUMBER, 10);

            if (!issueNumber || issueNumber <= 0) {
              core.setOutput('issue_number', '');
              core.setOutput('issue_title', '');
              core.setOutput('issue_body', '');
              core.setOutput('fetch_error', 'Invalid issue number in dispatch inputs.');
              core.setFailed('Cannot fetch live issue: invalid issue number.');
            } else {
              try {
                const { data } = await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number: issueNumber,
                });
                core.setOutput('issue_number', String(data.number));
                core.setOutput('issue_title', data.title ?? '');
                core.setOutput('issue_body', data.body ?? '');
                core.setOutput('fetch_error', '');
                core.info(`Fetched live issue #${data.number}: ${data.title}`);
              } catch (err) {
                core.setOutput('issue_number', '');
                core.setOutput('issue_title', '');
                core.setOutput('issue_body', '');
                core.setOutput('fetch_error', err.message);
                core.setFailed(`Failed to fetch issue #${issueNumber}: ${err.message}`);
              }
            }
      - name: Check actor trust
        id: check_actor_trust
        if: steps.determine_intake_mode.outputs.intake_mode == 'issue-event' && steps.qualify_trigger.outputs.event_eligible == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            /**
             * Reproducer-factory issue intake configuration. Keep `ISSUE_BRANCH_PREFIX` aligned with
             * `workflow.md.tmpl` (branch pattern `reproducer-factory/issue-{n}`).
             */
            'use strict';

            const ISSUE_BRANCH_PREFIX = 'reproducer-factory/issue-';
            const FACTORY_LABEL = 'reproducer-factory';
            const DUPLICATE_LINKAGE_MODE = 'related-literal';
            const ISSUE_OPENED_NOT_ELIGIBLE_REASON =
              'Issue opened event does not qualify because the issue was created without the reproducer-factory label.';

            if (typeof module !== 'undefined') {
              module.exports = {
                ISSUE_BRANCH_PREFIX,
                FACTORY_LABEL,
                DUPLICATE_LINKAGE_MODE,
                ISSUE_OPENED_NOT_ELIGIBLE_REASON,
              };
            }

            /**
             * Shared deterministic helpers for code-factory and change-factory issue intake workflows.
