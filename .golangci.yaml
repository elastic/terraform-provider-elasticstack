version: "2"
linters:
  enable:
    - misspell
    - bodyclose
    - containedctx
    - contextcheck
    - errname
    - errorlint
    - exptostd
    - goconst
    - gocritic
    - goheader
    - inamedparam
    - intrange
    - lll
    - modernize
    - nolintlint
    - testifylint
    - unconvert
    - unparam
    - usetesting
    - revive
    - esclienthelper
    - acctestconfigdirlint
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - ^libs/
      - ^generated/
      - third_party$
      - builtin$
      - examples$
  settings:
    lll:
      line-length: 200
    goheader:
      template-path: ./.LICENSE_HEADER.tmpl
    custom:
      esclienthelper:
        type: module
        description: Enforce Elasticsearch entity client helper usage.
      acctestconfigdirlint:
        type: module
        description: Enforce directory-backed fixture usage in acceptance test steps.
formatters:
  exclusions:
    generated: lax
    paths:
      - ^libs/
      - ^generated/
      - third_party$
      - builtin$
      - examples$
