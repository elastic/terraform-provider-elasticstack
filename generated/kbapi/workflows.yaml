openapi: 3.0.0
info:
  title: Kibana Workflows Management API
  description: API for creating, reading, updating, and deleting workflows in Kibana.
  version: "0.0.0"
servers:
  - url: https://localhost:5601
tags:
  - name: Workflows CRUD
    description: Create, read, update, and delete workflows
  - name: Workflows Search
    description: Search and filter workflows
  - name: Workflows Metadata
    description: Statistics, aggregations, connectors, and schema
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
  parameters:
    kbn_xsrf:
      description: A required header to protect against CSRF attacks
      in: header
      name: kbn-xsrf
      required: true
      schema:
        type: string
        example: "true"
  schemas:
    WorkflowDetailDto:
      type: object
      required:
        - id
        - name
        - enabled
        - createdAt
        - createdBy
        - lastUpdatedAt
        - lastUpdatedBy
        - yaml
        - valid
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        lastUpdatedAt:
          type: string
          format: date-time
        lastUpdatedBy:
          type: string
        definition:
          type: object
          nullable: true
          description: Parsed workflow definition object
        yaml:
          type: string
          description: Raw YAML workflow definition
        valid:
          type: boolean
    UpdatedWorkflowResponseDto:
      type: object
      required:
        - id
        - lastUpdatedAt
        - enabled
        - valid
        - validationErrors
      properties:
        id:
          type: string
        lastUpdatedAt:
          type: string
          format: date-time
        lastUpdatedBy:
          type: string
        enabled:
          type: boolean
        valid:
          type: boolean
        validationErrors:
          type: array
          items:
            type: string
    WorkflowListItemDto:
      type: object
      required:
        - id
        - name
        - description
        - enabled
        - createdAt
        - history
        - valid
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        definition:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
        history:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowExecutionHistoryModel"
        tags:
          type: array
          items:
            type: string
        valid:
          type: boolean
    WorkflowListDto:
      type: object
      required:
        - page
        - size
        - total
        - results
      properties:
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowListItemDto"
    WorkflowExecutionHistoryModel:
      type: object
      required:
        - id
        - status
        - startedAt
        - finishedAt
      properties:
        id:
          type: string
        workflowId:
          type: string
        workflowName:
          type: string
        status:
          type: string
          enum:
            - pending
            - waiting
            - waiting_for_input
            - running
            - completed
            - failed
            - cancelled
            - timed_out
            - skipped
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        duration:
          type: integer
          nullable: true
    DeleteWorkflowsResult:
      type: object
      required:
        - total
        - deleted
        - failures
      properties:
        total:
          type: integer
        deleted:
          type: integer
        failures:
          type: array
          items:
            type: object
            required:
              - id
              - error
            properties:
              id:
                type: string
              error:
                type: string
    CreateWorkflowCommand:
      type: object
      required:
        - yaml
      properties:
        yaml:
          type: string
          description: YAML workflow definition
        id:
          type: string
          description: Optional custom ID (auto-generated if omitted)
    BulkCreateWorkflowsCommand:
      type: object
      required:
        - workflows
      properties:
        workflows:
          type: array
          items:
            $ref: "#/components/schemas/CreateWorkflowCommand"
    BulkCreateWorkflowsResponse:
      type: object
      required:
        - created
        - failed
      properties:
        created:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowDetailDto"
        failed:
          type: array
          items:
            type: object
            required:
              - index
              - error
            properties:
              index:
                type: integer
              error:
                type: string
    UpdateWorkflowCommand:
      description: All fields are optional (partial update).
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        tags:
          type: array
          items:
            type: string
        yaml:
          type: string
          description: YAML workflow definition
    SearchWorkflowCommand:
      type: object
      properties:
        triggerType:
          type: string
          description: "Filter by trigger type (schedule, event, manual)"
        size:
          type: integer
          default: 100
          description: Results per page
        page:
          type: integer
          default: 1
          description: Page number (1-indexed)
        createdBy:
          type: array
          items:
            type: string
          description: Filter by creator
        enabled:
          type: array
          items:
            type: boolean
          description: Filter by enabled/disabled status
        tags:
          type: array
          items:
            type: string
          description: Filter by tags
        query:
          type: string
          description: Free-text search query
        _full:
          type: boolean
          default: false
          description: Return full workflow details
    WorkflowStatsDto:
      type: object
      required:
        - workflows
        - executions
      properties:
        workflows:
          type: object
          required:
            - enabled
            - disabled
          properties:
            enabled:
              type: integer
            disabled:
              type: integer
        executions:
          type: array
          items:
            type: object
            required:
              - date
              - timestamp
              - completed
              - failed
              - cancelled
            properties:
              date:
                type: string
              timestamp:
                type: string
                format: date-time
              completed:
                type: integer
              failed:
                type: integer
              cancelled:
                type: integer
    WorkflowAggsDto:
      type: object
      additionalProperties:
        type: array
        items:
          type: object
          required:
            - key
            - label
          properties:
            key:
              type: string
            label:
              type: string
    ConnectorsResponse:
      type: object
      required:
        - connectorTypes
        - totalConnectors
      properties:
        connectorTypes:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ConnectorTypeInfo"
        totalConnectors:
          type: integer
    ConnectorTypeInfo:
      type: object
      required:
        - actionTypeId
        - displayName
        - instances
        - enabled
        - enabledInConfig
        - enabledInLicense
        - minimumLicenseRequired
        - subActions
      properties:
        actionTypeId:
          type: string
        displayName:
          type: string
        instances:
          type: array
          items:
            type: object
            required:
              - id
              - name
              - isPreconfigured
              - isDeprecated
            properties:
              id:
                type: string
              name:
                type: string
              isPreconfigured:
                type: boolean
              isDeprecated:
                type: boolean
              config:
                type: object
                properties:
                  taskType:
                    type: string
        enabled:
          type: boolean
        enabledInConfig:
          type: boolean
        enabledInLicense:
          type: boolean
        minimumLicenseRequired:
          type: string
        subActions:
          type: array
          items:
            type: object
            required:
              - name
              - displayName
            properties:
              name:
                type: string
              displayName:
                type: string
    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        error:
          type: string
        message:
          type: string

security:
  - basicAuth: []

paths:
  # ── Workflow CRUD ──────────────────────────────────────────────────────

  /api/workflows:
    post:
      operationId: post-workflows
      summary: Create a workflow
      tags:
        - Workflows CRUD
      description: >
        Create a new workflow from a YAML definition.

        [Required authorization] Route required privileges: workflowsManagement:create.
      parameters:
        - $ref: "#/components/parameters/kbn_xsrf"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkflowCommand"
            example:
              yaml: "name: My Workflow\ndescription: Triage alerts\nenabled: true\nsteps:\n  - name: notify\n    type: .slack\n    input:\n      message: Alert triggered"
      responses:
        "200":
          description: Workflow created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowDetailDto"
        "400":
          description: Invalid YAML or validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: delete-workflows
      summary: Bulk delete workflows
      tags:
        - Workflows CRUD
      description: >
        Delete multiple workflows by ID.

        [Required authorization] Route required privileges: workflowsManagement:delete.
      parameters:
        - $ref: "#/components/parameters/kbn_xsrf"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              additionalProperties: false
              properties:
                ids:
                  type: array
                  maxItems: 1000
                  items:
                    type: string
            example:
              ids:
                - "wf-1"
                - "wf-2"
      responses:
        "200":
          description: Bulk delete result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteWorkflowsResult"

  /api/workflows/{id}:
    get:
      operationId: get-workflows-id
      summary: Get a workflow by ID
      tags:
        - Workflows CRUD
      description: >
        Retrieve a single workflow by its ID.

        [Required authorization] Route required privileges: workflowsManagement:read.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workflow found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowDetailDto"
        "404":
          description: Workflow not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                statusCode: 404
                error: Not Found
                message: Workflow not found
    put:
      operationId: put-workflows-id
      summary: Update a workflow
      tags:
        - Workflows CRUD
      description: >
        Update an existing workflow. All body fields are optional (partial update).

        [Required authorization] Route required privileges: workflowsManagement:update.
      parameters:
        - $ref: "#/components/parameters/kbn_xsrf"
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkflowCommand"
            example:
              enabled: false
              tags:
                - deprecated
      responses:
        "200":
          description: Workflow updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatedWorkflowResponseDto"
        "404":
          description: Workflow not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: delete-workflows-id
      summary: Delete a workflow
      tags:
        - Workflows CRUD
      description: >
        Delete a single workflow by ID.

        [Required authorization] Route required privileges: workflowsManagement:delete.
      parameters:
        - $ref: "#/components/parameters/kbn_xsrf"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workflow deleted successfully.

  /api/workflows/{id}/clone:
    post:
      operationId: post-workflows-id-clone
      summary: Clone a workflow
      tags:
        - Workflows CRUD
      description: >
        Create a copy of an existing workflow. The clone name will have " Copy" appended.

        [Required authorization] Route required privileges: workflowsManagement:create.
      parameters:
        - $ref: "#/components/parameters/kbn_xsrf"
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: ID of the workflow to clone
      responses:
        "200":
          description: Cloned workflow.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowDetailDto"
        "404":
          description: Source workflow not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/workflows/_bulk_create:
    post:
      operationId: post-workflows-bulk-create
      summary: Bulk create workflows
      tags:
        - Workflows CRUD
      description: >
        Create multiple workflows in a single request.

        [Required authorization] Route required privileges: workflowsManagement:create.
      parameters:
        - $ref: "#/components/parameters/kbn_xsrf"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateWorkflowsCommand"
            example:
              workflows:
                - yaml: "name: Workflow A\nsteps:\n  - name: step1\n    type: .slack\n    input:\n      message: hello"
                - yaml: "name: Workflow B\nsteps:\n  - name: step1\n    type: .email\n    input:\n      to: test@example.com"
      responses:
        "200":
          description: Bulk create result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkCreateWorkflowsResponse"

  # ── Workflows Search ──────────────────────────────────────────────────

  /api/workflows/search:
    post:
      operationId: post-workflows-search
      summary: Search workflows
      tags:
        - Workflows Search
      description: >
        Search and filter workflows with pagination.

        [Required authorization] Route required privileges: workflowsManagement:read.
      parameters:
        - $ref: "#/components/parameters/kbn_xsrf"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchWorkflowCommand"
            example:
              size: 20
              page: 1
              query: "triage"
              enabled:
                - true
      responses:
        "200":
          description: Paginated list of workflows.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowListDto"

  # ── Workflows Metadata ────────────────────────────────────────────────

  /api/workflows/stats:
    get:
      operationId: get-workflows-stats
      summary: Get workflow statistics
      tags:
        - Workflows Metadata
      description: >
        Get aggregate statistics about workflows and recent execution history.

        [Required authorization] Route required privileges: workflowsManagement:read.
      parameters: []
      responses:
        "200":
          description: Workflow statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowStatsDto"

  /api/workflows/aggs:
    get:
      operationId: get-workflows-aggs
      summary: Get workflow aggregations
      tags:
        - Workflows Metadata
      description: >
        Retrieve distinct values for specified workflow fields.

        [Required authorization] Route required privileges: workflowsManagement:read.
      parameters:
        - name: fields
          in: query
          required: true
          schema:
            type: array
            maxItems: 25
            items:
              type: string
          example:
            - createdBy
            - tags
      responses:
        "200":
          description: Aggregation results keyed by field name.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowAggsDto"

  /api/workflows/connectors:
    get:
      operationId: get-workflows-connectors
      summary: Get available connectors
      tags:
        - Workflows Metadata
      description: >
        List available connector types and their instances for use in workflow steps.

        [Required authorization] Route required privileges: workflowsManagement:read.
      parameters: []
      responses:
        "200":
          description: Available connectors.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorsResponse"

  /api/workflows/workflow-json-schema:
    get:
      operationId: get-workflows-workflow-json-schema
      summary: Get workflow JSON schema
      tags:
        - Workflows Metadata
      description: >
        Retrieve the JSON Schema used to validate workflow YAML definitions.

        [Required authorization] Route required privileges: workflowsManagement:read.
      parameters:
        - name: loose
          in: query
          required: true
          schema:
            type: boolean
          description: Whether to use loose validation mode
      responses:
        "200":
          description: JSON Schema document.
          content:
            application/json:
              schema:
                type: object
                description: A standard JSON Schema document.
        "500":
          description: Error generating JSON schema.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                statusCode: 500
                error: Internal Server Error
                message: Error generating JSON schema
