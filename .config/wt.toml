pre-start = "make setup"

post-start = """set -e
cp -n .env.template .env
PORT={{ 10000 + (branch | hash_port) % 5000 }}
KB_PORT={{ 15000 + ((branch ~ '-kb') | hash_port) % 5000 }}
grep -q "^ELASTICSEARCH_PORT=" .env || echo "ELASTICSEARCH_PORT=$PORT" >> .env
grep -q "^KIBANA_PORT=" .env || echo "KIBANA_PORT=$KB_PORT" >> .env
grep -q "^ELASTICSEARCH_URL=" .env || echo "ELASTICSEARCH_URL=http://localhost:$PORT" >> .env
"""

pre-commit = "make check-lint"

pre-remove = "docker compose down --volumes"
