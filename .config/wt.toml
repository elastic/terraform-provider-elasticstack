[[pre-start]]
setup = "make setup"

[[pre-start]]
env = """python3 - <<'PY'
from pathlib import Path

env_path = Path('.env')
if not env_path.exists():
    env_path.write_text(Path('.env.template').read_text())

port = "{{ 10000 + (branch | hash_port) % 5000 }}"
kb_port = "{{ 15000 + ((branch ~ '-kb') | hash_port) % 5000 }}"

required = {
    "ELASTICSEARCH_PORT": port,
    "KIBANA_PORT": kb_port,
    "ELASTICSEARCH_URL": f"http://localhost:{port}",
    "ELASTICSEARCH_ENDPOINTS": f"http://localhost:{port}",
    "ELASTICSEARCH_USERNAME": "elastic",
    "KIBANA_ENDPOINT": f"http://localhost:{kb_port}",
    "KIBANA_USERNAME": "elastic",
}

lines = env_path.read_text().splitlines()
existing = {
    line.split('=', 1)[0]
    for line in lines
    if line and not line.startswith('#') and '=' in line
}

for key, value in required.items():
    if key not in existing:
        lines.append(f"{key}={value}")

env_path.write_text(chr(10).join(lines) + chr(10))
PY
"""

[pre-commit]
check = "make check-lint"

[pre-remove]
default = "docker compose down --volumes"
