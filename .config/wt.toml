pre-start = "make setup"

post-start = """set -e && \
cp -n .env.template .env && \
echo "ELASTICSEARCH_PORT={{ 10000 + (branch | hash_port) % 5000 }}" >> .env && \
echo "KIBANA_PORT={{ 15000 + ((branch ~ '-kb') | hash_port) % 5000 }}" >> .env && \
echo "ELASTICSEARCH_URL=http://localhost:{{ 10000 + (branch | hash_port) % 5000 }}" >> .env
"""

pre-commit = "make check-lint"

pre-remove = "docker compose down --volumes"
