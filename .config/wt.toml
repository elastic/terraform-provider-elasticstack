pre-start = "make setup"

post-start = """{ cat .env.template && \
echo "" && \
echo "ELASTICSEARCH_PORT={{ 10000 + (branch | hash_port) % 5000 }}" && \
echo "KIBANA_PORT={{ 15000 + ((branch ~ '-kb') | hash_port) % 5000 }}" && \
echo "ELASTICSEARCH_URL=http://localhost:{{ 10000 + (branch | hash_port) % 5000 }}"; \
} > .env
"""

pre-commit = "make check-lint"

pre-remove = """docker compose down --volumes && \
docker compose -f docker-compose.tls.yml down --volumes 2>/dev/null || true
"""
